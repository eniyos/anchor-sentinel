<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

03e bool {\n    for a in attrs {\n        if !a.path().is_ident(\"derive\") {\n            continue;\n        }\n        let parsed = a.parse_args::\u003csyn::Ident\u003e();\n        if let Ok(ident) = parsed {\n            if ident == \"Accounts\" {\n                return true;\n            }\n        }\n        if let syn::Meta::List(list) = \u0026a.meta {\n            let tokens = list.tokens.to_string();\n            if tokens.split(',').any(|t| t.trim() == \"Accounts\") {\n                return true;\n            }\n        }\n    }\n    false\n}\n\nfn visit_accounts_struct(s: \u0026ItemStruct, hints: \u0026mut Vec\u003cRawHint\u003e) {\n    let struct_name = s.ident.to_string();\n    let named = match \u0026s.fields {\n        Fields::Named(n) =\u003e \u0026n.named,\n        _ =\u003e return,\n    };\n    for field in named {\n        let field_name = field\n            .ident\n            .as_ref()\n            .map(|i| i.to_string())\n            .unwrap_or_default();\n        let ty = quote::ToTokens::to_token_stream(\u0026field.ty)\n            .to_string()\n            .replace(char::is_whitespace, \"\");\n        let constraints = field\n            .attrs\n            .iter()\n            .filter(|a| a.path().is_ident(\"account\"))\n            .map(stringify_attr)\n            .collect::\u003cVec\u003c_\u003e\u003e();\n\n        hints.push(RawHint {\n            kind: AstHintKind::AccountsField {\n                struct_name: struct_name.clone(),\n                field_name,\n                ty,\n                constraints,\n            },\n            start: field.span().start(),\n        });\n    }\n}\n\nfn stringify_attr(a: \u0026Attribute) -\u003e String {\n    match \u0026a.meta {\n        syn::Meta::List(list) =\u003e list.tokens.to_string(),\n        _ =\u003e String::new(),\n    }\n}\n","traces":[{"line":38,"address":[],"length":0,"stats":{"Line":26}},{"line":44,"address":[],"length":0,"stats":{"Line":282}},{"line":45,"address":[],"length":0,"stats":{"Line":377}},{"line":46,"address":[],"length":0,"stats":{"Line":258}},{"line":47,"address":[],"length":0,"stats":{"Line":136}},{"line":50,"address":[],"length":0,"stats":{"Line":846}},{"line":54,"address":[],"length":0,"stats":{"Line":95}},{"line":55,"address":[],"length":0,"stats":{"Line":190}},{"line":56,"address":[],"length":0,"stats":{"Line":190}},{"line":57,"address":[],"length":0,"stats":{"Line":27}},{"line":59,"address":[],"length":0,"stats":{"Line":204}},{"line":60,"address":[],"length":0,"stats":{"Line":136}},{"line":61,"address":[],"length":0,"stats":{"Line":68}},{"line":62,"address":[],"length":0,"stats":{"Line":68}},{"line":65,"address":[],"length":0,"stats":{"Line":0}},{"line":66,"address":[],"length":0,"stats":{"Line":0}},{"line":67,"address":[],"length":0,"stats":{"Line":0}},{"line":68,"address":[],"length":0,"stats":{"Line":0}},{"line":72,"address":[],"length":0,"stats":{"Line":27}},{"line":75,"address":[],"length":0,"stats":{"Line":68}},{"line":76,"address":[],"length":0,"stats":{"Line":204}},{"line":77,"address":[],"length":0,"stats":{"Line":136}},{"line":78,"address":[],"length":0,"stats":{"Line":136}},{"line":79,"address":[],"length":0,"stats":{"Line":0}},{"line":81,"address":[],"length":0,"stats":{"Line":269}},{"line":82,"address":[],"length":0,"stats":{"Line":402}},{"line":83,"address":[],"length":0,"stats":{"Line":201}},{"line":85,"address":[],"length":0,"stats":{"Line":603}},{"line":87,"address":[],"length":0,"stats":{"Line":603}},{"line":89,"address":[],"length":0,"stats":{"Line":201}},{"line":90,"address":[],"length":0,"stats":{"Line":402}},{"line":91,"address":[],"length":0,"stats":{"Line":201}},{"line":93,"address":[],"length":0,"stats":{"Line":663}},{"line":94,"address":[],"length":0,"stats":{"Line":201}},{"line":97,"address":[],"length":0,"stats":{"Line":603}},{"line":98,"address":[],"length":0,"stats":{"Line":402}},{"line":99,"address":[],"length":0,"stats":{"Line":804}},{"line":100,"address":[],"length":0,"stats":{"Line":603}},{"line":101,"address":[],"length":0,"stats":{"Line":402}},{"line":102,"address":[],"length":0,"stats":{"Line":402}},{"line":104,"address":[],"length":0,"stats":{"Line":201}},{"line":109,"address":[],"length":0,"stats":{"Line":113}},{"line":110,"address":[],"length":0,"stats":{"Line":113}},{"line":111,"address":[],"length":0,"stats":{"Line":339}},{"line":112,"address":[],"length":0,"stats":{"Line":0}}],"covered":39,"coverable":45},{"path":["/","Users","enjo","anchor-sentinel","src","ast","instruction_fn.rs"],"content":"//! Visitor that finds `#[program]` impl blocks, the `pub fn` handlers inside\n//! them, and emits:\n//!   - `AstHintKind::InstructionHandler` (struct + fn name)\n//!   - `AstHintKind::UnsafeArithmetic` for raw `+ - * / %` on integer types\n//!   - `AstHintKind::LamportsDebit` / `LamportsCredit` for lamports +=/ -=\n//!   - `AstHintKind::BalanceCheck` for `\u003e=`, `require!`, etc. guards\n//!   - `AstHintKind::LamportsZero` for `lamports = 0` / `set_lamports(0)`\n//!   - `AstHintKind::CpiTransfer` for `invoke` / `invoke_signed` calls\n//!   - `AstHintKind::CpiInvokeSigned` for `invoke_signed` calls with the\n//!     signer-seeds safety classification that drives the\n//!     `cpi_signer_seed_validation` rule.\n\nuse quote::ToTokens;\nuse syn::parse::Parser;\nuse syn::punctuated::Punctuated;\nuse syn::spanned::Spanned;\nuse syn::visit::{self, Visit};\nuse syn::{\n    BinOp, Expr, ExprArray, ExprBinary, ExprCall, ExprCast, ExprReference, ImplItem, ImplItemFn,\n    Item, Type,\n};\n\nuse crate::engine::{AstHintKind, SignerSeedClass};\n\n/// A single raw hint waiting for span resolution.\n#[derive(Debug)]\npub struct RawHint {\n    pub kind: AstHintKind,\n    pub start: proc_macro2::LineColumn,\n}\n\n#[derive(Debug, Default)]\npub struct FileFns {\n    pub hints: Vec\u003cRawHint\u003e,\n}\n\npub struct InstructionFnVisitor\u003c'a\u003e {\n    /// File path the visitor is attached to. Carried for future\n    /// diagnostics — current visitor body doesn't read it.\n    #[allow(dead_code)]\n    pub file: \u0026'a str,\n    pub out: \u0026'a mut FileFns,\n}\n\nimpl\u003c'a\u003e InstructionFnVisitor\u003c'a\u003e {\n    pub fn new(file: \u0026'a str, out: \u0026'a mut FileFns) -\u003e Self {\n        Self { file, out }\n    }\n}\n\nimpl\u003c'ast, 'a\u003e Visit\u003c'ast\u003e for InstructionFnVisitor\u003c'a\u003e {\n    fn visit_item(\u0026mut self, i: \u0026'ast Item) {\n        if let Item::Mod(m) = i {\n            if has_program_attr(\u0026m.attrs) {\n                let mod_name = m.ident.to_string();\n                if let Some((_, items)) = \u0026m.content {\n                    for item in items {\n                        if let syn::Item::Fn(f) = item {\n                            visit_handler_fn(f, \u0026mod_name, \u0026mut self.out.hints);\n                        }\n                    }\n                }\n            }\n        }\n        if let Item::Impl(imp) = i {\n            if has_program_attr(\u0026imp.attrs) {\n                let struct_name = match \u0026*imp.self_ty {\n                    Type::Path(p) =\u003e last_path_segment(\u0026p.path).to_string(),\n                    _ =\u003e String::new(),\n                };\n                for item in \u0026imp.items {\n                    if let ImplItem::Fn(f) = item {\n                        visit_handler_fn_impl(f, \u0026struct_name, \u0026mut self.out.hints);\n                    }\n                }\n            }\n        }\n        visit::visit_item(self, i);\n    }\n}\n\nfn has_program_attr(attrs: \u0026[syn::Attribute]) -\u003e bool {\n    attrs.iter().any(|a| a.path().is_ident(\"program\"))\n}\n\nfn last_path_segment(path: \u0026syn::Path) -\u003e String {\n    path.segments\n        .last()\n        .map(|s| s.ident.to_string())\n        .unwrap_or_default()\n}\n\nfn visit_handler_fn(f: \u0026syn::ItemFn, mod_name: \u0026str, hints: \u0026mut Vec\u003cRawHint\u003e) {\n    let fn_name = f.sig.ident.to_string();\n    let start = f.sig.ident.span().start();\n    hints.push(RawHint {\n        kind: AstHintKind::InstructionHandler {\n            struct_name: mod_name.to_string(),\n            fn_name: fn_name.clone(),\n        },\n        start,\n    });\n\n    let mut visitor = BalanceVisitor::new(hints);\n    visitor.visit_block(\u0026f.block);\n}\n\nfn visit_handler_fn_impl(f: \u0026ImplItemFn, struct_name: \u0026str, hints: \u0026mut Vec\u003cRawHint\u003e) {\n    let fn_name = f.sig.ident.to_string();\n    let start = f.sig.ident.span().start();\n    hints.push(RawHint {\n        kind: AstHintKind::InstructionHandler {\n            struct_name: struct_name.to_string(),\n            fn_name,\n        },\n        start,\n    });\n\n    let mut visitor = BalanceVisitor::new(hints);\n    visitor.visit_block(\u0026f.block);\n}\n\nstruct BalanceVisitor\u003c'a\u003e {\n    hints: \u0026'a mut Vec\u003cRawHint\u003e,\n    seq_counter: usize,\n}\n\nimpl\u003c'a\u003e BalanceVisitor\u003c'a\u003e {\n    fn new(hints: \u0026'a mut Vec\u003cRawHint\u003e) -\u003e Self {\n        Self {\n            hints,\n            seq_counter: 0,\n        }\n    }\n\n    fn next_seq(\u0026mut self) -\u003e usize {\n        let s = self.seq_counter;\n        self.seq_counter += 1;\n        s\n    }\n}\n\nimpl\u003c'ast, 'a\u003e Visit\u003c'ast\u003e for BalanceVisitor\u003c'a\u003e {\n    fn visit_stmt(\u0026mut self, s: \u0026'ast syn::Stmt) {\n        if let syn::Stmt::Macro(sm) = s {\n            visit_stmt_macro(self, sm);\n        }\n        visit::visit_stmt(self, s);\n    }\n\n    fn visit_expr(\u0026mut self, e: \u0026'ast Expr) {\n        visit::visit_expr(self, e);\n    }\n\n    fn visit_expr_binary(\u0026mut self, e: \u0026'ast ExprBinary) {\n        if let Some(op) = match e.op {\n            BinOp::Add(_) =\u003e Some(\"+\"),\n            BinOp::Sub(_) =\u003e Some(\"-\"),\n            BinOp::Mul(_) =\u003e Some(\"*\"),\n            BinOp::Div(_) =\u003e Some(\"/\"),\n            BinOp::Rem(_) =\u003e Some(\"%\"),\n            _ =\u003e None,\n        } {\n            let lhs_ty = expr_type_name(\u0026e.left);\n            let rhs_ty = expr_type_name(\u0026e.right);\n            let lhs_int = is_int_type(\u0026lhs_ty) || looks_like_int(\u0026lhs_ty);\n            let rhs_int = is_int_type(\u0026rhs_ty) || looks_like_int(\u0026rhs_ty);\n            let both_clear = lhs_int \u0026\u0026 rhs_int;\n            let one_clear =\n                (lhs_int \u0026\u0026 !is_string_like(\u0026rhs_ty)) || (rhs_int \u0026\u0026 !is_string_like(\u0026lhs_ty));\n            if both_clear || one_clear {\n                let start = e.op.span().start();\n                self.hints.push(RawHint {\n                    kind: AstHintKind::UnsafeArithmetic {\n                        op: op.to_string(),\n                        lhs_ty: if lhs_ty.is_empty() {\n                            \"unknown\".into()\n                        } else {\n                            lhs_ty\n                        },\n                        rhs_ty: if rhs_ty.is_empty() {\n                            \"unknown\".into()\n                        } else {\n                            rhs_ty\n                        },\n                    },\n                    start,\n                });\n            }\n        }\n\n        match e.op {\n            BinOp::SubAssign(_) =\u003e {\n                if let Some((account, amount)) = extract_lamports_compound(\u0026e.left, \u0026e.right) {\n                    let seq = self.next_seq();\n                    self.hints.push(RawHint {\n                        kind: AstHintKind::LamportsDebit {\n                            account,\n                            amount_expr: amount,\n                            seq,\n                        },\n                        start: e.op.span().start(),\n                    });\n                }\n            }\n            BinOp::AddAssign(_) =\u003e {\n                if let Some((account, amount)) = extract_lamports_compound(\u0026e.left, \u0026e.right) {\n                    let seq = self.next_seq();\n                    self.hints.push(RawHint {\n                        kind: AstHintKind::LamportsCredit {\n                            account,\n                            amount_expr: amount,\n                            seq,\n                        },\n                        start: e.op.span().start(),\n                    });\n                }\n            }\n            _ =\u003e {}\n        }\n\n        match e.op {\n            BinOp::Ge(_) | BinOp::Le(_) | BinOp::Gt(_) | BinOp::Lt(_) =\u003e {\n                if let Some((account, check_type)) = extract_lamports_comparison(e) {\n                    let seq = self.next_seq();\n                    self.hints.push(RawHint {\n                        kind: AstHintKind::BalanceCheck {\n                            account,\n                            check_type,\n                            seq,\n                        },\n                        start: e.op.span().start(),\n                    });\n                }\n            }\n            _ =\u003e {}\n        }\n\n        visit::visit_expr_binary(self, e);\n    }\n\n    fn visit_expr_cast(\u0026mut self, e: \u0026'ast ExprCast) {\n        let from_ty = expr_type_name(\u0026e.expr);\n        let to_ty = type_name(\u0026e.ty);\n        if (is_int_type(\u0026from_ty) || looks_like_int(\u0026from_ty))\n            \u0026\u0026 is_int_type(\u0026to_ty)\n            \u0026\u0026 !from_ty.is_empty()\n        {\n            let start = e.as_token.span.start();\n            self.hints.push(RawHint {\n                kind: AstHintKind::IntegerCast { from_ty, to_ty },\n                start,\n            });\n        }\n        visit::visit_expr_cast(self, e);\n    }\n\n    fn visit_expr_assign(\u0026mut self, e: \u0026'ast syn::ExprAssign) {\n        if let Some(account) = extract_lamports_zero_assign(\u0026e.left, \u0026e.right) {\n            let seq = self.next_seq();\n            let start = e.eq_token.span.start();\n            self.hints.push(RawHint {\n                kind: AstHintKind::LamportsZero { account, seq },\n                start,\n            });\n        }\n        visit::visit_expr_assign(self, e);\n    }\n\n    fn visit_expr_method_call(\u0026mut self, e: \u0026'ast syn::ExprMethodCall) {\n        let method = e.method.to_string();\n        if method == \"set_lamports\" {\n            if let Some(first_arg) = e.args.first() {\n                if is_zero_literal(first_arg) {\n                    let account = extract_account_name(\u0026e.receiver);\n                    if !account.is_empty() {\n                        let seq = self.next_seq();\n                        let start = e.method.span().start();\n                        self.hints.push(RawHint {\n                            kind: AstHintKind::LamportsZero { account, seq },\n                            start,\n                        });\n                    }\n                }\n            }\n        }\n        visit::visit_expr_method_call(self, e);\n    }\n\n    fn visit_expr_call(\u0026mut self, e: \u0026'ast ExprCall) {\n        let path_str = expr_path_name(\u0026e.func);\n        if path_str.as_deref().is_some_and(is_invoke_signed_path) {\n            let target = \"invoke\".to_string();\n            let seq = self.next_seq();\n            let start = e.func.span().start();\n            self.hints.push(RawHint {\n                kind: AstHintKind::CpiTransfer {\n                    target: target.clone(),\n                    seq,\n                },\n                start,\n            });\n            let (seeds, summary) = match e.args.iter().nth(2) {\n                Some(arg) =\u003e classify_seed_argument(arg),\n                None =\u003e (crate::engine::SignerSeedClass::Absent, String::new()),\n            };\n            self.hints.push(RawHint {\n                kind: AstHintKind::CpiInvokeSigned {\n                    target,\n                    seq,\n                    seeds,\n                    seed_summary: summary,\n                },\n                start,\n            });\n        }\n        visit::visit_expr_call(self, e);\n    }\n\n    fn visit_expr_macro(\u0026mut self, e: \u0026'ast syn::ExprMacro) {\n        let mac_path = e.mac.path.to_token_stream().to_string().replace(' ', \"\");\n        if mac_path == \"require\"\n            || mac_path == \"require_gte\"\n            || mac_path == \"require_eq\"\n            || mac_path == \"require_gt\"\n            || mac_path == \"require_keys_eq\"\n            || mac_path == \"require_keys_neq\"\n        {\n            if let Some(account) = extract_account_from_require_macro(\u0026e.mac.tokens) {\n                let check_type = mac_path.clone();\n                let seq = self.next_seq();\n                let start = e.mac.path.span().start();\n                self.hints.push(RawHint {\n                    kind: AstHintKind::BalanceCheck {\n                        account,\n                        check_type,\n                        seq,\n                    },\n                    start,\n                });\n            }\n        }\n        if mac_path.ends_with(\"invoke\")\n            || mac_path.ends_with(\"invoke_signed\")\n            || mac_path.ends_with(\"invoke::invoke\")\n            || mac_path.ends_with(\"invoke_signed::invoke_signed\")\n            || mac_path.ends_with(\"solana_program::invoke\")\n        {\n            let target = extract_cpi_target(\u0026e.mac.tokens);\n            let seq = self.next_seq();\n            let start = e.mac.path.span().start();\n            self.hints.push(RawHint {\n                kind: AstHintKind::CpiTransfer {\n                    target: target.clone(),\n                    seq,\n                },\n                start,\n            });\n            // For `invoke_signed`, additionally inspect the 3rd argument\n            // (the signer-seeds array) so the cpi_signer_ onFnVisitor::new(\u0026file, \u0026mut fns);\n\n    av.visit_file(\u0026ast);\n    fv.visit_file(\u0026ast);\n\n    // Each visitor stores its own private `RawHint` type, so we resolve\n    // spans to engine-level `AstHint` values per-visitor and then chain\n    // those. The `file` is the same for both, and `start.line`/`column`\n    // are 1-based because `proc_macro2` reports them that way.\n    let mut hints: Vec\u003cAstHint\u003e = Vec::new();\n    for raw in accounts.hints {\n        hints.push(AstHint {\n            kind: raw.kind,\n            file: file.clone(),\n            line: raw.start.line,\n            column: raw.start.column,\n        });\n    }\n    for raw in fns.hints {\n        hints.push(AstHint {\n            kind: raw.kind,\n            file: file.clone(),\n            line: raw.start.line,\n            column: raw.start.column,\n        });\n    }\n    Some(hints)\n}\n","traces":[{"line":18,"address":[],"length":0,"stats":{"Line":27}},{"line":19,"address":[],"length":0,"stats":{"Line":54}},{"line":20,"address":[],"length":0,"stats":{"Line":53}},{"line":21,"address":[],"length":0,"stats":{"Line":78}},{"line":22,"address":[],"length":0,"stats":{"Line":52}},{"line":25,"address":[],"length":0,"stats":{"Line":27}},{"line":28,"address":[],"length":0,"stats":{"Line":26}},{"line":29,"address":[],"length":0,"stats":{"Line":104}},{"line":30,"address":[],"length":0,"stats":{"Line":104}},{"line":31,"address":[],"length":0,"stats":{"Line":78}},{"line":33,"address":[],"length":0,"stats":{"Line":52}},{"line":34,"address":[],"length":0,"stats":{"Line":52}},{"line":35,"address":[],"length":0,"stats":{"Line":104}},{"line":36,"address":[],"length":0,"stats":{"Line":104}},{"line":38,"address":[],"length":0,"stats":{"Line":78}},{"line":39,"address":[],"length":0,"stats":{"Line":78}},{"line":45,"address":[],"length":0,"stats":{"Line":78}},{"line":46,"address":[],"length":0,"stats":{"Line":428}},{"line":47,"address":[],"length":0,"stats":{"Line":603}},{"line":4   /// Print the sentinel version.\n    Version,\n\n    /// Explain a security rule in detail.\n    Explain {\n        /// The rule id to explain (e.g., missing_signer).\n        rule_id: String,\n    },\n}\n\n#[derive(Copy, Clone, Debug, Default, ValueEnum)]\npub enum OutputFormat {\n    #[default]\n    Text,\n    Json,\n    Sarif,\n}\n\n#[derive(Copy, Clone, Debug, ValueEnum)]\npub enum MinSeverity {\n    Info,\n    Low,\n    Medium,\n    High,\n    Critical,\n}\n\nimpl MinSeverity {\n    pub fn into_severity(self) -\u003e Severity {\n        match self {\n            MinSeverity::Info =\u003e Severity::Info,\n            MinSeverity::Low =\u003e Severity::Low,\n            MinSeverity::Medium =\u003e Severity::Medium,\n            MinSeverity::High =\u003e Severity::High,\n            MinSeverity::Critical =\u003e Severity::Critical,\n        }\n    }\n}\n","traces":[{"line":77,"address":[],"length":0,"stats":{"Line":0}},{"line":78,"address":[],"length":0,"stats":{"Line":0}},{"line":79,"address":[],"length":0,"stats":{"Line":0}},{"line":80,"address":[],"length":0,"stats":{"Line":0}},{"line":81,"address":[],"length":0,"stats":{"Line":0}},{"line":82,"address":[],"length":0,"stats":{"Line":0}},{"line":83,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":7},{"path":["/","Users","enjo","anchor-sentinel","src","config.rs"],"content":"//! Config file (`sentinel.toml`) support.\n//!\n//! Sentinel looks for `sentinel.toml` in two places:\n//!   1. The project root (the directory containing `Anchor.toml`)\n//!   2. The current working directory\n//!\n//! The project root takes precedence.\n//!\n//! Supported TOML format:\n//!\n//!   [exclude]\n//!   paths = [\"tests\", \"migrations\"]\n//!\n//!   [ignore]\n//!   rules = [\"missing_mut\"]\n//!\n//!   [severity]\n//!   min = \"high\"\n\nuse std::path::{Path, PathBuf};\n\n/// Sentinel configuration.\n#[derive(Debug, Default, serde::Deserialize)]\npub struct Config {\n    /// Nested exclude configuration.\n    #[serde(default)]\n    pub exclude: ExcludeConfig,\n    /// Nested ignore configuration.\n    #[serde(default)]\n    pub ignore: IgnoreConfig,\n    /// Nested severity configuration.\n    #[serde(default)]\n    pub severity: SeverityConfig,\n}\n\n/// Exclude configuration.\n#[derive(Debug, Default, serde::Deserialize)]\npub struct ExcludeConfig {\n    /// Paths to exclude from scanning.\n    #[serde(default)]\n    pub paths: Vec\u003cString\u003e,\n}\n\n/// Ignore configuration.\n#[derive(Debug, Default, serde::Deserialize)]\npub struct IgnoreConfig {\n    /// Rules to ignore.\n    #[serde(default)]\n    pub rules: Vec\u003cString\u003e,\n}\n\n/// Severity configuration.\n#[derive(Debug, Default, serde::Deserialize)]\npub struct SeverityConfig {\n    /// Minimum severity level.\n    #[serde(default)]\n    pub min: Option\u003cString\u003e,\n}\n\nimpl Config {\n    /// Load config from the project root, falling back to cwd.\n    pub fn load(project_root: \u0026Path) -\u003e Self {\n        if let Some(config) = Self::load_from(project_root) {\n            return config;\n        }\n\n        if let Ok(cwd) = std::env::current_dir() {\n            if cwd != project_root {\n                if let Some(config) = Self::load_from(\u0026cwd) {\n                    return config;\n                }\n            }\n        }\n\n        Self::default()\n    }\n\n    fn load_from(dir: \u0026Path) -\u003e Option\u003cSelf\u003e {\n        let config_path = dir.join(\"sentinel.toml\");\n        if !config_path.exists() {\n            return None;\n        }\n\n        let contents = std::fs::read_to_string(\u0026config_path).ok()?;\n        Self::parse(\u0026contents).ok()\n    }\n\n    fn parse(contents: \u0026str) -\u003e Result\u003cSelf, toml::de::Error\u003e {\n        toml::from_str(contents)\n    }\n\n    /// Returns the exclude paths.\n    pub fn exclude_paths(\u0026self) -\u003e \u0026[String] {\n        \u0026self.exclude.paths\n    }\n\n    /// Returns the ignore rules.\n    pub fn ignore_rules(\u0026self) -\u003e \u0026[String] {\n        \u0026self.ignore.rules\n    }\n\n    /// Returns the minimum severity.\n    pub fn min_severity(\u0026self) -\u003e Option\u003c\u0026str\u003e {\n        self.severity.min.as_deref()\n    }\n}\n\n/// Check if a path should be excluded based on patterns.\npub fn is_excluded(path: \u0026Path, patterns: \u0026[String]) -\u003e bool {\n    let path_str = path.to_string_lossy();\n\n    for pattern in patterns {\n        if pattern.contains('*') {\n            let glob_match = glob_match(pattern, \u0026path_str);\n            if glob_match {\n                return true;\n            }\n        } else {\n            let pattern_path = PathBuf::from(pattern);\n            if path == pattern_path || path.starts_with(\u0026pattern_path) {\n                return true;\n            }\n        }\n    }\n\n    false\n}\n\n/// Simple glob matching (handles `*` wildcards).\nfn glob_match(pattern: \u0026str, text: \u0026str) -\u003e bool {\n    let parts: Vec\u003c\u0026str\u003e = pattern.split('*').collect();\n\n    if parts.len() == 1 {\n        return pattern == text;\n    }\n\n    let mut pos = 0;\n    for (i, part) in parts.iter().enumerate() {\n        if part.is_empty() {\n            continue;\n        }\n\n        if let Some(found) = text[pos..].find(part) {\n            if i == 0 \u0026\u0026 found != 0 {\n                return false;\n            }\n            pos += found + part.len();\n        } else {\n            return false;\n        }\n    }\n\n    if pattern.ends_with('*') {\n        true\n    } else {\n        pos == text.len()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_exact_match() {\n        let path = PathBuf::from(\"programs/test/src/lib.rs\");\n        assert!(is_excluded(\u0026path, \u0026[\"programs/test\".to_string()]));\n        assert!(is_excluded(\n            \u0026path,\n            \u0026[\"programs/test/src/lib.rs\".to_string()]\n        ));\n        assert!(!is_excluded(\u0026path, \u0026[\"programs/other\".to_string()]));\n    }\n\n    #[test]\n    fn test_glob_match() {\n        let path = PathBuf::from(\"tests/fixtures/vault/src/lib.rs\");\n        assert!(is_excluded(\u0026path, \u0026[\"tests/*\".to_string()]));\n        assert!(!is_excluded(\u0026path, \u0026[\"programs/*\".to_string()]));\n    }\n\n    #[test]\n    fn test_config_parse_nested() {\n        let toml = r#\"\n            [exclude]\n            paths = [\"src/lib.rs\", \"tests/**/*.rs\"]\n\n            [ignore]\n            rules = [\"missing_mut\", \"unsafe_arithmetic\"]\n\n            [severity]\n            min = \"critical\"\n        \"#;\n        let config = Config::parse(toml).unwrap();\n        assert_eq!(config.exclude.paths, vec![\"src/lib.rs\", \"tests/**/*.rs\"]);\n        assert_eq!(\n            config.ignore.rules,\n            vec![\"missing_mut\", \"unsafe_arithmetic\"]\n        );\n        assert_eq!(config.severity.min, Some(\"critical\".to_string()));\n    }\n\n    #[test]\n    fn test_config_parse_empty() {\n        let toml = \"\";\n        let config = Config::parse(toml).unwrap();\n        assert!(config.exclude.paths.is_empty());\n        assert!(config.severity.min.is_none());\n        assert!(config.ignore.rules.is_empty());\n    }\n\n    #[test]\n    fn test_config_parse_comments_only() {\n        let toml = r#\"\n            # This is a comment\n            # [exclude]\n            # paths = [\"tests\"]\n        \"#;\n        let config = Config::parse(toml).unwrap();\n        assert!(config.exclude.paths.is_empty());\n    }\n\n    #[test]\n    fn test_config_parse_partial() {\n        let toml = r#\"\n            [exclude]\n            paths = [\"tests\", \"migrations\"]\n        \"#;\n        let config = Config::parse(toml).unwrap();\n        assert_eq!(config.exclude.paths, vec![\"tests\", \"migrations\"]);\n        assert!(config.ignore.rules.is_empty());\n    }\n}\n","traces":[{" 0,"stats":{"Line":6}},{"line":134,"address":[],"length":0,"stats":{"Line":0}},{"line":137,"address":[],"length":0,"stats":{"Line":12}},{"line":138,"address":[],"length":0,"stats":{"Line":40}},{"line":139,"address":[],"length":0,"stats":{"Line":28}},{"line":140,"address":[],"length":0,"stats":{"Line":5}},{"line":143,"address":[],"length":0,"stats":{"Line":25}},{"line":144,"address":[],"length":0,"stats":{"Line":10}},{"line":145,"address":[],"length":0,"stats":{"Line":0}},{"line":147,"address":[],"length":0,"stats":{"Line":14}},{"line":149,"address":[],"length":0,"stats":{"Line":2}},{"line":153,"address":[],"length":0,"stats":{"Line":8}},{"line":154,"address":[],"length":0,"stats":{"Line":2}},{"line":156,"address":[],"length":0,"stats":{"Line":4}}],"covered":43,"coverable":49},{"path":["/","Users","enjo","anchor-sentinel","src","engine","mod.rs"],"content":"//! Rule engine core: `Rule` trait, `Finding`, `Severity`, `AnalysisContext`.\n//!\n//! Rules are simple, stateless, sync functions over an `AnalysisContext`. The\n//! registry in `registry.rs` discovers and orders them at startup.\n\npub mod registry;\n\nuse anyhow::Result;\nuse serde::{Deserialize, Serialize};\n\nuse crate::idl::ir::ProgramIr;\n\n/// 5-level severity scale. Ordered low → high so comparisons work.\n#[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Hash, Serialize, Deserialize)]\n#[serde(rename_all = \"lowercase\")]\npub enum Severity {\n    Info,\n    Low,\n    Medium,\n    High,\n    Critical,\n}\n\nimpl Severity {\n    pub fn as_str(\u0026self) -\u003e \u0026'static str {\n        match self {\n            Severity::Info =\u003e \"info\",\n            Severity::Low =\u003e \"low\",\n            Severity::Medium =\u003e \"medium\",\n            Severity::High =\u003e \"high\",\n            Severity::Critical =\u003e \"critical\",\n        }\n    }\n\n    /// Parse a severity from a string. Reserved for the upcoming\n    /// `--min-severity` config-file form; the current CLI uses `MinSeverity`\n    /// directly.\n    #[allow(dead_code)]\n    pub fn parse(s: \u0026str) -\u003e Option\u003cSelf\u003e {\n        match s.to_ascii_lowercase().as_str() {\n            \"info\" =\u003e Some(Severity::Info),\n            \"low\" =\u003e Some(Severity::Low),\n            \"medium\" | \"med\" =\u003e Some(Severity::Medium),\n            \"high\" =\u003e Some(Severity::High),\n            \"critical\" | \"crit\" =\u003e Some(Severity::Critical),\n            _ =\u003e None,\n        }\n    }\n}\n\nimpl std::fmt::Display for Severity {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        f.write_str(self.as_str())\n    }\n}\n\n/// A single finding produced by a rule.\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct Finding {\n    pub rule: String,\n    pub severity: Severity,\n    pub program: String,\n    pub instruction: Option\u003cString\u003e,\n    pub account: Option\u003cString\u003e,\n    pub file: Option\u003cString\u003e,\n    pub line: Option\u003cusize\u003e,\n    pub column: Option\u003cusize\u003e,\n    pub message: String,\n    pub hint: Option\u003cString\u003e,\n}\n\nimpl Finding {\n    pub fn builder(rule: \u0026str, severity: Severity, message: impl Into\u003cString\u003e) -\u003e FindingBuilder {\n        FindingBuilder {\n            rule: rule.to_string(),\n            severity,\n            message: message.into(),\n            program: None,\n            instruction: None,\n            account: None,\n            file: None,\n            line: None,\n            column: None,\n            hint: None,\n        }\n    }\n}\n\npub struct FindingBuilder {\n    rule: String,\n    severity: Severity,\n    message: String,\n    program: Option\u003cString\u003e,\n    instruction: Option\u003cString\u003e,\n    account: Option\u003cString\u003e,\n    file: Option\u003cString\u003e,\n    line: Option\u003cusize\u003e,\n    column: Option\u003cusize\u003e,\n    hint: Option\u003cString\u003e,\n}\n\nimpl FindingBuilder {\n    pub fn program(mut self, p: impl Into\u003cString\u003e) -\u003e Self {\n        self.program = Some(p.into());\n        self\n    }\n    pub fn instruction(mut self, i: impl Into\u003cString\u003e) -\u003e Self {\n        self.instruction = Some(i.into());\n        self\n    }\n    pub fn account(mut self, a: impl Into\u003cString\u003e) -\u003e Self {\n        self.account = Some(a.into());\n        self\n    }\n    pub fn file(mut self, f: impl Into\u003cString\u003e) -\u003e Self {\n        self.file = Some(f.into());\n        self\n    }\n    pub fn line(mut self, l: usize) -\u003e Self {\n        self.line = Some(l);\n        self\n    }\n    pub fn column(mut self, c: usize) -\u003e Self {\n        self.column = Some(c);\n        self\n    }\n    pub fn hint(mut self, h: impl Into\u003cString\u003e) -\u003e Self {\n        self.hint = Some(h.into());\n        self\n    }\n    pub fn build(self) -\u003e Finding {\n        Finding {\n            rule: self.rule,\n            severity: self.severity,\n            program: self.program.unwrap_or_default(),\n            instruction: self.instruction,\n            account: self.account,\n            file: self.file,\n            line: self.line,\n            column: self.column,\n            message: self.message,\n            hint: self.hint,\n        }\n    }\n}\n\n/// What a rule sees at check-time. The AST layer populates `ast_hints` later\n/// in the build-out; for now it's an empty `Vec` and rules ignore it.\n#[derive(Debug, Clone)]\npub struct AnalysisContext {\n    pub ir: ProgramIr,\n    /// Optional AST-derived hints. Populated in Week 2.\n    pub ast_hints: Vec\u003cAstHint\u003e,\n}\n\nimpl Default for AnalysisContext {\n    fn default() -\u003e Self {\n        // Real callers always populate `ir` explicitly; this exists only so\n        // the struct can be constructed in tests without a parsed program.\n        Self {\n            ir: ProgramIr {\n                version: crate::idl::ir::IdlVersion::V30Plus,\n                name: String::new(),\n                instructions: Vec::new(),\n                accounts: Vec::new(),\n                types: Vec::new(),\n                events: Vec::new(),\n                errors: Vec::new(),\n                source_path: String::new(),\n            },\n            ast_hints: Vec::new(),\n        }\n    }\n}\n\n/// A free-form hint derived from the Rust source.\n#[derive(Debug, Clone)]\npub struct AstHint {\n    pub kind: AstHintKind,\n    pub file: String,\n    /// Resolved (1-based) line, set by the AST layer using the source text\n    /// + `proc_macro2::LineColumn`.\n    pub line: usize,\n    /// Resolved (1-based) column.\n    pub column: usize,\n}\n\nimpl AstHint {\n    /// Borrow the hint's source location as a `SourceLocation`. This is the\n    /// form rules want when stamping a `Finding` so that the report can\n    /// include `file:line:column` (currently the rule layer leaves these\n    /// fields as `null` for non-`unsafe_arithmetic` rules — task #1 fixes\n    /// that by routing every `AccountsField` hint through this helper).\n    pub fn location(\u0026self) -\u003e SourceLocation {\n        SourceLocation {\n            file: self.file.clone(),\n            line: self.line,\n            column: self.column,\n        }\n    }\n}\n\n/// Resolved source location, ready to be stamped onto a `Finding`.\n#[derive(Debug, Clone)]\npub struct SourceLocation {\n    pub file: String,\n    pub line: usize,\n    pub column: usize,\n}\n\nimpl SourceLocation {\n    pub fn stamp(self, b: FindingBuilder) -\u003e FindingBuilder {\n        b.file(self.file).line(self.line).column(self.column)\n    }\n}\n\n/// Safety classification for the signer-seeds argument of an\n/// `invoke_signed` call. The `cpi_signer_seed_validation` rule uses this\n/// to decide whether to fire a Critical finding.\n#[derive(Debug, Clone, PartialEq, Eq)]\npub enum SignerSeedClass {\n    /// All seed slices are composed of canonical sources:\n    /// `b\"...\"` literals, `ctx.bumps.\u003cident\u003e`, or `.key().as_ref()` on\n    /// a known account field. The seeds can be trusted to identify a\n    /// real PDA.\n    Safe,\n    /// At least one seed slice contains a function arg, an unresolvable\n    /// expression, or anything else the AST layer can't verify. The\n    /// seeds may identify an attacker-controlled address.\n    Dynamic,\n    /// The third argument was present but empty — equivalent to `invoke`\n    /// (no signers). Most often a programmer mistake; not strictly\n    /// exploitable, so the rule currently does not fire on it.\n    Absent,\n}\n\n#[derive(Debug, Clone)]\npub enum AstHintKind {\n    /// A field of an `#[derive(Accounts)]` struct.\n    AccountsField {\n        /// Owning struct name. Reserved for cross-struct linking\n        /// (a future task will key the field hint index by\n        /// `(instruction_name, struct_name, field_name)` instead of\n        /// `field_name` alone).\n        #[allow(dead_code)]\n        struct_name: String,\n        field_name: String,\n        /// \"Signer\", \"Account\u003c'info, T\u003e\", \"AccountInfo\", \"SystemAccount\", etc.\n        ty: String,\n        /// Constraint attributes like `mut`, `seeds`, `bump`, `has_one`.\n        constraints: Vec\u003cString\u003e,\n    },\n    /// A `pub fn` in an `#[program]` impl block.\n    InstructionHandler {\n        /// Owning struct name. Reserved for the Week-4+ cross-link\n        /// between IDL instructions and AST handlers.\n        #[allow(dead_code)]\n        struct_name: String,\n        /// Handler fn name. Reserved for the same cross-link.\n        #[allow(dead_code)]\n        fn_name: String,\n    },\n    /// An unchecked arithmetic op (`+`, `-`, `*`, `/`, `%`).\n    UnsafeArithmetic {\n        op: String,\n        lhs_ty: String,\n        rhs_ty: String,\n    },\n    /// A lamports subtraction (debit) on an account.\n    LamportsDebit {\n        account: String,\n        amount_expr: String,\n        seq: usize,\n    },\n    /// A lamports addition (credit) on an account.\n    LamportsCredit {\n        account: String,\n        amount_expr: String,\n        seq: usize,\n    },\n    /// A guard/comparison involving lamports/balance (if, require!, \u003e=, etc.).\n    BalanceCheck {\n        account: String,\n        check_type: String,\n        seq: usize,\n    },\n    /// Lamports explicitly zeroed (`lamports = 0`, `set_lamports(0)`).\n    LamportsZero { account: String, seq: usize },\n    /// CPI that may transfer lamports (`invoke` / `invoke_signed`).\n    CpiTransfer { target: String, seq: usize },\n    /// `invoke_signed` call with the signer-seeds safety classification.\n    /// The `cpi_signer_seed_validation` rule fires Critical findings for\n    /// `Seeds::Dynamic` — i.e. seeds that contain function args or any\n    /// expression the AST layer can't verify as canonical. `Seeds::Safe`\n    /// means every seed slice was either a `b\"...\"` literal, a\n    /// `ctx.bumps.\u003cident\u003e` canonical bump, or a `.key().as_ref()` on a\n    /// known account. `Seeds::Absent` is the rare case where the third\n    /// argument was empty (no signers, equivalent to plain `invoke`).\n    CpiInvokeSigned {\n        /// The CPI target. Currently unused by the rule but kept for\n        /// future cross-referencing and to maintain symmetry with\n        /// `CpiTransfer`.\n        #[allow(dead_code)]\n        target: String,\n        /// Monotonic sequence number for ordering. Currently unused.\n        #[allow(dead_code)]\n        seq: usize,\n        seeds: SignerSeedClass,\n        /// Short human description of the seeds for the rule's finding\n        /// message — e.g. `\"b\\\"vault\\\", ctx.bumps.vault\"` or\n        /// `\"args.bump (function arg)\"`.\n        seed_summary: String,\n    },\n    /// An `as` cast between two integer-typed expressions. The rule\n    /// `integer_cast_truncation` only fires when the source is wider than\n    /// the destination (e.g. `u64` → `u8`); widening casts are emitted too\n    /// so future rules (overflow on downcast, lossy float→int) can reuse\n    /// the hint.\n    IntegerCast { from_ty: String, to_ty: String },\n}\n\n/// Which analysis layer(s) a rule consults. Surfaced as a column in\n/// the `sentinel rules` table so users can tell at a glance whether a\n/// rule needs only the IDL or also the Rust source.\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub enum Layer {\n    /// IDL-only — needs nothing beyond the parsed `target/idl/*.json`.\n    /// Reserved for future IDL-only rules; no current rule uses it.\n    #[allow(dead_code)]\n    Idl,\n    /// AST-only — needs the Rust source via the proc-macro AST hints.\n    Ast,\n    /// Both — combines signals from IDL and AST (e.g. matches by\n    /// account name from the IDL, then cross-checks with `#[account]`\n    /// constraints parsed from the source).\n    IdlAst,\n}\n\nimpl Layer {\n    pub fn as_str(\u0026self) -\u003e \u0026'static str {\n        match self {\n            Layer::Idl =\u003e \"IDL\",\n            Layer::Ast =\u003e \"AST\",\n            Layer::IdlAst =\u003e \"IDL+AST\",\n        }\n    }\n}\n\nimpl std::fmt::Display for Layer {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        f.write_str(self.as_str())\n    }\n}\n\n/// The interface every rule implements.\npub trait Rule: Send + Sync {\n    /// Stable identifier used in `--ignore` flags and JSON output.\n    fn id(\u0026self) -\u003e \u0026'static str;\n    /// Short human description, used by `sentinel rules`.\n    fn description(\u0026self) -\u003e \u0026'static str;\n    /// Default severity for findings from this rule.\n    fn severity(\u0026self) -\u003e Severity;\n    /// Which analysis layer(s) this rule consults. Surfaced as the\n    /// `Layer` column in `sentinel rules`. Defaults to `IdlAst` so\n    /// newly added rules (or out-of-tree implementors) don't have to\n    /// override it immediately — they can pick the most permissive\n    /// value and refine later.\n    fn layer(\u0026self) -\u003e Layer {\n        Layer::IdlAst\n    }\n    /// Inspect the context and return any findings.\n    fn check(\u0026self, ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e;\n}\n\n/// Run every registered rule over `ctx`, returning all findings.\npub fn run_all_rules(ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e {\n    let mut out = Vec::new();\n    for rule in registry::all_rules() {\n        out.extend(rule.check(ctx)?);\n    }\n    Ok(out)\n}\n\n/// Build a quick lookup from field_name → the AST hint that first declared\n/// it. Rules use this to stamp source locations onto findings, since IDL\n/// alone carries no `file:line:column` for individual accounts.\n///\n/// In the rare case where the same field name appears on multiple structs\n/// (e.g. `authority` on both `Deposit` and `Withdraw`) the first hint wins.\n/// That's acceptable for a static analysis tool — the message says\n/// \"Account `authority` on instruction `withdraw`\" and the line points at\n/// one of the declarations; the user can fix the right one from the\n/// instruction name alone.\npub fn field_hint_index(ctx: \u0026AnalysisContext) -\u003e std::collections::HashMap\u003cString, AstHint\u003e {\n    let mut index = std::collections::HashMap::with_capacity(ctx.ast_hints.len());\n    for hint in \u0026ctx.ast_hints {\n        if let AstHintKind::AccountsField { field_name, .. } = \u0026hint.kind {\n            index.entry(field_name.clone()).or_insert(hint.clone());\n        }\n    }\n    index\n}\n","traces":[{"line":25,"address":[],"length":0,"stats":{"Line":31}},{"line":26,"address":[],"length":0,"stats":{"Line":31}},{"line":27,"address":[],"length":0,"stats":{"Line":2}},{"line":28,"address":[],"length":0,"stats":{"Line":2}},{"line":29,"address":[],"length":0,"stats" 174}},{"line":25,"address":[],"length":0,"stats":{"Line":1682}},{"line":26,"address":[],"length":0,"stats":{"Line":1624}},{"line":28,"address":[],"length":0,"stats":{"Line":58}},{"line":32,"address":[],"length":0,"stats":{"Line":30}},{"line":33,"address":[],"length":0,"stats":{"Line":30}},{"line":35,"address":[],"length":0,"stats":{"Line":1290}}],"covered":8,"coverable":8},{"path":["/","Users","enjo","anchor-sentinel","src","idl","ir.rs"],"content":"//! Unified intermediate representation (IR) that both Anchor 0.29 and 0.30+ IDLs\n//! deserialize into. Rules consume this — they never touch the raw IDL types.\n\nuse serde::{Deserialize, Serialize};\n\n/// Which IDL dialect produced this IR. Mostly informational; rules should\n/// branch on the IR fields themselves, not on the version.\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\npub enum IdlVersion {\n    /// Legacy Anchor IDL (≤ 0.29). Single `types` map, namespaced `accounts`.\n    V29,\n    /// Modern Anchor IDL (≥ 0.30). Arrays for `types`, `events`, `errors`,\n    /// and per-instruction `accounts` is a flat array.\n    V30Plus,\n}\n\n/// Top-level program representation handed to the rule engine.\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct ProgramIr {\n    /// Which IDL dialect produced this IR. Recorded for diagnostics\n    /// (the engine already branches on field presence, not version).\n    #[allow(dead_code)]\n    pub version: IdlVersion,\n    pub name: String,\n    pub instructions: Vec\u003cInstruction\u003e,\n    pub accounts: Vec\u003cAccountDef\u003e,\n    pub types: Vec\u003cTypeDef\u003e,\n    pub events: Vec\u003cEventDef\u003e,\n    pub errors: Vec\u003cErrorDef\u003e,\n    /// Source path of the IDL file, for diagnostics.\n    pub source_path: String,\n}\n\n/// A single on-chain instruction exposed by the program.\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct Instruction {\n    pub name: String,\n    pub accounts: Vec\u003cInstructionAccount\u003e,\n    pub args: Vec\u003cInstructionArg\u003e,\n    /// `discriminator` for 0.30+ IDLs (8-byte sighash).\n    #[serde(default)]\n    pub discriminator: Option\u003cVec\u003cu8\u003e\u003e,\n}\n\n/// An account referenced by an instruction.\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct InstructionAccount {\n    pub name: String,\n    pub is_mut: bool,\n    pub is_signer: bool,\n    /// Optional PDA-derivation info (0.30+).\n    #[serde(default)]\n    pub pda: Option\u003cPdaDerivation\u003e,\n    /// Optional address constraint (0.30+).\n    #[serde(default)]\n    pub address: Option\u003cString\u003e,\n}\n\n/// An argument to an instruction.\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct InstructionArg {\n    pub name: String,\n    pub ty: String,\n}\n\n/// Account state struct (top-level `accounts:` in the IDL).\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct AccountDef {\n    pub name: String,\n    #[serde(default)]\n    pub discriminator: Option\u003cVec\u003cu8\u003e\u003e,\n}\n\n/// User-defined type (struct or enum).\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct TypeDef {\n    pub name: String,\n    /// `\"struct\"` or `\"enum\"`.\n    pub kind: String,\n    #[serde(default)]\n    pub fields: Vec\u003cTypeField\u003e,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct TypeField {\n    pub name: String,\n    pub ty: String,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct EventDef {\n    pub name: String,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct ErrorDef {\n    pub code: u32,\n    pub name: String,\n    #[serde(default)]\n    pub msg: Option\u003cString\u003e,\n}\n\n/// PDA derivation metadata, present on 0.30+ instruction accounts.\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct PdaDerivation {\n    pub seeds: Vec\u003cPdaSeed\u003e,\n    /// Optional `program` field for cross-program PDAs.\n    #[serde(default)]\n    pub program: Option\u003cString\u003e,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct PdaSeed {\n    pub kind: String,\n    #[serde(default)]\n    pub value: Option\u003cString\u003e,\n    /// Path into another account's field, for `Account::data` seeds.\n    #[serde(default)]\n    pub path: Option\u003cString\u003e,\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","enjo","anchor-sentinel","src","idl","mod.rs"],"content":"//! IDL loader: detect Anchor IDL version and produce a unified `ProgramIr`.\n//!\n//! Auto-detect heuristic:\n//!   - Top-level `\"version\"` string starting with `\"0.30\"` or later → 0.30+.\n//!   - Otherwise (e.g. `\"0.0.0\"`, `\"0.29.0\"`, missing) → legacy 0.29.\n//!   - When uncertain we fall through to legacy first, then modern, and accept\n//!     whichever succeeds.\n\npub mod ir;\npub mod v29;\npub mod v30;\npub mod v31;\n\nuse anyhow::{anyhow, Context, Result};\nuse std::path::Path;\n\nuse ir::{\n    AccountDef, ErrorDef, EventDef, IdlVersion, Instruction, InstructionAccount, InstructionArg,\n    PdaDerivation, PdaSeed, ProgramIr, TypeDef, TypeField,\n};\n\n/// Load a single IDL file from disk and convert to the unified IR.\npub fn load_idl(path: \u0026Path) -\u003e Result\u003cProgramIr\u003e {\n    let raw = std::fs::read_to_string(path)\n        .with_context(|| format!(\"reading IDL file {}\", path.display()))?;\n    let json: serde_json::Value = serde_json::from_str(\u0026raw)\n        .with_context(|| format!(\"parsing IDL file {} as JSON\", path.display()))?;\n    from_value(json, \u0026path.display().to_string())\n}\n\n/// Build a `ProgramIr` from a raw `serde_json::Value`, auto-detecting the\n/// IDL dialect.\npub fn from_value(json: serde_json::Value, source_path: \u0026str) -\u003e Result\u003cProgramIr\u003e {\n    if json.get(\"metadata\").is_some() \u0026\u0026 json.get(\"version\").is_none() {\n        let parsed: v31::IdlFile = serde_json::from_value(json)\n            .with_context(|| format!(\"deserializing IDL (v31) from {source_path}\"))?;\n        return Ok(convert_v31(parsed, source_path));\n    }\n\n    let version_str = json\n        .get(\"version\")\n        .and_then(|v| v.as_str())\n        .unwrap_or(\"0.0.0\")\n        .to_string();\n\n    let detected = detect_version(\u0026version_str);\n    match detected {\n        IdlVersion::V30Plus =\u003e {\n            let parsed: v30::IdlFile = serde_json::from_value(json)\n                .with_context(|| format!(\"deserializing IDL (v30) from {source_path}\"))?;\n            Ok(convert_v30(parsed, source_path))\n        }\n        IdlVersion::V29 =\u003e {\n            let parsed: v29::IdlFile = serde_json::from_value(json)\n                .with_context(|| format!(\"deserializing IDL (v29) from {source_path}\"))?;\n            Ok(convert_v29(parsed, source_path))\n        }\n    }\n}\n\nfn detect_version(version_str: \u0026str) -\u003e IdlVersion {\n    let minor = version_str\n        .strip_prefix(\"0.\")\n        .and_then(|s| s.split('.').next())\n        .and_then(|s| s.parse::\u003cu32\u003e().ok())\n        .unwrap_or(0);\n    if minor \u003e= 30 {\n        IdlVersion::V30Plus\n    } else {\n        IdlVersion::V29\n    }\n}\n\nfn convert_v31(idl: v31::IdlFile, source_path: \u0026str) -\u003e ProgramIr {\n    let instructions = idl\n        .instructions\n        .into_iter()\n        .map(|ix| Instruction {\n            name: ix.name,\n            accounts: ix\n                .accounts\n                .into_iter()\n                .map(|a| {\n                    let is_signer = a.signer || a.relations.iter().any(|r| r == \"project\");\n                    InstructionAccount {\n                        name: a.name,\n                        is_mut: a.writable,\n                        is_signer,\n                        pda: a.pda.map(|p| PdaDerivation {\n                            seeds: p\n                                .seeds\n                                .into_iter()\n                                .map(|s| {\n                                    let value = s.value.and_then(|v| match v {\n                                        serde_json::Value::Array(arr) =\u003e {\n                                            let bytes: Vec\u003cu8\u003e = arr\n                                                .iter()\n                                                .filter_map(|x| x.as_u64().map(|n| n as u8))\n                                                .collect();\n                                            String::from_utf8(bytes).ok()\n                                        }\n                                        serde_json::Value::String(s) =\u003e Some(s.clone()),\n                                        _ =\u003e None,\n                                    });\n                                    PdaSeed {\n                                        kind: s.kind,\n                                        value,\n                                        path: s.path.or(s.account),\n                                    }\n                                })\n                                .collect(),\n                            program: p.program,\n                        }),\n                        address: a.address,\n                    }\n                })\n                .collect(),\n            args: ix\n                .args\n                .into_iter()\n                .map(|a| {\n                    let ty_str = a.ty.as_ref().map(|v| v.to_string()).unwrap_or_default();\n                    InstructionArg {\n                        name: a.name,\n                        ty: ty_str,\n                    }\n                })\n                .collect(),\n            discriminator: ix.discriminator,\n        })\n        .collect();\n\n    let accounts = idl\n        .accounts\n        .into_iter()\n        .map(|a| AccountDef {\n            name: a.name,\n            discriminator: a.discriminator,\n        })\n        .collect();\n\n    let types = idl\n        .types\n        .into_iter()\n        .filter_map(|t| {\n            let name = t.name.clone();\n            let body = t.body()?;\n            let fields = body\n                .fields\n                .iter()\n                .map(|f| TypeField {\n                    name: f.name.clone(),\n                    ty: serde_json::to_string(\u0026f.ty).unwrap_or_else(|_| \"string\".to_string()),\n                })\n                .collect();\n            Some(TypeDef {\n                name,\n                kind: body.kind.clone(),\n                fields,\n            })\n        })\n        .collect();\n\n    let events = idl\n        .events\n        .into_iter()\n        .map(|e| EventDef { name: e.name })\n        .collect();\n\n    let errors = idl\n        .errors\n        .into_iter()\n        .map(|e| ErrorDef {\n            code: e.code,\n            name: e.name,\n            msg: e.msg,\n        })\n        .collect();\n\n    ProgramIr {\n        version: IdlVersion::V30Plus,\n        name: idl.metadata.name,\n        instructions,\n        accounts,\n        types,\n        events,\n        errors,\n        source_path: source_path.to_string(),\n    }\n}\n\nfn convert_v30(idl: v30::IdlFile, source_path: \u0026str) -\u003e ProgramIr {\n    let instructions = idl\n        .instructions\n        .into_iter()\n        .map(|ix| Instruction {\n            name: ix.name,\n            accounts: ix\n                .accounts\n                .into_iter()\n                .map(|a| {\n                    let (is_mut, is_signer) = match (a.is_mut, a.is_signer) {\n                        (Some(m), Some(s)) =\u003e (m, s),\n                        _ =\u003e (a.writable, a.signer),\n                    };\n                    InstructionAccount {\n                        name: a.name,\n                        is_mut,\n                        is_signer,\n                        pda: a.pda.map(|p| PdaDerivation {\n                            seeds: p\n                                .seeds\n                                .into_iter()\n                                .map(|s| PdaSeed {\n                                    kind: s.kind,\n                                    value: s.value,\n                                    path: s.path,\n                                })\n                                .collect(),\n                            program: p.program,\n                        }),\n                        address: a.address,\n                    }\n                })\n                .collect(),\n            args: ix\n                .args\n                .into_iter()\n                .map(|a| InstructionArg {\n                    name: a.name,\n                    ty: a.ty,\n                })\n                .collect(),\n            discriminator: ix.discriminator,\n        })\n        .collect();\n\n    let accounts = idl\n        .accounts\n        .into_iter()\n        .map(|a| AccountDef {\n            name: a.name,\n            discriminator: a.discriminator,\n        })\n        .collect();\n\n    let types = idl\n        .types\n        .into_iter()\n        .map(|t| {\n            let fields =\n                t.ty.as_ref()\n                    .map(|b| {\n                        b.fields\n                            .iter()\n                            .map(|f| TypeField {\n                                name: f.name.clone(),\n                                ty: f.ty.clone(),\n                            })\n                            .collect()\n                    })\n                    .unwrap_or_default();\n            TypeDef {\n                name: t.name,\n                kind: t.kind,\n                fields,\n            }\n        })\n        .collect();\n\n    let events = idl\n        .events\n        .into_iter()\n        .map(|e| EventDef { name: e.name })\n        .collect();\n\n    let errors = idl\n        .errors\n        .into_iter()\n        .map(|e| ErrorDef {\n            code: e.code,\n            name: e.name,\n            msg: e.msg,\n        })\n        .collect();\n\n    ProgramIr {\n        version: IdlVersion::V30Plus,\n        name: idl.name,\n        instructions,\n        accounts,\n        types,\n        events,\n        errors,\n        source_path: source_path.to_string(),\n    }\n}\n\nfn convert_v29(idl: v29::IdlFile, source_path: \u0026str) -\u003e ProgramIr {\n    let instructions = idl\n        .instructions\n        .into_iter()\n        .map(|ix| Instruction {\n            name: ix.name,\n            accounts: ix\n                .accounts\n                .into_iter()\n                .map(|a| InstructionAccount {\n                    name: a.name,\n                    is_mut: a.is_mut,\n                    is_signer: a.is_signer,\n                    pda: None,\n                    address: None,\n                })\n                .collect(),\n            args: ix\n                .args\n                .into_iter()\n                .map(|a| InstructionArg {\n                    name: a.name,\n                    ty: a.ty,\n                })\n                .collect(),\n            discriminator: None,\n        })\n        .collect();\n\n    let accounts = idl\n        .accounts\n        .into_iter()\n        .map(|a| AccountDef {\n            name: a.name,\n            discriminator: None,\n        })\n        .collect();\n\n    let types = idl\n        .types\n        .into_iter()\n        .map(|t| TypeDef {\n            name: t.name,\n            kind: t.kind.unwrap_or_else(|| t.ty.kind.clone()),\n            fields: t\n                .ty\n                .fields\n                .into_iter()\n                .map(|f| TypeField {\n                    name: f.name,\n                    ty: f.ty,\n                })\n                .collect(),\n        })\n        .collect();\n\n    let events = idl\n        .events\n        .into_iter()\n        .map(|e| EventDef { name: e.name })\n        .collect();\n\n    let errors = idl\n        .errors\n        .into_iter()\n        .map(|e| ErrorDef {\n            code: e.code,\n            name: e.name,\n            msg: e.msg,\n        })\n        .collect();\n\n    ProgramIr {\n        version: IdlVersion::V29,\n        name: idl.name,\n        instructions,\n        accounts,\n        types,\n        events,\n        errors,\n        source_path: source_path.to_string(),\n    }\n}\n\n/// Find every `*.json` IDL file in a project. Anchor places them at\n/// `target/idl/\u003cprogram_name\u003e.json` after `anchor build`.\npub fn discover_idl_files(project: \u0026Path) -\u003e Result\u003cVec\u003cstd::path::PathBuf\u003e\u003e {\n    use walkdir::WalkDir;\n\n    let target_dir = project.join(\"target\").join(\"idl\");\n    let mut found = Vec::new();\n\n    if target_dir.is_dir() {\n        for entry in WalkDir::new(\u0026target_dir)\n            .max_depth(2)\n            .into_iter()\n            .filter_map(|e| e.ok())\n        {\n            let p = entry.path();\n            if p.extension().and_then(|s| s.to_str()) == Some(\"json\") {\n                found.push(p.to_path_buf());\n            }\n        }\n    }\n\n    if found.is_empty() {\n        return Err(anyhow!(\n            \"no IDL files found under {}. Run `anchor build` first to generate target/idl/.\",\n            target_dir.display()\n        ));\n    }\n\n    found.sort();\n    Ok(found)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use serde_json::json;\n\n    #[test]\n    fn detects_v30_idl() {\n        let v = json!({\n            \"version\": \"0.30.0\",\n            \"name\": \"demo\",\n            \"instructions\": [{\n                \"name\": \"initialize\",\n                \"accounts\": [{ \"name\": \"user\", \"writable\": true, \"signer\": true }],\n                \"args\": [],\n                \"discriminator\": [1,2,3,4,5,6,7,8]\n            }],\n            \"types\": [],\n            \"events\": [],\n =\u003e {\n            eprintln!(\"error: {e:#}\");\n            ExitCode::from(2)\n        }\n    }\n}\n\nfn run(cli: Cli) -\u003e Result\u003cExitCode\u003e {\n    match cli.command {\n        Command::Scan {\n            path,\n            format,\n            strict,\n            ignore,\n            min_severity,\n            verbose,\n        } =\u003e cmd_scan(\u0026path, format, strict, \u0026ignore, min_severity, verbose),\n        Command::Rules =\u003e {\n            cmd_rules();\n            Ok(ExitCode::SUCCESS)\n        }\n        Command::Version =\u003e {\n            println!(\"sentinel {}\", env!(\"CARGO_PKG_VERSION\"));\n            Ok(ExitCode::SUCCESS)\n        }\n        Command::Explain { rule_id } =\u003e {\n            cmd_explain(\u0026rule_id);\n            Ok(ExitCode::SUCCESS)\n        }\n    }\n}\n\nfn cmd_scan(\n    path: \u0026str,\n    format: cli::OutputFormat,\n    strict: bool,\n    ignore: \u0026[String],\n    min_severity: Option\u003ccli::MinSeverity\u003e,\n    verbose: bool,\n) -\u003e Result\u003cExitCode\u003e {\n    let project = std::path::Path::new(path);\n    if !project.exists() {\n        anyhow::bail!(\"project path does not exist: {}\", project.display());\n    }\n\n    let cfg = config::Config::load(project);\n\n    let mut all_ignore: Vec\u003cString\u003e = cfg.ignore_rules().to_vec();\n    for i in ignore {\n        if !all_ignore.contains(i) {\n            all_ignore.push(i.clone());\n        }\n    }\n\n    let effective_min_severity = min_severity.or_else(|| {\n        cfg.min_severity()\n            .and_then(|s| match s.to_lowercase().as_str() {\n                \"info\" =\u003e Some(cli::MinSeverity::Info),\n                \"low\" =\u003e Some(cli::MinSeverity::Low),\n                \"medium\" =\u003e Some(cli::MinSeverity::Medium),\n                \"high\" =\u003e Some(cli::MinSeverity::High),\n                \"critical\" =\u003e Some(cli::MinSeverity::Critical),\n                _ =\u003e None,\n            })\n    });\n\n    if matches!(format, cli::OutputFormat::Text) {\n        text::print_hero(\u0026project.display().to_string(), \u0026cfg);\n    }\n\n    let t_total_start = Instant::now();\n\n    let t_load_start = Instant::now();\n    if verbose {\n        eprintln!(\"[*] Loading project...\");\n    }\n    let loaded = loader::load(project, cfg.exclude_paths()).context(\"loading project\")?;\n    if loaded.idl_files.is_empty() {\n        anyhow::bail!(\n            \"no IDL files found. Run `anchor build` inside the project first \\\n             so that target/idl/*.json is populated.\"\n        );\n    }\n    let t_load = t_load_start.elapsed();\n    if verbose {\n        eprintln!(\n            \"[+] Loaded {} IDL file(s), {} program(s) in {:?}\",\n            loaded.idl_files.len(),\n            loaded.programs.len(),\n            t_load\n        );\n    }\n\n    let t_parse_start = Instant::now();\n    if verbose {\n        eprintln!(\"[*] Parsing IDLs...\");\n    }\n    let programs = loader::parse_idls(\u0026loaded).context(\"parsing IDLs\")?;\n    let t_parse = t_parse_start.elapsed();\n    if verbose {\n        let total_instrs: usize = programs.iter().map(|p| p.instructions.len()).sum();\n        eprintln!(\n            \"[+] Parsed {} program(s) with {} instruction(s) in {:?}\",\n            programs.len(),\n            total_instrs,\n            t_parse\n        );\n    }\n\n    let t_ast_start = Instant::now();\n    if verbose {\n        eprintln!(\"[*] Analyzing source code...\");\n    }\n    let ast_hints = ast::collect_hints(\u0026loaded.programs);\n    let t_ast = t_ast_start.elapsed();\n    if verbose {\n        eprintln!(\"[+] AST analysis complete in {:?}\", t_ast);\n    }\n\n    let t_rules_start = Instant::now();\n    if verbose {\n        eprintln!(\"[*] Running security rules...\");\n    }\n    let mut all_findings = Vec::new();\n    let rule_count = engine::registry::list_rule_ids().len();\n    for (i, ir) in programs.iter().enumerate() {\n        if verbose {\n            eprintln!(\"[*] Checking program {} of {}...\", i + 1, programs.len());\n        }\n        let ctx = AnalysisContext {\n            ir: ir.clone(),\n            ast_hints: ast_hints.clone(),\n        };\n        all_findings.extend(engine::run_all_rules(\u0026ctx)?);\n    }\n    let t_rules = t_rules_start.elapsed();\n    let t_total = t_total_start.elapsed();\n    if verbose {\n        eprintln!(\n            \"[+] Executed {} rule(s) in {:?} (total: {:?})\",\n            rule_count, t_rules, t_total\n        );\n    }\n\n    let timings = ScanTimings {\n        load: t_load,\n        parse_idls: t_parse,\n        ast_hints: t_ast,\n        run_rules: t_rules,\n        total: t_total,\n    };\n\n    if !all_ignore.is_empty() {\n        all_findings.retain(|f| !all_ignore.iter().any(|i| i == \u0026f.rule));\n    }\n\n    let min = effective_min_severity.map(|m| m.into_severity());\n    if let Some(min) = min {\n        all_findings.retain(|f| f.severity \u003e= min);\n    }\n\n    let programs_count = loaded.programs.len();\n    let instructions_count: usize = programs.iter().map(|p| p.instructions.len()).sum();\n\n    match format {\n        cli::OutputFormat::Sarif =\u003e {\n            println!(\"{}\", report::sarif::render(\u0026all_findings));\n        }\n        cli::OutputFormat::Json =\u003e {\n            println!(\"{}\", report::json::render(\u0026all_findings));\n        }\n        cli::OutputFormat::Text =\u003e {\n            let scan_report = text::ScanReport {\n                timings: text::ScanTimings {\n                    load: timings.load,\n                    parse_idls: timings.parse_idls,\n                    ast_hints: timings.ast_hints,\n                    run_rules: timings.run_rules,\n                    total: timings.total,\n                },\n                programs: programs_count,\n                instructions: instructions_count,\n                rules_executed: rule_count,\n                findings: \u0026all_findings,\n            };\n            text::print_pipeline(\u0026scan_report.timings);\n            text::print_security_overview(\u0026all_findings);\n            text::print_findings(\u0026all_findings);\n            text::print_statistics(\u0026scan_report);\n            text::print_verdict(\u0026all_findings);\n        }\n    }\n\n    let has_blocking = if let Some(min) = min {\n        all_findings.iter().any(|f| f.severity \u003e= min)\n    } else {\n        strict \u0026\u0026 all_findings.iter().any(|f| f.severity \u003e Severity::Info)\n    };\n\n    if has_blocking {\n        Ok(ExitCode::from(1))\n    } else {\n        Ok(ExitCode::SUCCESS)\n    }\n}\n\nfn cmd_rules() {\n    text::print_rules_table();\n}\n\nfn cmd_explain(rule_id: \u0026str) {\n    if let Some(explain) = report::explain::get_explanation(rule_id) {\n        println!();\n        println!(\"{}\", \"=\".repeat(70));\n        println!(\"⚓ {}\", explain.title);\n        println!(\"{}\", \"=\".repeat(70));\n        println!();\n        println!(\"ID:        {}\", explain.id);\n        println!(\"Severity:  {}\", explain.severity);\n        println!();\n        println!(\"{}\", \"-\".repeat(70));\n        println!(\"WHAT\");\n        println!(\"{}\", \"-\".repeat(70));\n        println!(\"{}\", explain.what);\n        println!();\n        println!(\"{}\", \"-\".repeat(70));\n        println!(\"WHY THIS IS DANGEROUS\");\n        println!(\"{}\", \"-\".repeat(70));\n        println!(\"{}\", explain.why);\n        println!();\n        println!(\"{}\", \"-\".repeat(70));\n        println!(\"VULNERABLE EXAMPLE\");\n        println!(\"{}\", \"-\".repeat(70));\n        for line in explain.vulnerable_example.lines() {\n            println!(\"{}\", line);\n        }\n        println!();\n        println!(\"{}\", \"-\".repeat(70));\n        println!(\"SAFE EXAMPLE\");\n        println!(\"{}\", \"-\".repeat(70));\n        for line in explain.safe_example.lines() {\n            println!(\"{}\", line);\n        }\n        println!();\n        if let Some(ref_url) = explain.exploit_ref {\n            println!(\"{}\", \"-\".repeat(70));\n            println!(\"EXPLOIT REFERENCE\");\n            println!(\"{}\", \"-\".repeat(70));\n            println!(\"{}\", ref_url);\n        }\n        if let Some(pat) = explain.detection_pattern {\n            println!(\"{}\", \"-\".repeat(70));\n            println!(\"DETECTION PATTERN\");\n            println!(\"{}\", \"-\".repeat(70));\n            for line in pat.lines() {\n                println!(\"{}\", line);\n            }\n        }\n        if let Some(see_also) = explain.see_also {\n            println!();\n            println!(\"{}\", \"-\".repeat(70));\n            println!(\"SEE ALSO\");\n            println!(\"{}\", \"-\".repeat(70));\n            for rule in see_also {\n                println!(\"  • `sentinel explain {}`\", rule);\n            }\n        }\n        println!();\n        println!(\"{}\", \"=\".repeat(70));\n        println!();\n        println!(\"Learn more: Run `sentinel scan .` to detect this pattern in your code.\");\n        println!(\"See also: `sentinel rules` for all security rules.\");\n    } else {\n        eprintln!(\"error: unknown rule '{}'\", rule_id);\n        eprintln!(\"Run `sentinel rules` to see all available rules.\");\n    }\n}\n","traces":[{"line":30,"address":[],"length":0,"stats":{"Line":29}},{"line":31,"address":[],"length":0,"stats":{"Line":29}},{"line":32,"address":[],"length":0,"stats":{"Line":0}},{"line":33,"address":[],"length":0,"stats":{"Line":0}},{"line":34,"address":[],"length":0,"stats":{"Line":0}},{"line":37,"address":[],"length":0,"stats":{"Line":58}},{"line":39,"address":[],"length":0,"stats":{"Line":29}},{"line":40,"address":[],"length":0,"stats":{"Line":56}},{"line":41,"address":[],"length":0,"stats":{"Line":1}},{"line":42,"address":[],"length":0,"stats":{"Line":1}},{"line":43,"address":[],"length":0,"stats":{"Line":1}},{"line":48,"addr
