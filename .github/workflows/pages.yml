name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deployment; queueing newer runs and
# dropping older ones keeps the gh-pages branch consistent.
concurrency:
  group: pages
  cancel-in-progress: false

# The peaceiris action pushes directly to the `gh-pages` branch, so
# we need write access to the repo. `contents: write` is enough —
# we don't need the `pages:` permission that the official
# actions/deploy-pages action requires.
permissions:
  contents: write

jobs:
  build-and-deploy:
    name: build-wasm + deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install wasm-pack
        # Install via cargo (slow but reliable — the curl|sh installer
        # hits a dash-vs-bash issue on the GitHub-hosted runners).
        run: cargo install wasm-pack --locked

      - name: Build WASM module into playground/pkg/
        run: wasm-pack build --target web --out-dir playground/pkg

      - name: Deploy playground/ to the gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        # peaceiris picks up `GITHUB_TOKEN` automatically when the
        # workflow has `contents: write` (which we set above), but the
        # action's auth check still wants to see an explicit token in
        # some runners. Setting `github_token: ${{ secrets.GITHUB_TOKEN }}`
        # makes the lookup unambiguous.
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # The directory that becomes the published site root.
          # We deploy `playground/` itself so `playground/index.html` is
          # the site's index page. The `pkg/` subdirectory is included
          # in the same publish, so the WASM module is reachable at
          # `/pkg/anchor_sentinel.js` from the page.
          publish_dir: ./playground
          # Don't keep history; this branch is rebuilt from scratch
          # on every push to main.
          force_orphan: true
          # Keep the existing branch clean while we push.
          commit_message: "deploy: anchor-sentinel playground (commit ${{ github.sha }})"
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
