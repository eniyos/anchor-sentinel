name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

# Direct git push to gh-pages — `contents: write` is enough.
permissions:
  contents: write

jobs:
  build-and-deploy:
    name: deploy playground to gh-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The WASM module (`playground/pkg/`) is checked into the repo
      # rather than built in CI. This is the simplest reliable deploy:
      # `actions/checkout` gives us the entire source tree (HTML,
      # README, and the prebuilt WASM pkg/) in one filesystem view,
      # which we then rsync to a freshly-cloned gh-pages branch and
      # push. Building in CI was attempted but the file-copy tools
      # (`cp -R`, `rsync`) consistently failed to copy the contents
      # of `playground/pkg/` even though `ls` and `find` could see
      # them — see git history for the full debugging saga.
      #
      # The tradeoff: the WASM is only refreshed when someone
      # rebuilds it locally (`wasm-pack build --target web
      # --out-dir playground/pkg` + commit) and pushes. That's a
      # manual step tied to rule changes, which are rare. The README
      # documents the rebuild procedure.
      - name: Deploy playground/ to gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TMPDIR=$(mktemp -d)
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git clone --depth=1 --branch=gh-pages \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "$TMPDIR"
          # Copy the source playground/ into the cloned gh-pages tree.
          # `--delete` ensures deleted files in the new build actually
          # go away; `--exclude '.git'` keeps the cloned repo's own
          # git dir intact. The trailing `/` on the source means
          # "copy the contents of playground/", not "create
          # playground/ inside the dest".
          rsync -a --delete --exclude '.git' ./playground/ "$TMPDIR"/
          cd "$TMPDIR"
          git add --all
          # Allow no-op commits (e.g. re-running the workflow on the
          # same SHA doesn't error out).
          git diff --cached --quiet || \
            git commit -m "deploy: anchor-sentinel playground (commit ${GITHUB_SHA})"
          git push origin gh-pages --force
