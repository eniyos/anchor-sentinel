s":[],"length":0,"stats":{"Line":0}},{"line":285,"address":[],"length":0,"stats":{"Line":0}},{"line":286,"address":[],"length":0,"stats":{"Line":0}},{"line":287,"address":[],"length":0,"stats":{"Line":0}},{"line":288,"address":[],"length":0,"stats":{"Line":0}},{"line":289,"address":[],"length":0,"stats":{"Line":0}},{"line":291,"address":[],"length":0,"stats":{"Line":0}},{"line":292,"address":[],"length":0,"stats":{"Line":0}},{"line":293,"address":[],"length":0,"stats":{"Line":0}},{"line":294,"address":[],"length":0,"stats":{"Line":0}},{"line":295,"address":[],"length":0,"stats":{"Line":0}},{"line":296,"address":[],"length":0,"stats":{"Line":0}},{"line":299,"address":[],"length":0,"stats":{"Line":0}},{"line":300,"address":[],"length":0,"stats":{"Line":0}},{"line":301,"address":[],"length":0,"stats":{"Line":0}},{"line":302,"address":[],"length":0,"stats":{"Line":0}},{"line":303,"address":[],"length":0,"stats":{"Line":0}},{"line":304,"address":[],"length":0,"stats":{"Line":0}},{"line":305,"address":[],"length":0,"stats":{"Line":0}},{"line":308,"address":[],"length":0,"stats":{"Line":0}},{"line":309,"address":[],"length":0,"stats":{"Line":0}},{"line":310,"address":[],"length":0,"stats":{"Line":0}},{"line":311,"address":[],"length":0,"stats":{"Line":0}},{"line":312,"address":[],"length":0,"stats":{"Line":0}},{"line":314,"address":[],"length":0,"stats":{"Line":0}},{"line":315,"address":[],"length":0,"stats":{"Line":0}}],"covered":85,"coverable":179},{"path":["/","Users","enjo","anchor-sentinel","src","report","explain.rs"],"content":"//! Detailed explanations for each security rule.\n//!\n//! These are used by `sentinel explain \u003crule\u003e` to teach developers\n//! why a pattern is dangerous, with vulnerable/safe examples and\n//! real-world exploit references.\n\nuse crate::engine::Severity;\n\npub struct Explain {\n    pub id: \u0026'static str,\n    pub title: \u0026'static str,\n    pub severity: Severity,\n    pub what: \u0026'static str,\n    pub why: \u0026'static str,\n    pub vulnerable_example: \u0026'static str,\n    pub safe_example: \u0026'static str,\n    pub exploit_ref: Option\u003c\u0026'static str\u003e,\n    pub see_also: Option\u003c\u0026'static [\u0026'static str]\u003e,\n    pub detection_pattern: Option\u003c\u0026'static str\u003e,\n}\n\npub fn get_explanation(rule_id: \u0026str) -\u003e Option\u003cExplain\u003e {\n    match rule_id {\n        \"cpi_signer_seed_validation\" =\u003e Some(Explain {\n            id: \"cpi_signer_seed_validation\",\n            title: \"Dynamic CPI Signer Seeds\",\n            severity: Severity::Critical,\n            what: \"An `invoke_signed` call uses signer seeds that cannot be verified at analysis time.\",\n            why: r#\"PDA derivation uses `ctx.bumps` or `b\"literal\"` — safe. But if seeds contain function arguments or unresolvable expressions, an attacker can compute their own valid PDA and have the program sign for it.\n\nThis is the \"fake PDA\" exploit: the attacker calls the program with attacker-controlled seeds, and `invoke_signed` produces a signature for an address only the attacker knows.\"#,\n            vulnerable_example: r#\"// VULNERABLE: seeds include user-controlled `args.nonce`\ninvoke_signed(\n    \u0026ctx.accounts.target,\n    \u0026ctx.accounts.system_program,\n    args.nonce,  // attacker controls this!\n    \u0026[\n        b\"account\",\n        ctx.accounts.user.to_account_info().key.as_ref(),\n        args.nonce.to_le_bytes().as_ref(),\n    ],\n)\"#,\n            safe_example: r#\"// SAFE: use canonical bump from ctx.bumps\ninvoke_signed(\n    \u0026ctx.accounts.target,\n    \u0026ctx.accounts.system_program,\n    \u0026[],\n    \u0026[\n        b\"account\",\n        ctx.accounts.user.to_account_info().key.as_ref(),\n        \u0026[ctx.bumps.target],\n    ],\n)\"#,\n            exploit_ref: Some(\"https://github.com/coral-xyz/sealevel-attacks#arbitrary-cpi\"),\n            see_also: Some(\u0026[\"missing_signer\", \"pda_misconfig\"]),\n            detection_pattern: Some(r#\"invoke_signed(..., seeds: [..., user_arg, ...])\n// or\ninvoke_signed(..., seeds: [..., args.nonce, ...])\"#),\n        }),\n        \"missing_balance_check\" =\u003e Some(Explain {\n            id: \"missing_balance_check\",\n            title: \"Missing Balance Check\",\n            severity: Severity::Critical,\n            what: \"Lamports are debited from an account without a preceding balance check.\",\n            why: r#\"If you subtract `amount` from an account without checking `account.lamports() \u003e= amount`, two things can happen:\n\n1. **Underflow panic** — The transaction fails, giving the attacker a DoS vector\n2. **Wraparound drain** — If SOL prices fluctuate, the account wraps to max u64 and the attacker gets a windfall\n\nThis pattern has drained real vaults on mainnet.\"#,\n            vulnerable_example: r#\"// VULNERABLE: no balance check\npub fn withdraw(ctx: \u0026Context\u003cWithdraw\u003e, amount: u64) -\u003e Result\u003c()\u003e {\n    let user = \u0026mut ctx.accounts.user;\n    user.lamports -= amount;  // can underflow!\n    ctx.accounts.vault.lamports += amount;\n    Ok(())\n}\"#,\n            safe_example: r#\"// SAFE: check balance before debit\npub fn withdraw(ctx: \u0026Context\u003cWithdraw\u003e, amount: u64) -\u003e Result\u003c()\u003e {\n    let user = \u0026mut ctx.accounts.user;\n    require!(user.lamports() \u003e= amount, MyError::InsufficientFunds);\n    user.lamports -= amount;\n    ctx.accounts.vault.lamports += amount;\n    Ok(())\n}\"#,\n            exploit_ref: Some(\"https://github.com/coral-xyz/sealevel-attacks#signer-authorization\"),\n            see_also: Some(\u0026[\"missing_balance_check\", \"missing_ownership\"]),\n            detection_pattern: Some(r#\"user.lamports -= amount;\n// No preceding: require!(user.lamports() \u003e= amount, ...)\"#),\n        }),\n        \"missing_signer\" =\u003e Some(Explain {\n            id: \"missing_signer\",\n            title: \"Missing Signer Check\",\n            severity: Severity::Critical,\n            what: \"An account is typed as `AccountInfo` but not marked as a signer in the IDL.\",\n            why: r#\"`AccountInfo` is the unsafe escape hatch — there's no runtime signer check unless you opt in. If the field name suggests authority (user, authority, admin, owner), it should be a `Signer` type.\n\nAttackers can pass any pubkey for this field and bypass authorization.\"#,\n            vulnerable_example: r#\"// IDL: signer: false (or missing)\n// Rust: AccountInfo instead of Signer\n#[derive(Accounts)]\npub struct WithdrawArgs\u003c'info\u003e {\n    pub user: AccountInfo\u003c'info\u003e,  // not marked as signer!\n    pub vault: Account\u003c'info, Vault\u003e,\n}\n\n// In handler:\npub fn withdraw(ctx: \u0026Context\u003cWithdrawArgs\u003e, amount: u64) -\u003e Result\u003c()\u003e {\n    ctx.accounts.vault.amount -= amount;\n    // No signer check! Anyone can withdraw.\n}\"#,\n            safe_example: r#\"// SAFE: use Signer type\n#[derive(Accounts)]\npub struct WithdrawArgs\u003c'info\u003e {\n    #[account(mut)]\n    pub user: Signer\u003c'info\u003e,  // runtime enforces signer\n    #[account(mut, has_one = user)]\n    pub vault: Account\u003c'info, Vault\u003e,\n}\"#,\n            exploit_ref: Some(\"https://github.com/coral-xyz/sealevel-attacks#signer-authorization\"),\n            see_also: Some(\u0026[\"missing_balance_check\", \"missing_ownership\", \"pda_misconfig\"]),\n            detection_pattern: Some(r#\"pub user: AccountInfo\u003c'info\u003e  // not Signer\u003c'info\u003e\n// IDL: signer: false or absent\"#),\n        }),\n        \"missing_bump_seed_canonicalization\" =\u003e Some(Explain {\n            id: \"missing_bump_seed_canonicalization\",\n            title: \"Non-Canonical PDA Bump\",\n            severity: Severity::High,\n            what: \"A PDA account uses a non-canonical bump (hardcoded or from error).\",\n            why: r#\"PDAs are derived from `find_program_address(seeds, program_id)`. The bump is the value that makes the derivation succeed. There's exactly ONE canonical bump — the highest one found.\n\nIf you hardcode `bump = authority` or `bump = first_8_bytes` instead of using `ctx.bumps.target`, an attacker can:\n1. Find the canonical bump\n2. Derive a different PDA with the same seeds but the canonical bump\n3. Access both accounts independently\n\nThis breaks account uniqueness guarantees.\"#,\n            vulnerable_example: r#\"// VULNERABLE: non-canonical bump\n#[derive(Accounts)]\npub struct InitializeArgs\u003c'info\u003e {\n    #[account(\n        init,\n        payer = user,\n        space = Vault::SIZE,\n        seeds = [b\"vault\", user.key().as_ref()],\n        bump = authority,  // can be anything that works!\n    )]\n    pub vault: Account\u003c'info, Vault\u003e,\n    pub user: Signer\u003c'info\u003e,\n}\"#,\n            safe_example: r#\"// SAFE: use canonical bump\n#[derive(Accounts)]\npub struct InitializeArgs\u003c'info\u003e {\n    #[account(\n        init,\n        payer = user,\n        space = Vault::SIZE,\n        seeds = [b\"vault\", user.key().as_ref()],\n        bump,  // uses ctx.bumps.vault (canonical)\n    )]\n    pub vault: Account\u003c'info, Vault\u003e,\n    pub user: Signer\u003c'info\u003e,\n}\"#,\n            exploit_ref: Some(\"https://github.com/coral-xyz/sealevel-attacks#bump-seed-canonicalization\"),\n            see_also: Some(\u0026[\"pda_misconfig\", \"missing_signer\"]),\n            detection_pattern: Some(r#\"seeds = [...], bump = user_bump\n// or\nseeds = [...], bump = args.nonce\"#),\n        }),\n        \"duplicate_mutable_accounts\" =\u003e Some(Explain {\n            id: \"duplicate_mutable_accounts\",\n            title: \"Duplicate Mutable Accounts\",\n            severity: Severity::High,\n            what: \"Two or more mutable `AccountInfo` accounts could reference the same pubkey.\",\n            why: r#\"If an instruction accepts `account_a` and `account_b` both as `AccountInfo` (mutable), an attacker can pass the same pubkey for both. Operations on \"different\" accounts actually modify the same account.\n\nExample: debit from `account_a`, credit to `account_b` — if they're the same, the attacker drains the account twice.\"#,\n            vulnerable_example: r#\"// VULNERABLE: both are AccountInfo\n#[derive(Accounts)]\npub struct TransferArgs\u003c'info\u003e {\n    pub from: AccountInfo\u003c'info\u003e,   // attacker can set = to\n    pub to: AccountInfo\u003c'info\u003e,     // and pass same pubkey\n    pub authority: Signer\u003c'info\u003e,\n}\n\npub fn transfer(ctx: \u0026Context\u003cTransferArgs\u003e, amount: u64) -\u003e Result\u003c()\u003e {\n    let from = \u0026mut ctx.accounts.from;\n    let to = \u0026mut ctx.accounts.to;\n    from.lamports -= amount;  // subtracts from same account\n    to.lamports += amount;   // adds to same account\n    // Net effect: no change, but account debited!\n}\"#,\n            safe_example: r#\"// SAFE: use typed accounts with anchor constraint\n#[derive(Accounts)]\npub struct TransferArgs\u003c'info\u003e {\n    #[account(mut)]\n    pub from: Account\u003c'info, TokenAccount\u003e,\n    #[account(mut, constraint = from.owner == authority.key())]\n    pub to: Account\u003c'info, TokenAccount\u003e,\n    pub authority: Signer\u003c'info\u003e,\n}\n// Anchor's Account\u003c'info, T\u003e type-checks uniqueness\n// for both accounts. Can't pass the same pubkey.\"#,\n            exploit_ref: Some(\"https://github.com/coral-xyz/sealevel-attacks#duplicate-mutable-accounts\"),\n            see_also: Some(\u0026[\"missing_signer\", \"missing_mut\"]),\n            detection_pattern: Some(r#\"pub a: AccountInfo\u003c'info\u003e,  // two or more\npub b: AccountInfo\u003c'info\u003e,  // of these\"#),\n        }),\n        \"missing_ownership\" =\u003e Some(Explain {\n            id: \"missing_ownership\",\n            title: \"Missing Ownership Check\",\n            severity: Severity::High,\n            what: \"A mutable account lacks an owner constraint, allowing arbitrary data deserialization.\",\n            why: r#\"When an account is typed as `AccountInfo` (not `Account\u003c'info, T\u003e`), the runtime doesn't enforce type safety. An attacker can pass a malicious program as the account, deserialize their own data, and bypass security checks.\n\nWithout `owner = my_program_id`, any account (even a TOKEN_PROGRAM account) can be passed and deserialized as your type.\"#,\n            vulnerable_example: r#\"// VULNERABLE: no owner constraint\n#[derive(Accounts)]\npub struct DepositArgs\u003c'info\u003e {\n    pub vault: AccountInfo\u003c'info\u003e,  // no owner check!\n    pub user: Signer\u003c'info\u003e,\n    pub system_program: AccountInfo\u003c'info\u003e,\n}\n\n// In handler:\npub fn deposit(ctx: \u0026Context\u003cDepositArgs\u003e, amount: u64) -\u003e Result\u003c()\u003e {\n    let vault = Vault::try_from(\u0026ctx.accounts.vault)?;\n    // Can deserialize attacker-controlled account as Vault!\n}\"#,\n            safe_example: r#\"// SAFE: enforce owner\n#[derive(Accounts)]\npub struct DepositArgs\u003c'info\u003e {\n    #[account(mut, owner = system_program::ID)]\n    pub vault: SystemAccount\u003c'info\u003e,\n    #[account(mut)]\n    pub user: Signer\u003c'info\u003e,\n    pub system_program: Program\u003c'info, System\u003e,\n}\n// Only SystemAccount (owned by system_program) accepted\n// Attacker can't pass a fake account.\"#,\n            exploit_ref: Some(\"https://github.com/coral-xyz/sealevel-attacks#account-data-matching\"),\n            see_also: Some(\u0026[\"missing_signer\", \"pda_misconfig\"]),\n            detection_pattern: Some(r#\"pub vault: AccountInfo\u003c'info\u003e\n// No: owner = Program::ID or System\"#),\n        }),\n        \"missing_reinit_guard\" =\u003e Some(Explain {\n            id: \"missing_reinit_guard\",\n            title: \"Reinitialization Risk\",\n            severity: Severity::High,\n            what: \"`init_if_needed` without a reinit discriminator guard allows account reinitialization.\",\n            why: r#\"`init_if_needed` skips initialization if the account already exists. But an attacker can:\n1. Initialize an account with their data\n2. Call your instruction with `init_if_needed`\n3. Since the account exists, initialization is skipped... but only sometimes!\n\nThis creates unpredictable state. Some deployments reinit (if account is zeroed), others don't.\"#,\n            vulnerable_example: r#\"// VULNERABLE: init_if_needed without reinit guard\n#[derive(Accounts)]\npub struct InitTokenArgs\u003c'info\u003e {\n    #[account(init_if_needed, payer = user, space = Token::SIZE)]\n    pub token: Account\u003c'info, Token\u003e,\n    pub user: Signer\u003c'info\u003e,\n    pub system_program: Program\u003c'info, System\u003e,\n}\n// If attacker zeroes the account, reinitializes with their data\n// If account has existing data, initialization skipped\n// Inconsistent behavior!\"#,\n            safe_example: r#\"// SAFE: add discriminator check\n#[derive(Accounts)]\npub struct InitTokenArgs\u003c'info\u003e {\n    #[account(mut, payer = user)]\n    pub token: Account\u003c'info, Token\u003e,\n    pub user: Signer\u003c'info\u003e,\n}\n\npub fn init_token(ctx: \u0026Context\u003cInitTokenArgs\u003e) -\u003e Result\u003c()\u003e {\n    // Check discriminator instead of relying on init_if_needed\n    require!(\n        ctx.accounts.token.discriminator == 0,\n        TokenError::AlreadyInitialized\n    );\n    ctx.accounts.token.set_inner(Token::new());\n    Ok(())\n}\"#,\n            exploit_ref: Some(\"https://github.com/coral-xyz/sealevel-attacks#reinitialization\"),\n            see_also: Some(\u0026[\"missing_close_authority\", \"missing_signer\"]),\n            detection_pattern: Some(r#\"#[account(init_if_needed, ...)]\npub state: Account\u003c'info, State\u003e\n// No: has_one = authority or constraint = ...\"#),\n        }),\n        \"lamports_drain\" =\u003e Some(Explain {\n            id: \"lamports_drain\",\n            title: \"Unauthorized Lamports Drain\",\n            severity: Severity::High,\n            what: \"Lamports are zeroed from an account without verifying caller authorization.\",\n            why: r#\"Setting an account's lamports to 0 (via `set_lamports(0)` or `**account.try_borrow_mut_lamports()? = 0`) transfers the rent-exempt deposit to... nowhere.\n\nIf this is done without verifying the caller is authorized (e.g., a `close` function), anyone can drain the account's SOL.\"#,\n            vulnerable_example: r#\"// VULNERABLE: no authority check\npub fn close_token(ctx: \u0026Context\u003cCloseToken\u003e) -\u003e Result\u003c()\u003e {\n    let dest = ctx.accounts.destination.to_account_info();\n    let source = ctx.accounts.token.to_account_info();\n\n    // Transfers lamports to destination\n    **dest.lamports.borrow_mut() += source.lamports();\n    **source.lamports.borrow_mut() = 0;\n    // No authority check! Anyone can close.\n}\"#,\n            safe_example: r#\"// SAFE: check authority before closing\n#[derive(Accounts)]\npub struct CloseToken\u003c'info\u003e {\n    #[account(mut, close = authority)]\n    pub token: Account\u003c'info, Token\u003e,\n    pub authority: Signer\u003c'info\u003e,  // must be signer\n}\n\n// In handler:\npub fn close_token(ctx: \u0026Context\u003cCloseToken\u003e) -\u003e Result\u003c()\u003e {\n    // Anchor verified authority signed this tx\n    ctx.accounts.token.close(ctx.accounts.authority.to_account_info());\n    Ok(())\n}\"#,\n            exploit_ref: Some(\"https://github.com/coral-xyz/sealevel-attacks#closing-accounts\"),\n            see_also: Some(\u0026[\"missing_close_authority\"]),\n            detection_pattern: Some(r#\"**dest.lamports.borrow_mut() += source.lamports();\n**source.lamports.borrow_mut() = 0;\n// No authority verification before drain\"#),\n        }),\n        \"missing_close_authority\" =\u003e Some(Explain {\n            id: \"missing_close_authority\",\n            title: \"Missing Close Authority\",\n            severity: Severity::High,\n            what: \"Account close constraint lacks authorization check.\",\n            why: r#\"`close = target` sends the rent-exempt lamports to `target` when the account closes. If `close` is set to a plain `AccountInfo` (not a `Signer`), anyone can provide that pubkey and claim the lamports.\n\nThis is a griefing/draining vector for accounts with significant SOL deposits.\"#,\n            vulnerable_example: r#\"// VULNERABLE: close to non-signer\n#[derive(Accounts)]\npub struct CreateDataArgs\u003c'info\u003e {\n    #[account(init, payer = user, space = 100)]\n    pub data: Account\u003c'info, Data\u003e,\n    pub user: Signer\u003c'info\u003e,\n    #[account(close = attacker)]  // attacker controls this!\n    pub data2: Account\u003c'info, Data\u003e,\n    pub attacker: AccountInfo\u003c'info\u003e,  // not a signer!\n    pub system_program: Program\u003c'info, System\u003e,\n}\"#,\n            safe_example: r#\"// SAFE: close to authority (who must sign)\n#[derive(Accounts)]\npub struct CreateDataArgs\u003c'info\u003e {\n    #[account(init, payer = user, space = 100)]\n    pub data: Account\u003c'info, Data\u003e,\n    pub user: Signer\u003c'info\u003e,\n    pub authority: Signer\u003c'info\u003e,\n}\n\n#[derive(Accounts)]\npub struct CloseDataArgs\u003c'info\u003e {\n    #[account(mut, close = authority)]\n    pub data: Account\u003c'info, Data\u003e,\n    pub authority: Signer\u003c'info\u003e,  // must sign\n}\"#,\n            exploit_ref: Some(\"https://github.com/coral-xyz/sealevel-attacks#closing-accounts\"),\n            see_also: Some(\u0026[\"lamports_drain\", \"missing_signer\"]),\n            detection_pattern: Some(r#\"#[account(close = target)]\npub data: Account\u003c'info, Data\u003e\n// target is AccountInfo, not Signer\"#),\n        }),\n        \"pda_misconfig\" =\u003e Some(Explain {\n            id: \"pda_misconfig\",\n            title: \"PDA Misconfiguration\",\n            severity: Severity::High,\n            what: \"PDA seeds are missing or use a non-canonical bump.\",\n            why: r#\"A PDA without seeds or with a hardcoded bump can be derived by anyone. Combined with missing `mut` or `signer` constraints, this allows attackers to manipulate account state.\n\nWithout proper seeds, the program can't verify the account was created through the correct derivation path.\"#,\n            vulnerable_example: r#\"// VULNERABLE: missing bump constraint\n#[derive(Accounts)]\npub struct CreateVaultArgs\u003c'info\u003e {\n    #[account(init, payer = user, space = Vault::SIZE)]\n    pub vault: Account\u003c'info, Vault\u003e,\n    // Missing: seeds = [...], bump = ...\n    pub user: Signer\u003c'info\u003e,\n    pub system_program: Program\u003c'info, System\u003e,\n}\"#,\n            safe_example: r#\"// SAFE: proper seeds and bump\n#[derive(Accounts)]\npub struct CreateVaultArgs\u003c'info\u003e {\n    #[account(\n        init,\n        payer = user,\n        space = Vault::SIZE,\n        seeds = [b\"vault\", user.key().as_ref()],\n        bump\n    )]\n    pub vault: Account\u003c'info, Vault\u003e,\n    pub user: Signer\u003c'info\u003e,\n    pub system_program: Program\u003c'info, System\u003e,\n}\"#,\n            exploit_ref: Some(\"https://github.com/coral-xyz/sealevel-attacks#bump-seed-canonicalization\"),\n            see_also: Some(\u0026[\"missing_bump_seed_canonicalization\", \"missing_signer\"]),\n            detection_pattern: Some(r#\"PDA account without seeds = [...]\n// or with init but missing bump\"#),\n        }),\n        \"unsafe_arithmetic\" =\u003e Some(Explain {\n            id: \"unsafe_arithmetic\",\n            title: \"Unsafe Arithmetic\",\n            severity: Severity::Medium,\n            what: \"Integer arithmetic without overflow checking in a program instruction.\",\n            why: r#\"On-chain, arithmetic overflow/underflow PANICS in release builds. This creates:\n- **Denial of Service**: transactions fail, blocking the program\n- **Logic bugs**: wraparound can bypass checks\n\nWhile panics prevent silent data corruption, they enable DoS attacks.\"#,\n            vulnerable_example: r#\"// VULNERABLE: unchecked arithmetic\npub fn transfer(ctx: \u0026Context\u003cTransfer\u003e, amount: u64) -\u003e Result\u003c()\u003e {\n    let from = \u0026mut ctx.accounts.from;\n    let to = \u0026mut ctx.accounts.to;\n\n    from.amount -= amount;  // PANIC if underflow!\n    to.amount += amount;   // PANIC if overflow!\n\n    Ok(())\n}\"#,\n            safe_example: r#\"// SAFE: checked arithmetic\npub fn transfer(ctx: \u0026Context\u003cTransfer\u003e, amount: u64) -\u003e Result\u003c()\u003e {\n    let from = \u0026mut ctx.accounts.from;\n    let to = \u0026mut ctx.accounts.to;\n\n    from.amount = from.amount.checked_sub(amount)\n        .ok_or(MyError::InsufficientFunds)?;\n    to.amount = to.amount.checked_add(amount)\n        .ok_or(MyError::Overflow)?;\n\n    Ok(())\n}\"#,\n            exploit_ref: None,\n            see_also: Some(\u0026[\"missing_ownership\"]),\n            detection_pattern: Some(r#\"from.amount -= amount;  // unchecked -, +, *, /\nto.amount += amount;     // no .checked_*()\"#),\n        }),\n        \"missing_mut\" =\u003e Some(Explain {\n            id: \"missing_mut\",\n            title: \"Missing Mut Constraint\",\n            severity: Severity::Medium,\n            what: \"An account that should be mutable is not declared with `#[account(mut)]`.\",\n            why: r#\"Without `#[account(mut)]`, the runtime rejects transactions that modify the account. The error is confusing (`transaction failed`) rather than a clear security signal, making debugging harder.\n\nIt's also a code smell — if the handler modifies an account but the IDL doesn't show it as mutable, there's a mismatch.\"#,\n            vulnerable_example: r#\"// IDL says: ddress":[],"length":0,"stats":{"Line":1}}],"covered":423,"coverable":423},{"path":["/","Users","enjo","anchor-sentinel","src","report","json.rs"],"content":"//! JSON report output. Stable schema; snapshot-tested.\n\nuse serde::Serialize;\n\nuse crate::engine::{Finding, Severity};\n\n#[derive(Debug, Serialize)]\npub struct Report {\n    pub findings: Vec\u003cFinding\u003e,\n    pub summary: Summary,\n}\n\n#[derive(Debug, Serialize)]\npub struct Summary {\n    pub critical: usize,\n    pub high: usize,\n    pub medium: usize,\n    pub low: usize,\n    pub info: usize,\n    pub total: usize,\n}\n\npub fn build_report(findings: \u0026[Finding]) -\u003e Report {\n    // Sort findings deterministically so JSON snapshots are stable across\n    // platforms. The emission order from the rule engine depends on\n    // `inventory` plugin registration, which the linker lays out differently\n    // on macOS vs Linux; without a sort, CI fails with snapshot drift even\n    // when the rule output is otherwise identical.\n    let mut sorted: Vec\u003cFinding\u003e = findings.to_vec();\n    sorted.sort_by(|a, b| {\n        (\u0026a.rule, \u0026a.instruction, \u0026a.account, a.line, a.column).cmp(\u0026(\n            \u0026b.rule,\n            \u0026b.instruction,\n            \u0026b.account,\n            b.line,\n            b.column,\n        ))\n    });\n\n    let mut summary = Summary {\n        critical: 0,\n        high: 0,\n        medium: 0,\n        low: 0,\n        info: 0,\n        total: sorted.len(),\n    };\n    for f in \u0026sorted {\n        match f.severity {\n            Severity::Critical =\u003e summary.critical += 1,\n            Severity::High =\u003e summary.high += 1,\n            Severity::Medium =\u003e summary.medium += 1,\n            Severity::Low =\u003e summary.low += 1,\n            Severity::Info =\u003e summary.info += 1,\n        }\n    }\n    Report {\n        findings: sorted,\n        summary,\n    }\n}\n\npub fn render(findings: \u0026[Finding]) -\u003e String {\n    let report = build_report(findings);\n    serde_json::to_string_pretty(\u0026report).expect(\"finding JSON always serializes\")\n}\n","traces":[{"line":23,"address":[],"length":0,"stats":{"Line":19}},{"line":29,"address":[],"length":0,"stats":{"Line":76}},{"line":30,"address":[],"length":0,"stats":{"Line":345}},{"line":31,"address":[],"length":0,"stats":{"Line":1842}},{"line":32,"address":[],"length":0,"stats":{"Line":614}},{"line":33,"address":[],"length":0,"stats":{"Line":614}},{"line":34,"address":[],"length":0,"stats":{"Line":614}},{"line":35,"address":[],"length":0,"stats":{"Line":307}},{"line":36,"address":[],"length":0,"stats":{"Line":307}},{"line":46,"address":[],"length":0,"stats":{"Line":19}},{"line":48,"address":[],"length":0,"stats":{"Line":129}},{"line":49,"address":[],"length":0,"stats":{"Line":110}},{"line":50,"address":[],"length":0,"stats":{"Line":54}},{"line":51,"address":[],"length":0,"stats":{"Line":36}},{"line":52,"address":[],"length":0,"stats":{"Line":16}},{"line":53,"address":[],"length":0,"stats":{"Line":0}},{"line":54,"address":[],"length":0,"stats":{"Line":4}},{"line":63,"address":[],"length":0,"stats":{"Line":19}},{"line":64,"address":[],"length":0,"stats":{"Line":57}},{"line":65,"address":[],"length":0,"stats":{"Line":76}}],"covered":19,"coverable":20},{"path":["/","Users","enjo","anchor-sentinel","src","report","mod.rs"],"content":"//! Report generators for the CLI.\n//!\n//! `text` is the human-readable output.\n//! `json` and `sarif` are machine-readable, byte-stable formats used\n//! by CI — they must remain free of ANSI codes and animations.\n//! `explain` provides detailed rule explanations for educational use.\n\npub mod explain;\npub mod json;\npub mod sarif;\npub mod text;\npub mod tty;\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","enjo","anchor-sentinel","src","report","sarif.rs"],"content":"//! SARIF (Static Analysis Results Interchange Format) output.\n//!\n//! SARIF 2.1.0 is the standard consumed by GitHub Code Scanning, VS Code\n//! Problems panel, and security dashboards. This module maps our internal\n//! `Finding` struct to the SARIF schema so that Sentinel can be plugged\n//! directly into CI pipelines.\n\nuse serde::Serialize;\n\nuse crate::engine::{Finding, Severity};\nuse crate::rules;\n\n/// Top-level SARIF log.\n#[derive(Debug, Serialize)]\npub struct SarifLog {\n    #[serde(rename = \"$schema\")]\n    schema: \u0026'static str,\n    version: \u0026'static str,\n    runs: Vec\u003cRun\u003e,\n}\n\n#[derive(Debug, Serialize)]\nstruct Run {\n    tool: Tool,\n    results: Vec\u003cResult\u003e,\n}\n\n#[derive(Debug, Serialize)]\nstruct Tool {\n    driver: Driver,\n}\n\n#[derive(Debug, Serialize)]\n#[serde(rename_all = \"camelCase\")]\nstruct Driver {\n    name: \u0026'static str,\n    version: \u0026'static str,\n    #[serde(rename = \"informationUri\")]\n    information_uri: \u0026'static str,\n    rules: Vec\u003cSarifRule\u003e,\n}\n\n#[derive(Debug, Serialize)]\n#[serde(rename_all = \"camelCase\")]\nstruct SarifRule {\n    id: String,\n    name: String,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    short_description: Option\u003cMessage\u003e,\n    #[serde(rename = \"helpUri\", skip_serializing_if = \"Option::is_none\")]\n    help_uri: Option\u003cString\u003e,\n    properties: RuleProperties,\n}\n\n#[derive(Debug, Serialize)]\n#[serde(rename_all = \"camelCase\")]\nstruct RuleProperties {\n    #[serde(rename = \"security-severity\")]\n    security_severity: f64,\n}\n\n#[derive(Debug, Serialize)]\n#[serde(rename_all = \"camelCase\")]\nstruct Result {\n    rule_id: String,\n    level: \u0026'static str,\n    message: Message,\n    locations: Vec\u003cLocation\u003e,\n}\n\n#[derive(Debug, Serialize)]\n#[serde(rename_all = \"camelCase\")]\nstruct Location {\n    physical_location: PhysicalLocation,\n}\n\n#[derive(Debug, Serialize)]\n#[serde(rename_all = \"camelCase\")]\nstruct PhysicalLocation {\n    artifact_location: ArtifactLocation,\n    region: Region,\n}\n\n#[derive(Debug, Serialize)]\n#[serde(rename_all = \"camelCase\")]\nstruct ArtifactLocation {\n    uri: String,\n}\n\n#[derive(Debug, Serialize)]\n#[serde(rename_all = \"camelCase\")]\nstruct Region {\n    start_line: usize,\n    start_column: usize,\n}\n\n#[derive(Debug, Serialize)]\nstruct Message {\n    text: String,\n}\n\nimpl Message {\n    fn new(s: impl Into\u003cString\u003e) -\u003e Self {\n        Self { text: s.into() }\n    }\n}\n\n/// Map severity to SARIF level + numeric security-severity.\nfn severity_map(sev: Severity) -\u003e (\u0026'static str, f64) {\n    match sev {\n        Severity::Critical =\u003e (\"error\", 9.5),\n        Severity::High =\u003e (\"error\", 8.0),\n        Severity::Medium =\u003e (\"warning\", 5.5),\n        Severity::Low =\u003e (\"note\", 3.0),\n        Severity::Info =\u003e (\"note\", 1.0),\n    }\n}\n\n/// Build the list of rule definitions from the registry.\nfn driver_rules() -\u003e Vec\u003cSarifRule\u003e {\n    let mut rules = rules::registered_rules();\n    rules.sort_by_key(|\u0026(id, _, _)| id);\n    rules\n        .into_iter()\n        .map(|(id, sev, desc)| {\n            let (_level, security_severity) = severity_map(sev);\n            SarifRule {\n                id: id.to_string(),\n                name: id.to_string(),\n                short_description: Some(Message::new(desc)),\n                help_uri: None,\n                properties: RuleProperties { security_severity },\n            }\n        })\n        .collect()\n}\n\n/// Render a `Finding` to a SARIF `Result`.\nfn finding_to_result(f: \u0026Finding) -\u003e Result {\n    let (level, _) = severity_map(f.severity);\n    let uri = f.file.clone().unwrap_or_default();\n    let start_line = f.line.unwrap_or(1);\n    let start_column = f.column.unwrap_or(1);\n\n    Result {\n        rule_id: f.rule.clone(),\n        level,\n        message: Message::new(\u0026f.message),\n        locations: vec![Location {\n            physical_location: PhysicalLocation {\n                artifact_location: ArtifactLocation { uri },\n                region: Region {\n                    start_line,\n                    start_column,\n                },\n            },\n        }],\n    }\n}\n\n/// Build a full SARIF log from a list of findings.\npub fn render(findings: \u0026[Finding]) -\u003e String {\n    let mut sorted = findings.to_vec();\n    sorted.sort_by(|a, b| {\n        (\u0026a.rule, \u0026a.instruction, \u0026a.account, a.line, a.column).cmp(\u0026(\n            \u0026b.rule,\n            \u0026b.instruction,\n            \u0026b.account,\n            b.line,\n            b.column,\n        ))\n    });\n    let log = SarifLog {\n        schema: \"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json\",\n        version: \"2.1.0\",\n        runs: vec![Run {\n            tool: Tool {\n                driver: Driver {\n                    name: \"anchor-sentinel\",\n                    version: env!(\"CARGO_PKG_VERSION\"),\n                    information_uri: \"https://github.com/eniyanyosuva/anchor-sentinel\",\n                    rules: driver_rules(),\n                },\n            },\n            results: sorted.iter().map(finding_to_result).collect(),\n        }],\n    };\n    serde_json::to_string_pretty(\u0026log).expect(\"SARIF JSON always serializes\")\n}\n","traces":[{"line":103,"address":[],"length":0,"stats":{"Line":84}},{"line":104,"address":[],"length":0,"stats":{"Line":84}},{"line":109,"address":[],"length":0,"stats":{"Line":84}},{"line":110,"address":[],"length":0,"stats":{"Line":84}},{"line":111,"address":[],"length":0,"stats":{"Line":30}},{"line":112,"address":[],"length":0,"stats":{"Line":30}},{"line":113,"address":[],"length":0,"stats":{"Line":24}},{"line":114,"address":[],"length":0,"stats":{"Line":0}},{"line":115,"address":[],"length":0,"stats":{"Line":0}},{"line":120,"address":[],"length":0,"stats":{"Line" _table` are the single entry points used by `main.rs`.\n//!\n//! All color calls are gated on `tty::interactive()`, so the test\n//! suite (which pipes stdout) gets a clean plain-text stream and the\n//! snapshot/integration tests don't need to filter ANSI escape codes.\n//!\n//! Design tenets:\n//!   1. Information first — risk + critical findings + verdict visible in 3s.\n//!   2. Severity driven — Critical dominates; Medium never competes visually.\n//!   3. Progressive disclosure — overview → findings → details.\n//!   4. Spacing over boxes — at most three \"cards\" (hero, overview, verdict).\n//!   5. Cargo-style tables (no box drawing) for the `sentinel rules` listing.\n\nuse std::time::Duration;\n\nuse colored::*;\n\nuse crate::engine::{Finding, Severity};\nuse crate::report::tty;\n\n/// Per-stage durations measured by `main.rs` around the four scan\n/// phases, plus a wall-clock total. All fields are wall-clock from\n/// the start of the corresponding phase (or the whole scan, for\n/// `total`).\n#[derive(Debug, Clone, Copy)]\npub struct ScanTimings {\n    pub load: Duration,\n    pub parse_idls: Duration,\n    pub ast_hints: Duration,\n    pub run_rules: Duration,\n    pub total: Duration,\n}\n\n/// Everything `main.rs` knows about a finished scan, bundled for the\n/// sectioned printers. Borrow-only — the caller owns the underlying\n/// data and is responsible for outliving these printers.\npub struct ScanReport\u003c'a\u003e {\n    pub timings: ScanTimings,\n    pub programs: usize,\n    pub instructions: usize,\n    pub rules_executed: usize,\n    pub findings: \u0026'a [Finding],\n}\n\nmod risk {\n    /// Compute the 0..=100 risk score from severity counts.\n    pub fn score(c: usize, h: usize, m: usize, l: usize) -\u003e u32 {\n        let penalty = (c as u32) * 25 + (h as u32) * 8 + (m as u32) * 3 + l as u32;\n        100u32.saturating_sub(penalty)\n    }\n\n    /// Letter grade derived from the score. A=90-100, B=75-89, C=50-74,\n    /// D=25-49, F=0-24. Bounded on both ends — saturating_sub in\n    /// `score` keeps us in 0..=100 so the match is exhaustive over\n    /// the natural range.\n    pub fn grade(s: u32) -\u003e \u0026'static str {\n        match s {\n            90..=100 =\u003e \"A\",\n            75..=89 =\u003e \"B\",\n            50..=74 =\u003e \"C\",\n            25..=49 =\u003e \"D\",\n            _ =\u003e \"F\",\n        }\n    }\n\n    /// Authoritative deployment recommendation. Critical findings\n    /// always produce `Blocked`, regardless of score. Otherwise the\n    /// score decides: 90+ → Approved, 50-89 → ReviewRequired,\n    /// \u003c50 → Blocked.\n    #[derive(Debug, Clone, Copy, PartialEq, Eq)]\n    pub enum Verdict {\n        Approved,\n        ReviewRequired,\n        Blocked,\n    }\n\n    /// The `(verdict, label)` pair the verdict printer renders. The\n    /// `\u0026'static str` is the headline (e.g. `\"DEPLOYMENT BLOCKED\"`);\n    /// the follow-up sentence is generated separately.\n    pub fn verdict(c: usize, h: usize, m: usize, l: usize) -\u003e (Verdict, \u0026'static str) {\n        if c \u003e= 1 {\n            return (Verdict::Blocked, \"DEPLOYMENT BLOCKED\");\n        }\n        let s = score(c, h, m, l);\n        match s {\n            90..=100 =\u003e (Verdict::Approved, \"DEPLOYMENT APPROVED\"),\n            50..=89 =\u003e (Verdict::ReviewRequired, \"DEPLOYMENT REVIEW REQUIRED\"),\n            _ =\u003e (Verdict::Blocked, \"DEPLOYMENT BLOCKED\"),\n        }\n    }\n\n    /// One-sentence follow-up for the verdict. Used by the Security\n    /// Overview block and the final Verdict block. The sentences are\n    /// designed to read naturally at any count — `1 finding` is\n    /// pluralized to `1 finding`, larger counts are bare plurals.\n    pub fn follow_up(c: usize, h: usize, m: usize, l: usize) -\u003e String {\n        // Critical override: always this exact phrasing, regardless of\n        // the score. Matches the user's spec example verbatim.\n        if c \u003e= 1 {\n            return pluralize(c, \"Critical finding\", \"Critical findings\")\n                + \" must be resolved before deployment.\";\n        }\n        let s = score(c, h, m, l);\n        if s \u003e= 90 {\n            // Approved path. The plan says \"No critical findings\n            // detected\" is the approved-state subline. We generalize\n            // to \"No critical or high-severity findings detected\" when\n            // both are zero, and to a count summary otherwise.\n            if h == 0 \u0026\u0026 m == 0 \u0026\u0026 l == 0 {\n                return \"No findings detected. Codebase is clean.\".to_string();\n            }\n            return \"No critical findings detected.\".to_string();\n        }\n        if s \u003e= 50 {\n            // Review required — surface the highest present severity.\n            if h \u003e 0 {\n                return pluralize(\n                    h,\n                    \"high-severity finding requires\",\n                    \"high-severity findings require\",\n                ) + \" review before deployment.\";\n            }\n            if m \u003e 0 {\n                return pluralize(\n                    m,\n                    \"medium-severity finding requires\",\n                    \"medium-severity findings require\",\n                ) + \" review before deployment.\";\n            }\n            return pluralize(\n                l,\n                \"low-severity finding requires\",\n                \"low-severity findings require\",\n            ) + \" review before deployment.\";\n        }\n        // Score \u003c50 with no critical: high-count saturated the score.\n        // Surface the dominant severity in the follow-up.\n        if h \u003e 0 {\n            return pluralize(h, \"high-severity finding is\", \"high-severity findings are\")\n                + \" blocking deployment.\";\n        }\n        if m \u003e 0 {\n            return pluralize(\n                m,\n                \"medium-severity finding is\",\n                \"medium-severity findings are\",\n            ) + \" blocking deployment.\";\n        }\n        pluralize(l, \"low-severity finding is\", \"low-severity findings are\")\n            + \" blocking deployment.\"\n    }\n\n    fn pluralize(n: usize, singular: \u0026str, plural: \u0026str) -\u003e String {\n        let word = if n == 1 { singular } else { plural };\n        format!(\"{n} {word}\")\n    }\n}\n\n/// Print the scan opener: a brand line, a tagline, and the target\n/// path. Three lines plus a blank. No box, no animation.\npub fn print_hero(project: \u0026str, config: \u0026crate::config::Config) {\n    if tty::interactive() {\n        // The brand line: ⚓ glyph in bright_cyan+bold, \"Anchor Sentinel\"\n        // in white+bold, version in dim. Per the spec the human-readable\n        // name is \"Anchor Sentinel\" (two words, title case), not the\n        // kebab-case binary name.\n        println!(\n            \"{} {} {}\",\n            \"⚓\".bright_cyan().bold(),\n            \"Anchor Sentinel\".white().bold(),\n            format!(\"v{}\", env!(\"CARGO_PKG_VERSION\")).dimmed()\n        );\n        println!(\n            \"{}\",\n            \"Static Security Analysis for Solana Programs\".dimmed()\n        );\n        println!();\n        println!(\"{}  {}\", \"Target:\".dimmed(), project);\n\n        // Show config info if loaded\n        if !config.exclude.paths.is_empty() {\n            println!(\n                \"{}  {} patterns\",\n                \"Exclude:\".dimmed(),\n                config.exclude.paths.len()\n            );\n        }\n        if !config.ignore.rules.is_empty() {\n            println!(\n                \"{}  {} rules\",\n                \"Ignore:\".dimmed(),\n                config.ignore.rules.len()\n            );\n        }\n    } else {\n        println!(\"Anchor Sentinel v{}\", env!(\"CARGO_PKG_VERSION\"));\n        println!(\"Static Security Analysis for Solana Programs\");\n        println!();\n        println!(\"Target:  {}\", project);\n        if !config.exclude.paths.is_empty() {\n            println!(\"Exclude:  {} patterns\", config.exclude.paths.len());\n        }\n        if !config.ignore.rules.is_empty() {\n            println!(\"Ignore:   {} rules\", config.ignore.rules.len());\n        }\n    }\n}\n\n/// Print the 5-stage pipeline status with per-stage durations. The\n/// `✓` is green; labels are plain; durations are dim and right-aligned\n/// in a 6-char field. TTY vs non-TTY diverge only on color, not on\n/// content — the test suite sees a clean plain-text pipeline.\npub fn print_pipeline(timings: \u0026ScanTimings) {\n    let stages: [(\u0026str, Duration); 5] = [\n        (\"Loaded rules\", timings.load),\n        (\"Parsed IDL\", timings.parse_idls),\n        (\"Built AST\", timings.ast_hints),\n        (\"Indexed accounts\", timings.ast_hints),\n        (\"Executed security checks\", timings.run_rules),\n    ];\n    for (label, dur) in stages {\n        let ms = dur.as_secs_f64() * 1000.0;\n        // Print duration as `412ms` for sub-second and `1.23s` for \u003e= 1s.\n        let dur_str = if ms \u003c 1000.0 {\n            format!(\"{:.0}ms\", ms)\n        } else {\n            format!(\"{:.2}s\", ms / 1000.0)\n        };\n        if tty::interactive() {\n            println!(\n                \"{}  {:\u003c26}{}\",\n                \"✓\".green().bold(),\n                label,\n                format!(\"{dur_str:\u003e8}\").dimmed()\n            );\n        } else {\n            println!(\"✓  {label:\u003c26}{dur_str:\u003e8}\");\n        }\n    }\n    let total_ms = timings.total.as_secs_f64() * 1000.0;\n    let total_str = if total_ms \u003c 1000.0 {\n        format!(\"{:.0}ms\", total_ms)\n    } else {\n        format!(\"{:.2}s\", total_ms / 1000.0)\n    };\n    println!();\n    if tty::interactive() {\n        println!(\"{} {}\", \"Completed in\".dimmed(), total_str.white().bold());\n    } else {\n        println!(\"Completed in {total_str}\");\n    }\n    println!();\n}\n\n/// Print the security overview block: per-severity counts, the risk\n/// score (with grade), and the verdict. The label column is\n/// left-padded to 15 chars so the numbers align vertically.\npub fn print_security_overview(findings: \u0026[Finding]) {\n    let (c, h, m, l) = count_by_severity(findings);\n    let s = risk::score(c, h, m, l);\n    let g = risk::grade(s);\n    let (_, label) = risk::verdict(c, h, m, l);\n    let follow = risk::follow_up(c, h, m, l);\n\n    if tty::interactive() {\n        println!(\"{}\", \"Security Overview\".white().bold());\n        println!();\n        println!(\"{:\u003c15}{}\", \"Critical\", c.to_string().bright_red().bold());\n        println!(\"{:\u003c15}{}\", \"High\", h.to_string().yellow().bold());\n        println!(\"{:\u003c15}{}\", \"Medium\", m.to_string().blue().bold());\n        println!(\"{:\u003c15}{}\", \"Low\", l.to_string().dimmed());\n        println!();\n        println!(\"{:\u003c15}{}\", \"Risk Score\", format!(\"{s}/100\").white().bold());\n        println!(\"{:\u003c15}{}\", \"Grade\", g.white().bold());\n        println!(\"{:\u003c15}{}\", \"Verdict\", label_string_colored(label).bold());\n        println!();\n        println!(\"{}\", follow);\n    } else {\n        println!(\"Security Overview\");\n        println!();\n        println!(\"{:\u003c15}{c}\", \"Critical\");\n        println!(\"{:\u003c15}{h}\", \"High\");\n        println!(\"{:\u003c15}{m}\", \"Medium\");\n        println!(\"{:\u003c15}{l}\", \"Low\");\n        println!();\n        println!(\"{:\u003c15}{s}/100\", \"Risk Score\");\n        println!(\"{:\u003c15}{g}\", \"Grade\");\n        println!(\"{:\u003c15}{label}\", \"Verdict\");\n        println!();\n        println!(\"{follow}\");\n    }\n}\n\n/// Color a verdict string by its category. Used by the Security\n/// Overview block; the final Verdict block (Section 6) does the same\n/// coloring via `verdict_color()`.\nfn label_string_colored(label: \u0026str) -\u003e String {\n    if label.contains(\"APPROVED\") {\n        label.green().to_string()\n    } else if label.contains(\"REVIEW\") {\n        label.yellow().to_string()\n    } else {\n        label.red().to_string()\n    }\n}\n\n/// Print all findings, grouped by severity (Critical → Info) and\n/// sorted by location within each group. A separator line of `─` is\n/// drawn between findings within a group; a blank line separates\n/// groups. If there are no findings, prints `✔ no findings` and\n/// returns.\npub fn print_findings(findings: \u0026[Finding]) {\n    if findings.is_empty() {\n        if tty::interactive() {\n            println!(\"{}\", \"✔ no findings\".green().bold());\n        } else {\n            println!(\"✔ no findings\");\n        }\n        println!();\n        return;\n    }\n\n    let order = [\n        Severity::Critical,\n        Severity::High,\n        Severity::Medium,\n        Severity::Low,\n        Severity::Info,\n    ];\n    for sev in order {\n        let mut group: Vec\u003c\u0026Finding\u003e = findings.iter().filter(|f| f.severity == sev).collect();\n        if group.is_empty() {\n            continue;\n        }\n        group.sort_by(|a, b| {\n            a.file\n                .as_deref()\n                .unwrap_or(\"\")\n                .cmp(b.file.as_deref().unwrap_or(\"\"))\n                .then(a.line.unwrap_or(0).cmp(\u0026b.line.unwrap_or(0)))\n                .then(a.column.unwrap_or(0).cmp(\u0026b.column.unwrap_or(0)))\n        });\n\n        // Group header.\n        if tty::interactive() {\n            println!(\n                \"{}\",\n                sev.as_str()\n                    .to_uppercase()\n                    .bold()\n                    .color(severity_color(sev))\n            );\n        } else {\n            println!(\"{}\", sev.as_str().to_uppercase());\n        }\n        println!();\n\n        for (i, f) in group.iter().enumerate() {\n            print_finding(f);\n            if i + 1 \u003c group.len() {\n                println!(\"{}\", \"─\".repeat(60).dimmed());\n            }\n        }\n        println!();\n    }\n}\n\nfn print_finding(f: \u0026Finding) {\n    let sev_color = severity_color(f.severity);\n    let dim = |s: \u0026str| s.dimmed().to_string();\n    let bullet_colored = \"●\".color(sev_color).bold().to_string();\n\n    let header = if let Some(ix) = \u0026f.instruction {\n        format!(\n            \"{bullet_colored}  {}{}\",\n            f.rule.color(sev_color).bold(),\n            dim(\u0026format!(\"  ·  {ix}\"))\n        )\n    } else {\n        format!(\"{bullet_colored}  {}\", f.rule.color(sev_color).bold())\n    };\n    println!(\"{header}\");\n\n    if let Some(file) = \u0026f.file {\n        let loc = if let Some(line) = f.line {\n            let col = f.column.map(|c| format!(\":{c}\")).unwrap_or_default();\n            format!(\"{file}:{line}{col}\")\n        } else {\n            file.clone()\n        };\n        println!();\n        println!(\"{}\", dim(\"Location:\"));\n        println!(\"  {loc}\");\n    }\n\n    if let Some(acct) = \u0026f.account {\n        println!();\n        println!(\"{}\", dim(\"Account:\"));\n        println!(\"  {acct}\");\n    }\n\n    println!();\n    println!(\"{}\", dim(\"Problem:\"));\n    for line in wrap_text(\u0026f.message, 100) {\n        println!(\"  {line}\");\n    }\n\n    if let Some(hint) = \u0026f.hint {\n        println!();\n        println!(\"{}\", dim(\"Recommendation:\"));\n        for line in wrap_text(hint, 100) {\n            println!(\"  {line}\");\n        }\n    }\n    // Trailing newline is added by the caller (separator or blank line).\n}\n\n/// Print a compact 4-row statistics block. Labels are left-padded to\n/// 22 chars, numbers are right-aligned. No header, no border.\npub fn print_statistics(report: \u0026ScanReport) {\n    println!(\"{}\", \"Statistics\".white().bold());\n    println!();\n    let rows: [(\u0026str, String); 4] = [\n        (\"Files analyzed\", report.programs.to_string()),\n        (\"Instructions analyzed\", report.instructions.to_string()),\n        (\"Rules executed\", report.rules_executed.to_string()),\n        (\"Findings detected\", report.findings.len().to_string()),\n    ];\n    for (label, value) in rows {\n        if tty::interactive() {\n            println!(\"{:\u003c22}{}\", label, value.bold());\n        } else {\n            println!(\"{label:\u003c22}{value}\");\n        }\n    }\n    println!();\n}\n\n/// Print the final verdict as the visual climax: the headline in\n/// bold + severity color, a blank line, and a one-sentence follow-up.\npub fn print_verdict(findings: \u0026[Finding]) {\n    let (c, h, m, l) = count_by_severity(findings);\n    let (kind, label) = risk::verdict(c, h, m, l);\n    let follow = risk::follow_up(c, h, m, l);\n    let colored = match kind {\n        risk::Verdict::Approved =\u003e label.green().bold(),\n        risk::Verdict::ReviewRequired =\u003e label.yellow().bold(),\n        risk::Verdict::Blocked =\u003e label.red().bold(),\n    };\n    if tty::interactive() {\n        println!(\"{colored}\");\n        println!();\n        println!(\"{follow}\");\n    } else {\n        println!(\"{label}\");\n        println!();\n        println!(\"{follow}\");\n    }\n}\n\n/// Tally findings into (critical, high, medium, low) — info is\n/// excluded from the score (spec lists only those four). The\n/// returned tuple's element order matches the penalty weights in\n/// `risk::score` (c, h, m, l) so the call site reads naturally.\nfn count_by_severity(findings: \u0026[Finding]) -\u003e (usize, usize, usize, usize) {\n    let mut c = 0;\n    let mut h = 0;\n    let mut m = 0;\n    let mut l = 0;\n    for f in findings {\n        match f.severity {\n            Severity::Critical =\u003e c += 1,\n            Severity::High =\u003e h += 1,\n            Severity::Medium =\u003e m += 1,\n            Severity::Low | Severity::Info =\u003e l += 1,\n        }\n    }\n    (c, h, m, l)\n}\n\n/// Map a severity to its `colored::Color` value. Used by both the\n/// group header and the per-finding bullet. Centralized so the\n/// 4-color palette is consistent across the formatter.\nfn severity_color(sev: Severity) -\u003e colored::Color {\n    match sev {\n        Severity::Critical =\u003e colored::Color::BrightRed,\n        Severity::High =\u003e colored::Color::Yellow,\n        Severity::Medium =\u003e colored::Color::Blue,\n        Severity::Low | Severity::Info =\u003e colored::Color::BrightBlack, // dim gray\n    }\n}\n\n/// Word-wrap `text` so no line exceeds `max_width` visible chars.\n/// Lines are broken on whitespace; if a single word is longer than\n/// `max_width` it is truncated to `max_width - 1` chars with `…`\n/// appended. Returns a `Vec\u003cString\u003e` of wrapped lines.\n///\n/// Width spec per the user's plan: 100 chars (matches the new\n/// findings layout, which has 2 chars of indent plus content).\nfn wrap_text(text: \u0026str, max_width: usize) -\u003e Vec\u003cString\u003e {\n    if max_width == 0 {\n        return vec![text.to_string()];\n    }\n    let mut out: Vec\u003cString\u003e = Vec::new();\n    let normalized: String = text.split_whitespace().collect::\u003cVec\u003c_\u003e\u003e().join(\" \");\n    if normalized.is_empty() {\n        return vec![String::new()];\n    }\n    let mut current = String::new();\n    for word in normalized.split(' ') {\n        if word.is_empty() {\n            continue;\n        }\n        let word_len = word.chars().count();\n        if word_len \u003e max_width {\n            if !current.is_empty() {\n                out.push(std::mem::take(\u0026mut current));\n            }\n            let truncated: String = word.chars().take(max_width.saturating_sub(1)).collect();\n            out.push(format!(\"{truncated}…\"));\n            continue;\n        }\n        if current.is_empty() {\n            current.push_str(word);\n        } else if current.chars().count() + 1 + word_len \u003c= max_width {\n            current.push(' ');\n            current.push_str(word);\n        } else {\n            out.push(std::mem::take(\u0026mut current));\n            current.push_str(word);\n        }\n    }\n    if !current.is_empty() {\n        out.push(current);\n    }\n    out\n}\n\n/// Print the `sentinel rules` listing in cargo style: a header line\n/// with the brand + count, a blank line, and an aligned table of\n/// rows. No `┌─┬─┐` borders. The `Layer` field comes from the\n/// `Rule` trait (added in the previous commit) so this table reads\n/// the layer info from the source of truth, not a parallel string\n/// map.\npub fn print_rules_table() {\n    let rules = crate::engine::registry::all_rules();\n    let header = \"⚓ Anchor Sentinel\";\n    if tty::interactive() {\n        println!(\n            \"{} {} {}\",\n            header.bright_cyan().bold(),\n            \"—\".dimmed(),\n            format!(\"{} rules active\", rules.len()).dimmed()\n        );\n    } else {\n        println!(\"{header} — {} rules active\", rules.len());\n    }\n    println!();\n\n    // Cargo-style columns: `ID RULE SEVERITY LAYER`. No `│` separators.\n    const ID_W: usize = 3;\n    const NAME_W: usize = 38;\n    const SEV_W: usize = 10;\n    const LAYER_W: usize = 8;\n\n    println!(\n        \"{:\u003cID_W$}  {:\u003cNAME_W$}  {:\u003cSEV_W$}  {:\u003cLAYER_W$}\",\n        \"ID\", \"Rule\", \"Severity\", \"Layer\"\n    );\n\n    let mut sorted = rules;\n    sorted.sort_by(|a, b| {\n        let ord = |s: \u0026Severity| match s {\n            Severity::Critical =\u003e 5,\n            Severity::High =\u003e 4,\n            Severity::Medium =\u003e 3,\n            Severity::Low =\u003e 2,\n            Severity::Info =\u003e 1,\n        };\n        ord(\u0026b.severity())\n            .cmp(\u0026ord(\u0026a.severity()))\n            .then(a.id().cmp(b.id()))\n    });\n\n    for (i, rule) in sorted.iter().enumerate() {\n        let id = rule.id();\n        let sev = rule.severity();\n        let layer = rule.layer();\n        let sev_label = sev.as_str().to_uppercase();\n        let sev_str = if tty::interactive() {\n            sev_label.color(severity_color(sev)).bold().to_string()\n        } else {\n            sev_label\n        };\n        let layer_str = if tty::interactive() {\n            layer.to_string().dimmed().to_string()\n        } else {\n            layer.to_string()\n        };\n        let id_display: String = if id.chars().count() \u003e NAME_W {\n            let truncated: String = id.chars().take(NAME_W - 1).collect();\n            format!(\"{truncated}…\")\n        } else {\n            id.to_string()\n        };\n        println!(\n            \"{n:\u003cID_W$}  {id_display:\u003cNAME_W$}  {sev_str:\u003cSEV_W$}  {layer_str:\u003cLAYER_W$}\",\n            n = i + 1,\n        );\n    }\n    println!();\n}\n\n#[cfg(test)]\nmod tests {\n    use super::risk;\n\n    #[test]\n    fn score_zero_findings_is_100() {\n        assert_eq!(risk::score(0, 0, 0, 0), 100);\n    }\n\n    #[test]\n    fn score_one_critical_is_75() {\n        assert_eq!(risk::score(1, 0, 0, 0), 75);\n    }\n\n    #[test]\n    fn score_two_crit_three_high_two_medium_is_20() {\n        assert_eq!(risk::score(2, 3, 2, 0), 20);\n    }\n\n    #[test]\n    fn score_floors_at_zero() {\n        assert_eq!(risk::score(5, 10, 5, 0), 0);\n    }\n\n    #[test]\n    fn grade_boundaries() {\n        assert_eq!(risk::grade(100), \"A\");\n        assert_eq!(risk::grade(90), \"A\");\n        assert_eq!(risk::grade(89), \"B\");\n        assert_eq!(risk::grade(75), \"B\");\n        assert_eq!(risk::grade(74), \"C\");\n        assert_eq!(risk::grade(50), \"C\");\n        assert_eq!(risk::grade(49), \"D\");\n        assert_eq!(risk::grade(25), \"D\");\n        assert_eq!(risk::grade(24), \"F\");\n        assert_eq!(risk::grade(0), \"F\");\n    }\n\n    #[test]\n    fn critical_always_blocks_even_at_high_score() {\n        let (v, label) = risk::verdict(1, 0, 0, 0);\n        assert_eq!(v, risk::Verdict::Blocked);\n        assert_eq!(label, \"DEPLOYMENT BLOCKED\");\n    }\n\n    #[test]\n    fn critical_override_survives_zero_penalty_other() {\n        let (v, _) = risk::verdict(3, 0, 0, 0);\n        assert_eq!(v, risk::Verdict::Blocked);\n    }\n\n    #[test]\n    fn high_only_at_89_is_review_required() {\n        let (v, label) = risk::verdict(0, 6, 0, 0);\n        assert_eq!(v, risk::Verdict::ReviewRequired);\n        assert_eq!(label, \"DEPLOYMENT REVIEW REQUIRED\");\n    }\n\n    #[test]\n    fn no_critical_high_or_above_means_approved() {\n        let (v, label) = risk::verdict(0, 0, 1, 1);\n        assert_eq!(v, risk::Verdict::Approved);\n        assert_eq!(label, \"DEPLOYMENT APPROVED\");\n    }\n\n    #[test]\n    fn follow_up_critical_singular_vs_plural() {\n        assert_eq!(\n            risk::follow_up(1, 0, 0, 0),\n            \"1 Critical finding must be resolved before deployment.\"\n        );\n        assert_eq!(\n            risk::follow_up(3, 0, 0, 0),\n            \"3 Critical findings must be resolved before deployment.\"\n        );\n    }\n}\n","traces":[{"line":49,"address":[],"length":0,"stats":{"Line":25}},{"line":50,"address":[],"length":0,"stats":{"Line":50}},{"line":51,"address":[],"length":0,"stats":{"Line":50}},{"line":58,"address":[],"length":0,"stats":{"Line":25}},{"line":59,"address":[],"length":0,"stats":{"Line":25}},{"line":60,"address":[],"length":0,"stats":{"Line":12}},{"line":61,"address":[],"length":0,"stats":{"Line":10}},{"line":62,"address":[],"length":0,"stats":{"Line":8}},{"line":63,"address":[],"length":0,"stats":{"Line":8}},{"line":64,"address":[],"length":0,"stats":{"Line":6}},{"line":82,"address":[],"length":0,"stats":{"Line":18}},{"line":83,"address":[],"length":0,"stats":{"Line":18}},{"line":84,"address":[],"length":0,"stats":{"Line":10}},{"line":86,"address":[],"length":0,"stats":{"Line":48}},{"line":87,"add store(false, Ordering::Relaxed);\n}\n\nfn compute() -\u003e bool {\n    // 1. NO_COLOR: any non-empty value disables color. We treat that\n    //    as a strong signal — also disable animation. The convention\n    //    is https://no-color.org.\n    if let Ok(v) = std::env::var(\"NO_COLOR\") {\n        if !v.is_empty() {\n            return false;\n        }\n    }\n    // 2. CI: most CI providers set CI=true. Also TERM=dumb for dumb\n    //    terminals. We allow color in plain CI (the SARIF-less\n    //    review workflow benefits from it) but skip animations that\n    //    would interfere with log scraping.\n    if std::env::var(\"CI\").ok().as_deref() == Some(\"true\")\n        || std::env::var(\"TERM\").ok().as_deref() == Some(\"dumb\")\n    {\n        return false;\n    }\n    // 3. Actually a terminal? When stdout is piped (the test suite\n    //    pipes it), this is false, and we get plain output.\n    std::io::stdout().is_terminal()\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn piping_stdout_disables_color() {\n        // The test suite always runs with stdout piped, so `interactive()`\n        // should return false here.\n        assert!(!interactive());\n    }\n}\n","traces":[{"line":27,"address":[],"length":0,"stats":{"Line":106}},{"line":28,"address":[],"length":0,"stats":{"Line":318}},{"line":29,"address":[],"length":0,"stats":{"Line":291}},{"line":31,"address":[],"length":0,"stats":{"Line":18}},{"line":32,"address":[],"length":0,"stats":{"Line":36}},{"line":33,"address":[],"length":0,"stats":{"Line":27}},{"line":34,"address":[],"length":0,"stats":{"Line":9}},{"line":40,"address":[],"length":0,"stats":{"Line":0}},{"line":41,"address":[],"length":0,"stats":{"Line":0}},{"line":42,"address":[],"length":0,"stats":{"Line":0}},{"line":45,"address":[],"length":0,"stats":{"Line":9}},{"line":49,"address":[],"length":0,"stats":{"Line":9}},{"line":50,"address":[],"length":0,"stats":{"Line":0}},{"line":51,"address":[],"length":0,"stats":{"Line":0}},{"line":58,"address":[],"length":0,"stats":{"Line":9}},{"line":59,"address":[],"length":0,"stats":{"Line":9}},{"line":61,"address":[],"length":0,"stats":{"Line":0}},{"line":65,"address":[],"length":0,"stats":{"Line":18}}],"covered":12,"coverable":18},{"path":["/","Users","enjo","anchor-sentinel","src","rules","cpi_signer_seed_validation.rs"],"content":"//! `cpi_signer_seed_validation` — flags `invoke_signed` calls whose signer\n//! seeds cannot be verified at analysis time.\n//!\n//! In Solana, `invoke_signed` lets a program sign on behalf of a PDA it\n//! owns. The runtime derives the PDA from the seeds the program passes\n//! in, so the seeds themselves are the only thing standing between\n//! legitimate and forged signing. If the seeds come from user input\n//! (function args, account fields without `.key().as_ref()`, or any\n//! unresolvable expression) the attacker can compute their own valid\n//! PDA and have the program sign for it. The Sealevel-Attacks \"fake\n//! PDA\" and \"withdraw without signing\" patterns both rely on this.\n//!\n//! Severity: Critical — direct fund drain, often paired with a downstream\n//! `lamports -= amount` that the user-facing report doesn't see.\n//!\n//! Safe seed forms:\n//!   - `b\"...\"` byte string literal\n//!   - `ctx.bumps.\u003cident\u003e` — Anchor-managed canonical bump\n//!   - `\u003cexpr\u003e.key().as_ref()` on a known account field\n//!\n//! Anything else (function args, locally-bound variables, unresolvable\n//! expressions) is treated as Dynamic and produces a Critical finding.\n\nuse anyhow::Result;\n\nuse crate::engine::{\n    AnalysisContext, AstHintKind, Finding, Layer, Rule, Severity, SignerSeedClass,\n};\n\npub struct CpiSignerSeedValidation;\n\nimpl Rule for CpiSignerSeedValidation {\n    fn id(\u0026self) -\u003e \u0026'static str {\n        \"cpi_signer_seed_validation\"\n    }\n    fn description(\u0026self) -\u003e \u0026'static str {\n        \"invoke_signed uses dynamic signer seeds that cannot be verified at analysis time\"\n    }\n    fn severity(\u0026self) -\u003e Severity {\n        Severity::Critical\n    }\n    fn layer(\u0026self) -\u003e Layer {\n        Layer::Ast\n    }\n\n    fn check(\u0026self, ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e {\n        let mut out = Vec::new();\n\n        for hint in \u0026ctx.ast_hints {\n            if let AstHintKind::CpiInvokeSigned {\n                seeds,\n                seed_summary,\n                ..\n            } = \u0026hint.kind\n            {\n                if matches!(seeds, SignerSeedClass::Safe | SignerSeedClass::Absent) {\n                    continue;\n                }\n\n                let mut b = Finding::builder(\n                    self.id(),\n                    self.severity(),\n                    format!(\n                        \"invoke_signed uses dynamic signer seeds that cannot be verified at analysis time — ensure seeds are derived from canonical PDAs (ctx.bumps.\u003cname\u003e) not user input. Detected seeds: `{seed_summary}`.\"\n                    ),\n                )\n                .program(\u0026ctx.ir.name)\n                .hint(\n                    \"Replace dynamic seeds with: a `b\\\"literal\\\"` byte string, `ctx.bumps.\u003cfield\u003e` for the canonical bump, or `ctx.accounts.\u003caccount\u003e.key().as_ref()` for a known account's pubkey. Never pass function arguments or user-controlled data as signer seeds.\",\n                );\n                b = hint.location().stamp(b);\n                out.push(b.build());\n            }\n        }\n\n        Ok(out)\n    }\n}\n","traces":[{"line":33,"address":[],"length":0,"stats":{"Line":40}},{"line":34,"address":[],"length":0,"stats":{"Line":40}},{"line":36,"address":[],"length":0,"stats":{"Line":30}},{"line":37,"address":[],"length":0,"stats":{"Line":30}},{"line":39,"address":[],"length":0,"stats":{"Line":40}},{"line":40,"address":[],"length":0,"stats":{"Line":40 ate::engine::{\n    field_hint_index, AnalysisContext, AstHintKind, Finding, Layer, Rule, Severity,\n};\n\npub struct DuplicateMutableAccounts;\n\nimpl Rule for DuplicateMutableAccounts {\n    fn id(\u0026self) -\u003e \u0026'static str {\n        \"duplicate_mutable_accounts\"\n    }\n    fn description(\u0026self) -\u003e \u0026'static str {\n        \"Multiple mutable `AccountInfo` args could reference the same pubkey\"\n    }\n    fn severity(\u0026self) -\u003e Severity {\n        Severity::High\n    }\n    fn layer(\u0026self) -\u003e Layer {\n        Layer::IdlAst\n    }\n\n    fn check(\u0026self, ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e {\n        let mut ast_safe: HashSet\u003cString\u003e = HashSet::new();\n        let mut ast_account_info: HashSet\u003cString\u003e = HashSet::new();\n        let hint_index = field_hint_index(ctx);\n        for hint in \u0026ctx.ast_hints {\n            if let AstHintKind::AccountsField { field_name, ty, .. } = \u0026hint.kind {\n                if ty.contains(\"Account\u003c\")\n                    || ty.contains(\"SystemAccount\")\n                    || ty.contains(\"Program\u003c\")\n                    || ty.contains(\"Signer\")\n                    || ty.contains(\"TokenAccount\")\n                    || ty.contains(\"TokenAccount2022\")\n                {\n                    ast_safe.insert(field_name.clone());\n                } else if ty.contains(\"AccountInfo\") {\n                    ast_account_info.insert(field_name.clone());\n                }\n            }\n        }\n\n        let mut out = Vec::new();\n        for ix in \u0026ctx.ir.instructions {\n            let writable_non_signers: Vec\u003c_\u003e = ix\n                .accounts\n                .iter()\n                .filter(|a| a.is_mut \u0026\u0026 !a.is_signer)\n                .collect();\n\n            if writable_non_signers.len() \u003c 2 {\n                continue;\n            }\n\n            let unsafe_accounts: Vec\u003c_\u003e = writable_non_signers\n                .iter()\n                .filter(|a| !ast_safe.contains(\u0026a.name))\n                .collect();\n\n            if unsafe_accounts.len() \u003e= 2 {\n                let names: Vec\u003c\u0026str\u003e = unsafe_accounts.iter().map(|a| a.name.as_str()).collect();\n                let mut b = Finding::builder(\n                    self.id(),\n                    self.severity(),\n                    format!(\n                        \"Instruction `{}` has ≥2 mutable `AccountInfo` accounts ({}) — \\\n                         an attacker can pass the same pubkey for both. Debiting one \\\n                         also debits the other because they reference the same account.\",\n                        ix.name,\n                        names.join(\", \")\n                    ),\n                )\n                .program(\u0026ctx.ir.name)\n                .instruction(\u0026ix.name)\n                .account(names.first().copied().unwrap_or(\"\"))\n                .hint(\n                    \"Type the fields as `Account\u003c'info, T\u003e` or use `#[account(mut)]` \\\n                     with `has_one` constraints to derive distinct addresses from seeds.\",\n                );\n                if let Some(first) = names.first() {\n                    if let Some(h) = hint_index.get(*first) {\n                        b = h.location().stamp(b);\n                    }\n                }\n                out.push(b.build());\n            }\n        }\n\n        Ok(out)\n    }\n}\n","traces":[{"line":27,"address":[],"length":0,"stats":{"Line":52}},{"line":28,"address":[],"length":0,"stats":{"Line":52}},{"line":30,"address":[],"length":0,"stats":{"Line":30}},{"line":31,"address":[],"length":0,"stats":{"Line":30}},{"line":33,"address":[],"length":0,"stats":{"Line":52}},{"line":34,"address":[],"length":0,"stats":{"Line":52}},{"line":36,"address":[],"length":0,"stats":{"Line":1}},{"line":37,"address ne":48}},{"line":99,"address":[],"length":0,"stats":{"Line":48}},{"line":102,"address":[],"length":0,"stats":{"Line":48}},{"line":106,"address":[],"length":0,"stats":{"Line":27}}],"covered":46,"coverable":46},{"path":["/","Users","enjo","anchor-sentinel","src","rules","integer_cast_truncation.rs"],"content":"//! `integer_cast_truncation` — flags `expr as T` casts where the source\n//! integer type is wider than the destination, which silently truncates\n//! the high bits at runtime.\n//!\n//! In Solana Anchor programs this is a real bug class: account data is\n//! typically `u64` (lamports, token amounts) but downstream consumers\n//! (syscall arguments, account discriminants, packed byte buffers) often\n//! require narrower types. A naive `let n: u8 = amount as u8;` drops\n//! everything above `u8::MAX` without warning, and the on-chain error\n//! shows up far from the offending cast.\n//!\n//! Severity rationale: silent data loss, not directly exploitable, but\n//! it underwrites subtle fund-rounding and IDL-mismatch bugs that often\n//! become critical when stacked with other rules.\n\nuse std::collections::HashSet;\n\nuse anyhow::Result;\n\nuse crate::engine::{AnalysisContext, AstHintKind, Finding, Layer, Rule, Severity};\n\npub struct IntegerCastTruncation;\n\nimpl Rule for IntegerCastTruncation {\n    fn id(\u0026self) -\u003e \u0026'static str {\n        \"integer_cast_truncation\"\n    }\n    fn description(\u0026self) -\u003e \u0026'static str {\n        \"Detects `as` casts that may silently truncate a wider integer into a narrower one (e.g. u64 → u8).\"\n    }\n    fn severity(\u0026self) -\u003e Severity {\n        Severity::Medium\n    }\n    fn layer(\u0026self) -\u003e Layer {\n        Layer::Ast\n    }\n\n    fn check(\u0026self, ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e {\n        let mut out = Vec::new();\n        let mut seen: HashSet\u003c(String, usize, String, String)\u003e = HashSet::new();\n\n        for hint in \u0026ctx.ast_hints {\n            if let AstHintKind::IntegerCast { from_ty, to_ty } = \u0026hint.kind {\n                let from_w = source_width(from_ty);\n                let to_w = int_width(to_ty);\n                let Some(to_w) = to_w else {\n                    continue;\n                };\n                if from_w \u003c= to_w {\n                    continue;\n                }\n\n                let key = (hint.file.clone(), hint.line, from_ty.clone(), to_ty.clone());\n                if !seen.insert(key) {\n                    continue;\n                }\n\n                let display_from = if from_ty == \"inferred\" {\n                    \"an integer\".to_string()\n                } else {\n                    from_ty.clone()\n                };\n                let mut b = Finding::builder(\n                    self.id(),\n                    self.severity(),\n                    format!(\n                        \"`{display_from}` cast to `{to_ty}` ({to_w}-bit) silently truncates the high bits at runtime. Use `try_into()` (and handle the `TryFromIntError`) or `from_le_bytes` / `to_le_bytes` to make the conversion explicit.\"\n                    ),\n                )\n                .program(\u0026ctx.ir.name)\n                .hint(format!(\n                    \"Replace `{display_from} as {to_ty}` with `let n: {to_ty} = value.try_into().map_err(|_| ErrorCode::Overflow)?;` or split the value with `to_le_bytes`.\"\n                ));\n                b = hint.location().stamp(b);\n                out.push(b.build());\n            }\n        }\n        Ok(out)\n    }\n}\n\n/// Width in bits for the integer types `is_int_type` recognizes. Returns\n/// `None` for unknown types (e.g. user newtypes) — the rule skips those\n/// to avoid false positives.\nfn int_width(ty: \u0026str) -\u003e Option\u003cusize\u003e {\n    match ty {\n        \"u8\" | \"i8\" =\u003e Some(8),\n        \"u16\" | \"i16\" =\u003e Some(16),\n        \"u32\" | \"i32\" =\u003e Some(32),\n        \"u64\" | \"i64\" =\u003e Some(64),\n        \"u128\" | \"i128\" =\u003e Some(128),\n        \"usize\" | \"isize\" =\u003e None,\n        _ =\u003e None,\n    }\n}\n\n/// Width assumption for the source side of a cast. We have a real type\n/// for literals and explicitly-typed paths; for plain identifier paths\n/// (e.g. an `amount` parameter) the AST layer doesn't track types, so\n/// we fall back to a conservative 64-bit estimate. That estimate is the\n/// source of false positives only when the variable is *actually*\n/// narrower than the destination — which is exactly the case we want to\n/// flag, so the heuristic is sound.\nfn source_width(ty: \u0026str) -\u003e usize {\n    if let Some(w) = int_width(ty) {\n        return w;\n    }\n    if looks_like_int(ty) {\n        return 64;\n    }\n    128\n}\n\nfn looks_like_int(s: \u0026str) -\u003e bool {\n    if s.is_empty() {\n        return false;\n    }\n    let lname = s.to_ascii_lowercase();\n    matches!(\n        lname.as_str(),\n        \"amount\" | \"value\" | \"total\" | \"lamports\" | \"balance\" | \"delta\" | \"n\" | \"i\" | \"x\" | \"y\"\n    ) || lname.ends_with(\"_amount\")\n        || lname.ends_with(\"_total\")\n        || lname.ends_with(\"_value\")\n}\n","traces":[{"line":25,"address":[],"length":0,"stats":{"Line":42}},{"line":26,"address":[],"length":0,"stats":{"Line":42}},{"line":28,"address":[],"length":0,"stats":{"Line":30}},{"line":29,"address":[],"length":0,"stats":{"Line":30}},{"line":31,"address":[],"length":0,"stats":{"Line":42}},{"line":32,"address":[],"length":0,"stats":{"Line":42}},{"line":34,"address":[],"length":0,"stats":{"Line":1}},{"line":35,"address":[],"length":0,"stats":{"Line":1}},{"line":38,"address":[],"length":0,"stats":{"Line":27}},{"line":39,"address":[],"length":0,"stats":{"Line":54}},{"line":40,"address":[],"length":0,"stats":{"Line":81}},{"line":42,"address":[],"length":0,"stats":{"Line":366}},{"line":43,"address":[],"length":0,"stats":{"Line ng\u003e\u003e {\n        type ZeroEntry\u003c'a\u003e = (String, usize, \u0026'a AstHint);\n        let hint_count = ctx.ast_hints.len();\n        let mut zeros: HashMap\u003cFnKey, Vec\u003cZeroEntry\u003c'_\u003e\u003e\u003e = HashMap::with_capacity(hint_count);\n        let mut auth_checks: HashMap\u003cFnKey, Vec\u003cusize\u003e\u003e = HashMap::with_capacity(hint_count);\n\n        let mut current_fn: Option\u003cFnKey\u003e = None;\n        for hint in \u0026ctx.ast_hints {\n            if let AstHintKind::InstructionHandler { fn_name, .. } = \u0026hint.kind {\n                current_fn = Some((hint.file.clone(), fn_name.clone()));\n                continue;\n            }\n            let Some((ref file, ref fn_name)) = current_fn else {\n                continue;\n            };\n            let key = (file.clone(), fn_name.clone());\n\n            match \u0026hint.kind {\n                AstHintKind::LamportsZero { account, seq } =\u003e {\n                    zeros\n                        .entry(key)\n                        .or_default()\n                        .push((account.clone(), *seq, hint));\n                }\n                AstHintKind::BalanceCheck {\n                    check_type, seq, ..\n                } if is_auth_check(check_type) =\u003e {\n                    auth_checks.entry(key).or_default().push(*seq);\n                }\n                _ =\u003e {}\n            }\n        }\n\n        let mut out = Vec::new();\n        for ((file, fn_name), entries) in \u0026zeros {\n            let auth_seqs = auth_checks\n                .get(\u0026(file.clone(), fn_name.clone()))\n                .map(|v| v.as_slice())\n                .unwrap_or(\u0026[]);\n\n            // Also check IDL: does this instruction have any signer?\n            let has_idl_signer = ctx\n                .ir\n                .instructions\n                .iter()\n                .any(|ix| ix.name == *fn_name \u0026\u0026 ix.accounts.iter().any(|a| a.is_signer));\n\n            for (account, zero_seq, zero_hint) in entries {\n                let has_auth = auth_seqs.iter().any(|s| *s \u003c *zero_seq);\n                if !has_auth \u0026\u0026 !has_idl_signer {\n                    let mut b = Finding::builder(\n                        self.id(),\n                        self.severity(),\n                        format!(\n                            \"Account `{account}` is zeroed in `{fn_name}` without any authorization \\\n                             check. Any caller can destroy this account and its rent-exempt deposit.\"\n                        ),\n                    )\n                    .program(\u0026ctx.ir.name)\n                    .instruction(fn_name)\n                    .account(account)\n                    .hint(format!(\n                        \"Add a signer/authority check before zeroing lamports: \\\n                         `require_keys_eq!({account}.key(), expected_authority, ErrorCode::Unauthorized)`.\"\n                    ));\n                    b = zero_hint.location().stamp(b);\n                    out.push(b.build());\n                }\n            }\n        }\n\n        out.sort_by(|a, b| {\n            (\u0026a.instruction, \u0026a.account, a.line).cmp(\u0026(\u0026b.instruction, \u0026b.account, b.line))\n        });\n\n        Ok(out)\n    }\n}\n\nfn is_auth_check(check_type: \u0026str) -\u003e bool {\n    matches!(\n        check_type,\n        \"require_keys_eq\"\n            | \"require_keys_neq\"\n            | \"require\"\n            | \"require_gte\"\n            | \"require_eq\"\n            | \"require_gt\"\n    )\n}\n","traces":[{"line":24,"address":[],"length":0,"stats":{"Line":45}},{"line":25,"address":[],"length":0,"stats":{"Line":45}},{"line":27,"address":[],"length":0,"stats":{"Line":30}},{"line":28,"address":[],"length":0,"stats":{"Line":30}},{"line":30,"address":[],"length":0,"stats":{"Line":45}},{"line":31,"address":[],"length":0,"stats":{"Line":45}},{"line":33,"a
