int, AstHintKind, Finding, Layer, Rule, Severity};\n\n/// `(file, fn_name)` key for grouping hints per handler function.\ntype FnKey = (String, String);\n\npub struct MissingBalanceCheck;\n\nimpl Rule for MissingBalanceCheck {\n    fn id(\u0026self) -\u003e \u0026'static str {\n        \"missing_balance_check\"\n    }\n    fn description(\u0026self) -\u003e \u0026'static str {\n        \"Lamports debited without a preceding balance check\"\n    }\n    fn severity(\u0026self) -\u003e Severity {\n        Severity::Critical\n    }\n    fn layer(\u0026self) -\u003e Layer {\n        Layer::Ast\n    }\n\n    fn check(\u0026self, ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e {\n        type DebitEntry\u003c'a\u003e = (String, String, usize, \u0026'a AstHint);\n        let mut debits: HashMap\u003cFnKey, Vec\u003cDebitEntry\u003c'_\u003e\u003e\u003e = HashMap::new();\n        let mut checks: HashMap\u003cFnKey, Vec\u003c(String, usize)\u003e\u003e = HashMap::new();\n\n        let mut current_fn: Option\u003cFnKey\u003e = None;\n        for hint in \u0026ctx.ast_hints {\n            if let AstHintKind::InstructionHandler { fn_name, .. } = \u0026hint.kind {\n                current_fn = Some((hint.file.clone(), fn_name.clone()));\n                continue;\n            }\n            let Some((ref file, ref fn_name)) = current_fn else {\n                continue;\n            };\n            let key = (file.clone(), fn_name.clone());\n\n            match \u0026hint.kind {\n                AstHintKind::LamportsDebit {\n                    account,\n                    amount_expr,\n                    seq,\n                } =\u003e {\n                    debits.entry(key).or_default().push((\n                        account.clone(),\n                        amount_expr.clone(),\n                        *seq,\n                        hint,\n                    ));\n                }\n                AstHintKind::BalanceCheck {\n                    account,\n                    check_type: _,\n                    seq,\n                } =\u003e {\n                    checks.entry(key).or_default().push((account.clone(), *seq));\n                }\n                _ =\u003e {}\n            }\n        }\n\n        let mut out = Vec::new();\n        for ((file, fn_name), entries) in \u0026debits {\n            let fn_checks = checks\n                .get(\u0026(file.clone(), fn_name.clone()))\n                .map(|v| v.as_slice())\n                .unwrap_or(\u0026[]);\n\n            for (account, amount, debit_seq, debit_hint) in entries {\n                let has_guard = fn_checks.iter().any(|(check_acct, check_seq)| {\n                    *check_seq \u003c *debit_seq \u0026\u0026 (check_acct == account || check_acct.is_empty())\n                });\n\n                if !has_guard {\n                    let mut b = Finding::builder(\n                        self.id(),\n                        self.severity(),\n                        format!(\n                            \"Account `{account}` has lamports debited by `{amount}` in `{fn_name}` \\\n                             without a preceding balance check. An attacker can drain the account \\\n                             by calling with `amount \u003e account.lamports()`.\"\n                        ),\n                    )\n                    .program(\u0026ctx.ir.name)\n                    .instruction(fn_name)\n                    .account(account)\n                    .hint(format!(\n                        \"Add a guard before the debit: \\\n                         `require!({account}.lamports() \u003e= {amount}, ErrorCode::InsufficientFunds)` \\\n                         or use `checked_sub`.\"\n                    ));\n                    b = debit_hint.location().stamp(b);\n                    out.push(b.build());\n                }\n            }\n        }\n\n        out.sort_by(|a, b| {\n            (\u0026a.instruction, \u0026a.account, a.line).cmp(\u0026(\u0026b.instruction, \u0026b.account, b.line))\n        });\n\n        Ok(out)\n    }\n}\n","traces":[{"line":25,"address":[],"length":0,"stats":{"Line":51}},{"line":26,"address":[],"length":0,"stats":{"Line":51}},{"line":28,"address":[],"length":0,"stats":{"Line":30}},{"line":29,"address":[],"length":0,"stats":{"Line":30}},{"line":31,"address":[],"length":0,"stats":{"Line":51}},{"line":32,"address":[],"length":0,"stats":{"Line":51}},{"line":34,"address":[],"length":0,"stats":{"Line":1}},{"line":35,"address":[],"length":0,"stats":{"Line":1}},{"line":38,"address":[],"length":0,"stats":{"Line":27}},{"line":40,"address":[],"length":0,"stats":{"Line":81}},{"line":41,"address":[],"length":0,"stats":{"Line":81}},{"line":43,"address":[],"length":0,"stats":{"Line":81}},{"line":44,"address":[],"length":0,"stats":{"Line":366}},{"line":45,"address":[],"length":0,"stats":{"Line":408}},{"line":46,"address":[],"length":0,"stats":{"Line":276}},{"line":47,"address":[],"length":0,"stats":{"Line":69}},{"line":49,"address":[],"length":0,"stats":{"Line":408}},{"line":50,"address":[],"length":0,"stats":{"Line":201}},{"line":52,"address":[],"length":0,"stats":{"Line":276}},{"line":54,"address":[],"length":0,"stats":{"Line":69}},{"line":56,"address":[],"length":0,"stats":{"Line":12}},{"line":57,"address":[],"length":0,"stats":{"Line":12}},{"line":58,"address":[],"length":0,"stats":{"Line":12}},{"line":59,"address":[],"length":0,"stats":{"Line":12}},{"line":60,"address":[],"length":0,"stats":{"Line":60}},{"line":61,"address":[],"length":0,"stats":{"Line":36}},{"line":62,"address":[],"length":0,"stats":{"Line":36}},{"line":63,"address":[],"length":0,"stats":{"Line":12}},{"line":64,"address":[],"length":0,"stats":{"Line":12}},{"line":68,"address":[],"length":0,"stats":{"Line":6}},{"line":70,"address":[],"length":0,"stats":{"Line":6}},{"line":71,"address":[],"length":0,"stats":{"Line":6}},{"line":72,"address":[],"length":0,"stats":{"Line":36}},{"line":74,"address":[],"length": p\n//!   2. `#[account(seeds = [...], bump = ctx.bumps.field)]` — explicit canonical\n//!   3. `bump = \u003cfield\u003e` where `\u003cfield\u003e` is a `u8` argument — ANCHOR DERIVES\n//!      the canonical bump from seeds at runtime and stores it in the field.\n//!\n//! The dangerous pattern is:\n//!   - `bump = some_variable` where the variable is NOT a bumps-field AND\n//!     NOT derived from the seeds. This binds the bump to a user-controlled\n//!     value, enabling the classic PDA canonicalization bypass.\n//!\n//! Unlike `pda_misconfig` which focuses on missing `bump` constraints and\n//! the specific `bump = bump` (plain-ident) trap, this rule catches the\n//! broader class: any non-canonical bump expression.\n\nuse anyhow::Result;\nuse std::collections::HashSet;\n\nuse crate::engine::{\n    field_hint_index, AnalysisContext, AstHintKind, Finding, Layer, Rule, Severity,\n};\n\npub struct MissingBumpSeedCanonicalization;\n\nimpl Rule for MissingBumpSeedCanonicalization {\n    fn id(\u0026self) -\u003e \u0026'static str {\n        \"missing_bump_seed_canonicalization\"\n    }\n    fn description(\u0026self) -\u003e \u0026'static str {\n        \"PDA bump constraint uses a non-canonical value instead of `ctx.bumps`\"\n    }\n    fn severity(\u0026self) -\u003e Severity {\n        Severity::High\n    }\n    fn layer(\u0026self) -\u003e Layer {\n        Layer::Ast\n    }\n\n    fn check(\u0026self, ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e {\n        let mut out = Vec::new();\n        let hint_index = field_hint_index(ctx);\n        let mut seen: HashSet\u003cString\u003e = HashSet::new();\n\n        for hint in \u0026ctx.ast_hints {\n            if let AstHintKind::AccountsField {\n                field_name,\n                constraints,\n                ..\n            } = \u0026hint.kind\n            {\n                for constraint in constraints {\n                    if let Some(bump_expr) = extract_bump_expression(constraint) {\n                        if is_non_canonical_bump(bump_expr) \u0026\u0026 !seen.contains(field_name) {\n                            seen.insert(field_name.clone());\n                            let mut b = Finding::builder(\n                                self.id(),\n                                self.severity(),\n                                format!(\n                                    \"Account `{field_name}` pins `bump = {bump_expr}` — this \\\n                                     binds the PDA derivation to a non-canonical value. An attacker \\\n                                     can pass a different bump and access a separate PDA account.\"\n                                ),\n                            )\n                            .program(\u0026ctx.ir.name)\n                            .account(field_name)\n                            .hint(\n                                \"Use the bare `bump` identifier (which derives the canonical bump \\\n                                 from seeds), or `bump = ctx.bumps.{field_name}` to use the \\\n                                 framework-managed canonical bump.\",\n                            );\n                            if let Some(h) = hint_index.get(field_name) {\n                                b = h.location().stamp(b);\n                            }\n                            out.push(b.build());\n                        }\n                    }\n                }\n            }\n        }\n\n        Ok(out)\n    }\n}\n\n/// Extract the RHS expression from a `bump = \u003cexpr\u003e` constraint.\n/// Returns `None` for bare `bump` or `bumps` (canonical forms).\nfn extract_bump_expression(constraint: \u0026str) -\u003e Option\u003c\u0026str\u003e {\n    let idx = constraint.find(\"bump\")?;\n    let after = \u0026constraint[idx + \"bump\".len()..];\n    if after.starts_with(|c: char| c.is_alphanumeric() || c == '_') {\n        return None;\n    }\n    if after.starts_with(',') || after.trim().is_empty() {\n        return None;\n    }\n    let eq_idx = after.find('=')?;\n    let expr = after[eq_idx + 1..]\n        .trim_start()\n        .trim_end_matches(',')\n        .trim();\n    if expr.is_empty() {\n        return None;\n    }\n    Some(expr)\n}\n\n/// Returns `true` if the bump expression is non-canonical (user-controlled\n/// or derived from an untrusted source).\nfn is_non_canonical_bump(expr: \u0026str) -\u003e bool {\n    if expr.starts_with(\"ctx.bumps\") || expr.starts_with(\"bumps.\") {\n        return false;\n    }\n    true\n}\n","traces":[{"line":29,"address":[],"length":0,"stats":{"Line":41}},{"line":30,"address":[],"length":0,"stats":{"Line":41}},{"line":32,"address":[],"length":0,"stats":{"Line":30}},{"line":33,"address":[],"length":0,"stats":{"Line":30}},{"line":35,"address":[],"length":0,"stats":{"Line":41}},{"line":36,"address":[],"length":0,"stats":{"Line":41}},{"line":38,"address":[],"length":0,"stats":{"Line":1}},{"line":39,"address":[],"length":0,"stats":{"Line":1}},{"line":42,"address":[],"length":0,"stats":{"Line":27}},{"line":43,"address":[],"length":0,"stats":{"Line":54}},{"line":44,"address":[],"length":0,"stats":{"Line":81}},{"line":45,"address":[],"length":0,"stats":{"Line":81}},{"line":47,"address":[],"length":0,"stats":{"Line":366}},{"line":49,"address":[],"length":0,"stats":{"Line":201}},{"line":50,"address":[],"length":0,"stats":{"Line":201}},{"line":52,"address":[],"length":0,"stats":{"Line":339}},{"line":54,"address":[],"length":0,"stats":{"Line":314}},{"line":55,"address":[],"length":0,"stats":{"Line":115}},{"line":56,"address":[],"length":0,"stats":{"Line":8}},{"line":57,"address":[],"length":0,"stats":{"Line":8}},{"line":59,"address":[],"length":0,"stats":{"Line":2}},{"line":60,"address":[],"length":0,"stats":{"Line":4}},{"line":61,"address":[],"length":0,"stats":{"Line":2}},{"line":67,"address":[],"length":0,"stats":{"Line":4}},{"line":68,"address":[],"length":0,"stats":{"Line":4}},{"line":74,"address":[] ame struct\n//!      (data-level authority check), or\n//!   3. Mentioned in a `constraint = …\u003ctarget\u003e…` expression on the same\n//!      struct (manual authorization).\n//!\n//! When none of those hold, emit a finding pointing at the field that\n//! uses `close = \u003cident\u003e`. We don't flag the target field itself — the\n//! `close = …` line is the actionable site.\n\nuse anyhow::Result;\nuse std::collections::{HashMap, HashSet};\n\nuse crate::engine::{\n    field_hint_index, AnalysisContext, AstHintKind, Finding, Layer, Rule, Severity,\n};\n\npub struct MissingCloseAuthority;\n\nimpl Rule for MissingCloseAuthority {\n    fn id(\u0026self) -\u003e \u0026'static str {\n        \"missing_close_authority\"\n    }\n    fn description(\u0026self) -\u003e \u0026'static str {\n        \"Detects `close = \u003ctarget\u003e` constraints where the target is not enforced as a signer or authority\"\n    }\n    fn severity(\u0026self) -\u003e Severity {\n        Severity::High\n    }\n    fn layer(\u0026self) -\u003e Layer {\n        Layer::Ast\n    }\n\n    fn check(\u0026self, ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e {\n        let mut out = Vec::new();\n\n        let by_struct = group_by_struct(\u0026ctx.ast_hints);\n        let hint_index = field_hint_index(ctx);\n        let mut seen: HashSet\u003c(String, String, String)\u003e = HashSet::new();\n\n        for (struct_name, fields) in \u0026by_struct {\n            // First pass: collect the set of close targets referenced in\n            // this struct, so we can search the rest of the struct for\n            // their authority bindings.\n            let close_pairs: Vec\u003c(String, String)\u003e = fields\n                .iter()\n                .filter_map(|f| {\n                    let close_target = extract_close_target(\u0026f.constraints);\n                    close_target.map(|t| (f.field_name.clone(), t))\n                })\n                .collect();\n\n            if close_pairs.is_empty() {\n                continue;\n            }\n\n            for (field_name, target) in \u0026close_pairs {\n                let target_is_signer = fields\n                    .iter()\n                    .any(|f| f.field_name == *target \u0026\u0026 is_signer_type(\u0026f.ty));\n\n                let target_has_one = fields.iter().any(|f| {\n                    f.constraints\n                        .iter()\n                        .any(|c| extract_named_ident(c, \"has_one\") == Some(target.as_str()))\n                });\n\n                let target_in_constraint = fields.iter().any(|f| {\n                    f.constraints.iter().any(|c| {\n                        if let Some(expr) = extract_constraint_expr(c) {\n                            contains_ident(expr, target)\n                        } else {\n                            false\n                        }\n                    })\n                });\n\n                if target_is_signer || target_has_one || target_in_constraint {\n                    continue;\n                }\n\n                let key = (struct_name.clone(), field_name.clone(), target.clone());\n                if !seen.insert(key) {\n                    continue;\n                }\n\n                let mut b = Finding::builder(\n                    self.id(),\n                    self.severity(),\n                    format!(\n                        \"close target `{target}` is not enforced as a signer or authority — anyone can close this account and claim rent. Type the field as `Signer\u003c'info\u003e`, add a `has_one = {target}` constraint, or use a `constraint = …{target}…` expression.\"\n                    ),\n                )\n                .program(\u0026ctx.ir.name)\n                .instruction(struct_name)\n                .account(field_name)\n                .hint(format!(\n                    \"Bind `{target}` to a `Signer\u003c'info\u003e` (e.g. `pub {target}: Signer\u003c'info\u003e`) or add a constraint like `has_one = {target}` / `constraint = vault.authority == {target}.key()`.\"\n                ));\n                if let Some(h) = hint_index.get(field_name) {\n                    b = h.location().stamp(b);\n                }\n                out.push(b.build());\n            }\n        }\n\n        Ok(out)\n    }\n}\n\n/// A flattened view of an `AccountsField` hint, kept local to this rule.\nstruct FieldView {\n    field_name: String,\n    ty: String,\n    constraints: Vec\u003cString\u003e,\n}\n\nfn group_by_struct(hints: \u0026[crate::engine::AstHint]) -\u003e HashMap\u003cString, Vec\u003cFieldView\u003e\u003e {\n    let mut out: HashMap\u003cString, Vec\u003cFieldView\u003e\u003e = HashMap::new();\n    for hint in hints {\n        if let AstHintKind::AccountsField {\n            struct_name,\n            field_name,\n            ty,\n            constraints,\n        } = \u0026hint.kind\n        {\n            out.entry(struct_name.clone()).or_default().push(FieldView {\n                field_name: field_name.clone(),\n                ty: ty.clone(),\n                constraints: constraints.clone(),\n            });\n        }\n    }\n    out\n}\n\n/// Extract the RHS identifier from a `close = \u003cident\u003e` constraint.\n/// Returns `None` for `mut`, `realloc`, `bump`, etc.\nfn extract_close_target(constraints: \u0026[String]) -\u003e Option\u003cString\u003e {\n    for c in constraints {\n        if let Some(target) = extract_named_ident(c, \"close\") {\n            return Some(target.to_string());\n        }\n    }\n    None\n}\n\nfn extract_named_ident\u003c'a\u003e(constraint: \u0026'a str, name: \u0026str) -\u003e Option\u003c\u0026'a str\u003e {\n    let idx = constraint.find(name)?;\n    let after = \u0026constraint[idx + name.len()..];\n    if after.starts_with(|c: char| c.is_alphanumeric() || c == '_') {\n        return None;\n    }\n    let after = after.trim_start();\n    let after = after.strip_prefix('=')?.trim_start();\n    let ident: \u0026str = after\n        .split(|c: char| c == ',' || c.is_whitespace())\n        .next()\n        .unwrap_or(\"\")\n        .trim();\n    if is_plain_ident(ident) {\n        Some(ident)\n    } else {\n        None\n    }\n}\n\n/// Extract the expression text from a `constraint = \u003cexpr\u003e` form.\nfn extract_constraint_expr(constraint: \u0026str) -\u003e Option\u003c\u0026str\u003e {\n    let idx = constraint.find(\"constraint\")?;\n    let after = \u0026constraint[idx + \"constraint\".len()..];\n    if after.starts_with(|c: char| c.is_alphanumeric() || c == '_') {\n        return None;\n    }\n    let after = after.trim_start();\n    let after = after.strip_prefix('=')?.trim_start();\n    let expr = after.trim_end().trim_end_matches(',').trim();\n    if expr.is_empty() {\n        None\n    } else {\n        Some(expr)\n    }\n}\n\n/// Returns true if `s` is a plain Rust identifier.\nfn is_plain_ident(s: \u0026str) -\u003e bool {\n    let mut chars = s.chars();\n    match chars.next() {\n        Some(c) if c.is_ascii_alphabetic() || c == '_' =\u003e {}\n        _ =\u003e return false,\n    }\n    chars.all(|c| c.is_ascii_alphanumeric() || c == '_')\n}\n\n/// Word-boundary check: does `haystack` contain `needle` as an identifier?\n/// Used to spot `target.key()`, `target == X`, `vault.target == …`, etc.\nfn contains_ident(haystack: \u0026str, needle: \u0026str) -\u003e bool {\n    if !is_plain_ident(needle) {\n        return false;\n    }\n    let mut start = 0;\n    while let Some(idx) = haystack[start..].find(needle) {\n        let abs = start + idx;\n        let before_ok = abs == 0\n            || !haystack\n                .as_bytes()\n                .get(abs - 1)\n                .copied()\n                .is_some_and(|b| b.is_ascii_alphanumeric() || b == b'_');\n        let after = abs + needle.len();\n        let after_ok = after \u003e= haystack.len()\n            || !haystack\n                .as_bytes()\n                .get(after)\n                .copied()\n                .is_some_and(|b| b.is_ascii_alphanumeric() || b == b'_');\n        if before_ok \u0026\u0026 after_ok {\n            return true;\n        }\n        start = abs + 1;\n    }\n    false\n}\n\n/// True if the type string (already whitespace-stripped) starts with\n/// `Signer`. We match the prefix because `Signer\u003c'info\u003e` keeps the\n/// lifetime tokens in the string.\nfn is_signer_type(ty: \u0026str) -\u003e bool {\n    ty.starts_with(\"Signer\")\n}\n","traces":[{"line":33,"address":[],"length":0,"stats":{"Line":42}},{"line":34,"address":[],"length":0,"stats":{"Line":42}},{"line":36,"address":[],"length":0,"stats":{"Line":30}},{"line":37,"address":[],"length":0,"stats":{"Line":30}},{"line":39,"address":[],"length":0,"stats":{"Line":42}},{"line":40,"address":[],"length":0,"stats":{"Line":42}},{"line":42,"address":[],"length":0,"stats":{"Line":1}},{"line":43,"address":[],"length":0,"stats":{"Line":1}},{"line":46,"address":[],"length":0,"stats":{"Line":27}},{"line":47,"address":[],"length":0,"stats":{"Line":54}},{"line":49,"address":[],"length":0,"stats":{"Line":81}},{"line":50,"address":[],"length":0,"stats":{"Line":81}},{"line":51,"address":[],"length":0,"stats":{"Line":81}},{"line":53,"address":[],"length":0,"stats":{"Line":163}},{"line":57,"address":[],"length":0,"stats":{"Line":204}},{"line":59,"address":[],"length":0,"stats":{"Line":269}},{"line":60,"address":[],"length":0,"stats":{"Line":603}},{"line":61,"address":[],"length":0,"stats":{"Line":420}},{"line":65,"address":[],"length":0,"stats":{"Line":136}},{"line":66,"address":[],"length":0,"stats":{"Line":62}},{"line":69,"address":[],"length":0,"stats":{"Line":18}},{"line":70,"address":[],"length":0,"stats":{"Line":12}},{"line":72,"address":[],"length":0,"stats":{"Line":29}},{"line":74,"address":[],"length":0,"stats":{"Line":30}},{"line":75,"address":[],"length":0,"stats":{"Line":12}},{"line":76,"address":[],"length":0,"stats":{"Line":12}},{"line":    \"to\",\n    \"output\",\n    \"out_vault\",\n    \"out\",\n];\n\npub struct MissingMut;\n\nimpl Rule for MissingMut {\n    fn id(\u0026self) -\u003e \u0026'static str {\n        \"missing_mut\"\n    }\n    fn description(\u0026self) -\u003e \u0026'static str {\n        \"Account appears to be a write target but is not marked mutable\"\n    }\n    fn severity(\u0026self) -\u003e Severity {\n        Severity::Medium\n    }\n    fn layer(\u0026self) -\u003e Layer {\n        Layer::IdlAst\n    }\n\n    fn check(\u0026self, ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e {\n        let mut ast_mut: HashSet\u003cString\u003e = HashSet::new();\n        let hint_index = field_hint_index(ctx);\n        for hint in \u0026ctx.ast_hints {\n            if let AstHintKind::AccountsField {\n                field_name,\n                constraints,\n                ..\n            } = \u0026hint.kind\n            {\n                if constraints.iter().any(|c| c.contains(\"mut\")) {\n                    ast_mut.insert(field_name.clone());\n                }\n            }\n        }\n\n        let mut out = Vec::new();\n        for ix in \u0026ctx.ir.instructions {\n            for acct in \u0026ix.accounts {\n                if acct.is_mut {\n                    continue;\n                }\n                if ast_mut.contains(\u0026acct.name) {\n                    continue;\n                }\n                let lname = acct.name.to_ascii_lowercase();\n                if !DEST_NAMES.iter().any(|n| lname == *n) {\n                    continue;\n                }\n                let mut b = Finding::builder(\n                    self.id(),\n                    self.severity(),\n                    format!(\n                        \"Account `{}` on instruction `{}` is not declared mutable but its name implies a write target.\",\n                        acct.name, ix.name\n                    ),\n                )\n                .program(\u0026ctx.ir.name)\n                .instruction(\u0026ix.name)\n                .account(\u0026acct.name)\n                .hint(\"Add `#[account(mut)]` to the field and set `writable: true` in the IDL.\");\n                if let Some(h) = hint_index.get(\u0026acct.name) {\n                    b = h.location().stamp(b);\n                }\n                out.push(b.build());\n            }\n        }\n        Ok(out)\n    }\n}\n","traces":[{"line":28,"address":[],"length":0,"stats":{"Line":42}},{"line":29,"address":[],"length":0,"stats":{"Line":42}},{"line":31,"address":[],"length":0,"stats":{"Line":30}},{"line":32,"address":[],"length":0,"stats":{"Line":30}},{"line":34,"address":[],"length":0,"stats":{"Line":42}},{"line":35,"address":[],"length":0,"stats":{"Line":42}},{"line":37,"address":[],"length":0,"stats":{"Line":1}},{"line":38,"address":[],"length":0,"stats":{"Line":1}},{"line":41,"address":[],"length":0,"stats":{"Line":27}},{"line":42,"address":[],"length":0,"stats":{"Line":81}},{"line":43,"address":[],"length":0,"stats":{"Line":81}},{"line":44,"address":[],"length":0,"stats":{"Line":366}},{"line":46,"address":[],"length":0,"stats":{"Line":201}},{"line":47,"address":[],"length":0,"stats":{"Line":201}},{"line":49,"address":[],"length":0,"stats":{"Line":339}},{"line":51,"address":[],"length":0,"stats":{"Line":723}},{"line":52,"address":[],"length":0,"stats":{"Line":285}},{"line":57,"address":[],"length":0,"stats":{"Line":54}},{"line":58,"address":[],"length":0,"stats":{"Line":97}},{"line":59,"address":[],"length":0,"stats":{"Line":264}},{"line":60,"address":[],"length":0,"stats":{"Line":194}},{"line":61,"address":[],"length":0,"stats":{"Line":116}},{"line":63,"address":[],"length":0,"stats":{"Line":234}},{"line":64,"address":[],"length":0,"stats":{"Line":3}},{"line":66,"address":[],"length":0,"stats":{"Line":150}},{"line":67,"address":[],"length":0,"stats":{"Line":1104}},{"line":68,"address":[],"length":0,"stats":{"Line":67}},{"line":71,"address":[],"length":0,"s Vec\u003cFinding\u003e\u003e {\n        let mut ast_properly_typed: HashSet\u003cString\u003e = HashSet::new();\n        let hint_index = field_hint_index(ctx);\n        for hint in \u0026ctx.ast_hints {\n            if let AstHintKind::AccountsField { field_name, ty, .. } = \u0026hint.kind {\n                if ty.contains(\"Account\u003c\")\n                    || ty.contains(\"Program\u003c\")\n                    || ty.contains(\"SystemAccount\")\n                {\n                    ast_properly_typed.insert(field_name.clone());\n                }\n            }\n        }\n\n        let mut out = Vec::new();\n        for ix in \u0026ctx.ir.instructions {\n            for acct in \u0026ix.accounts {\n                if !acct.is_mut || acct.is_signer {\n                    continue;\n                }\n                if ast_properly_typed.contains(\u0026acct.name) {\n                    continue;\n                }\n                let lname = acct.name.to_ascii_lowercase();\n                if !(lname.contains(\"vault\") || lname.contains(\"pool\") || lname.contains(\"state\")) {\n                    continue;\n                }\n                let mut b = Finding::builder(\n                    self.id(),\n                    self.severity(),\n                    format!(\n                        \"Account `{}` on instruction `{}` is mutable but typed as `AccountInfo` and lacks an `#[account(owner = …)]` constraint. Runtime code can deserialize arbitrary data into it.\",\n                        acct.name, ix.name\n                    ),\n                )\n                .program(\u0026ctx.ir.name)\n                .instruction(\u0026ix.name)\n                .account(\u0026acct.name)\n                .hint(\"Either type the field as `Account\u003c'info, T\u003e` for compile-time ownership, or add `#[account(owner = \u003cexpected_program_id\u003e)]`.\");\n                if let Some(h) = hint_index.get(\u0026acct.name) {\n                    b = h.location().stamp(b);\n                }\n                out.push(b.build());\n            }\n        }\n        Ok(out)\n    }\n}\n","traces":[{"line":23,"address":[],"length":0,"stats":{"Line":59}},{"line":24,"address":[],"length":0,"stats":{"Line":59}},{"line":26,"address":[],"length":0,"stats":{"Line":30}},{"line":27,"address":[],"length":0,"stats":{"Line":30}},{"line":29,"address":[],"length":0,"stats":{"Line":59}},{"line":30,"address":[],"length":0,"stats":{"Line":59}},{"line":32,"address":[],"length":0,"stats":{"Line":1}},{"line":33,"address":[],"length":0,"stats":{"Line":1}},{"line":36,"address":[],"length":0,"stats":{"Line":27}},{"line":37,"address":[],"length":0,"stats":{"Line":81}},{"line":38,"address":[],"length":0,"stats":{"Line":81}},{"line":39,"address":[],"length":0,"stats":{"Line":366}},{"line":40,"address":[],"length":0,"stats":{"Line":741}},{"line":41,"address":[],"length":0,"stats":{"Line":201}},{"line":42,"address":[],"length":0,"stats":{"Line":144}},{"line":43,"address":[],"length":0,"stats":{"Line":120}},{"line":45,"address":[],"length":0,"stats":{"Line":243}},{"line":50,"address":[],"length":0,"stats":{"Line":54}},{"line":51,"address":[],"length":0,"stats":{"Line":97}},{"line":52,"address":[],"length":0,"stats":{"Line":264}},{"line":53,"address":[],"length":0,"stats":{"Line":310}},{"line":54,"address":[],"length":0,"stats":{"Line":99}},{"line":56,"address":[],"length":0,"stats":{"Line":285}},{"line":57,"address":[],"length":0,"stats":{"Line":55}},{"line":59,"address":[],"length":0,"stats":{"Line":80}},{"line":60,"address":[],"length":0,"stats":{"Line":80}},{"line":61,"address":[],"length":0,"stats":{"Line":20}},{"line":64,"address":[],"length":0,"stats":{"Line":20}},{"line":65,"address":[],"length":0,"stats":{"Line":40}},{"line":66,"address":[],"length":0,"stats":{"Line":20}},{"line":71,"address":[],"length":0,"stats":{"Line":40}},{"line":72,"address":[],"length":0,"stats":{"Line":40}},{"line":73,"address":[],"length":0,"stats":{"Line":40}},{"line":75,"address":[],"length":0,"stats":{"Line":80}},{"line":76,"address":[],"length":0,"stats":{"Line":80}},{"line":78,"address":[],"length":0,"stats":{"Line":80}},{"line":81,"address":[],"length":0,"stats":{"Line":27}}],"covered":37,"coverable":37},{"path":["/","Users","enjo","anchor-sentinel","src","rules","missing_reinit_guard.rs"],"content":"//! `missing_reinit_guard` — flags accounts declared with\n//! `init_if_needed` that lack a reinitialization guard.\n//!\n//! In Anchor, `#[account(init_if_needed, payer = user, space = ...)]`\n//! creates the account on the first call and **reuses** it on\n//! subsequent calls. Without an accompanying `has_one` or\n//! `constraint` expression that proves the caller is the same\n//! authority that previously initialized the account, **any signer\n//! that pays can clobber the existing state**. They bump the\n//! account's lamports above rent-exempt, set the discriminator,\n//! and write whatever data they like — overwriting whatever the\n//! legitimate initializer wrote.\n//!\n//! Severity: High — silent, repeatable, often leads to fund loss\n//! when the reinitialized account is a vault, a registry entry, or\n//! a config struct that gates downstream actions.\n//!\n//! Safe patterns (not flagged):\n//!   - `has_one = \u003cauthority\u003e` on the same field, where `\u003cauthority\u003e`\n//!     is a Signer field — Anchor's runtime check verifies the\n//!     account's stored authority matches the signer.\n//!   - `constraint = \u003cfield\u003e.\u003cauthority\u003e == \u003csigner\u003e.key() @ Error`\n//!     — explicit same-authority check in the constraint expression.\n//!   - The struct uses `#[account(init, ...)]` (not `init_if_needed`) —\n//!     the account is then guaranteed to be created exactly once,\n//!     at the same time as the first transaction, and reinit is\n//!     impossible by construction.\n\nuse anyhow::Result;\nuse std::collections::HashSet;\n\nuse crate::engine::{AnalysisContext, AstHint, AstHintKind, Finding, Layer, Rule, Severity};\n\npub struct MissingReinitGuard;\n\nimpl Rule for MissingReinitGuard {\n    fn id(\u0026self) -\u003e \u0026'static str {\n        \"missing_reinit_guard\"\n    }\n    fn description(\u0026self) -\u003e \u0026'static str {\n        \"Detects init_if_needed accounts without a reinitialization guard\"\n    }\n    fn severity(\u0026self) -\u003e Severity {\n        Severity::High\n    }\n    fn layer(\u0026self) -\u003e Layer {\n        Layer::Ast\n    }\n\n    fn check(\u0026self, ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e {\n        let mut out = Vec::new();\n        let mut seen: HashSet\u003c(String, String)\u003e = HashSet::new();\n\n        for hint in \u0026ctx.ast_hints {\n            if let AstHintKind::AccountsField {\n                struct_name,\n                field_name,\n                constraints,\n                ..\n            } = \u0026hint.kind\n            {\n                if !has_init_if_needed(constraints) {\n                    continue;\n                }\n                let key = (struct_name.clone(), field_name.clone());\n                if !seen.insert(key) {\n                    continue;\n                }\n\n                if has_reinit_guard(constraints, \u0026ctx.ast_hints, struct_name) {\n                    continue;\n                }\n\n                let mut b = Finding::builder(\n                    self.id(),\n                    self.severity(),\n                    format!(\n                        \"Account `{field_name}` uses init_if_needed without a reinitialization guard — an attacker can reinitialize this account and overwrite its state.\"\n                    ),\n                )\n                .program(\u0026ctx.ir.name)\n                .account(field_name)\n                .hint(\n                    \"Add `constraint = \u003caccount\u003e.\u003cauthority_field\u003e == \u003csigner\u003e.key() @ ErrorCode::AlreadyInitialized` (or `has_one = \u003cauthority\u003e` where `\u003cauthority\u003e` is a Signer) to prevent reinitialization by a different caller.\",\n                );\n                b = hint.location().stamp(b);\n                out.push(b.build());\n            }\n        }\n\n        Ok(out)\n    }\n}\n\n/// True if the field's `#[account(...)]` attrs include `init_if_needed`.\n///\n/// We substring-search the joined constraints rather than parsing\n/// each one — `init_if_needed` is always a bare identifier token\n/// (no `= value`), so a word-boundary match is sufficient. An\n/// account is *only* reinitializable if it actually carries the\n/// `init_if_needed` keyword; bare `init` does NOT trigger.\nfn has_init_if_needed(constraints: \u0026[String]) -\u003e bool {\n    for c in constraints {\n        // The stringified form is something like\n        // \"init_if_needed, payer=user, space=8+32\". We tokenize by\n        // comma/space and look for an exact match.\n        for tok in c.split(|ch: char| ch == ',' || ch.is_whitespace()) {\n            if tok == \"init_if_needed\" {\n                return true;\n            }\n        }\n    }\n    false\n}\n\n/// True if the field's `#[account(...)]` attrs include either:\n///   - `has_one = \u003cauthority\u003e` on the **same field**, where `\u003cauthority\u003e`\n///     resolves to a `Signer` type in the same struct, OR\n///   - `constraint = \u003cexpr\u003e` (must have '=') — bare `constraint` without\n///     '=' is a no-op in Anchor and does NOT guard against reinit.\n///\n/// `realloc` alone is NOT a guard — it only controls whether data is zeroed\n/// on reallocation. It must be paired with a `constraint = ...` expression\n/// that verifies the caller's authority.\nfn has_reinit_guard(constraints: \u0026[String], ast_hints: \u0026[AstHint], struct_name: \u0026str) -\u003e bool {\n    for c in constraints {\n        let tokens: Vec\u003c\u0026str\u003e = c\n            .split(|ch: char| ch == ',' || ch.is_whitespace())\n            .collect();\n\n        if let Some(has_one_idx) = tokens.iter().position(|tok| *tok == \"has_one\") {\n            if let Some(next) = tokens.get(has_one_idx + 1) {\n                if *next == \"=\" {\n                    if let Some(target) = tokens.get(has_one_idx + 2) {\n                        if is_signer_field(ast_hints, struct_name, target) {\n                            return true;\n                        }\n                    }\n                }\n            }\n        }\n\n        if let Some(constraint_idx) = tokens.iter().position(|tok| *tok == \"constraint\") {\n            if let Some(next) = tokens.get(constraint_idx + 1) {\n                if *next == \"=\" {\n                    return true;\n                }\n            }\n        }\n    }\n    false\n}\n\n/// Returns true if `field_name` is declared as a `Signer\u003c'info\u003e` type\n/// in the given struct. Used to verify that a `has_one` guard actually\n/// references a signer (Bug 5 fix).\nfn is_signer_field(ast_hints: \u0026[AstHint], struct_name: \u0026str, field_name: \u0026str) -\u003e bool {\n    for hint in ast_hints {\n        if let AstHintKind::AccountsField {\n            struct_name: sn,\n            field_name: fn_,\n            ty,\n            ..\n        } = \u0026hint.kind\n        {\n            if sn == struct_name \u0026\u0026 fn_ == field_name {\n                // Match common Signer type patterns.\n                let ty_lower = ty.to_lowercase();\n                return ty_lower.contains(\"signer\")\n                    || ty_lower.contains(\"signer\u003c'info\u003e\")\n                    || ty_lower.contains(\"account\u003csigner\")\n                    || ty_lower == \"signer\";\n            }\n        }\n    }\n    false\n}\n","traces":[{"line":37,"address":[],"length":0,"stats":{"Line":47}},{"line":38,"address":[],"length":0,"stats":{"Line":47}},{"line":40,"address":[],"length":0,"stats":{"Line":30}},{"line":41,"address":[],"length":0,"stats":{"Line );\n        for ix in \u0026ctx.ir.instructions {\n            for acct in \u0026ix.accounts {\n                if acct.is_signer {\n                    continue;\n                }\n                if ast_signed.contains(\u0026acct.name) {\n                    continue;\n                }\n\n                let (reason, hint) = if ast_account_info.contains(\u0026acct.name) {\n                    (\n                        format!(\n                            \"Account `{}` on instruction `{}` is declared as `AccountInfo` in the handler but is not marked as a signer in the IDL. `AccountInfo` is the unsafe escape hatch — there is no runtime signer check.\",\n                            acct.name, ix.name\n                        ),\n                        \"Type the field as `Signer` instead of `AccountInfo`.\".to_string(),\n                    )\n                } else {\n                    let lname = acct.name.to_ascii_lowercase();\n                    if !SUSPECT_NAMES.iter().any(|n| lname.contains(n)) {\n                        continue;\n                    }\n                    (\n                        format!(\n                            \"Account `{}` on instruction `{}` is not marked as a signer but its name implies authority.\",\n                            acct.name, ix.name\n                        ),\n                        \"Type the field as `Signer` or add `#[account(signer)]`.\".to_string(),\n                    )\n                };\n\n                let mut b = Finding::builder(self.id(), self.severity(), reason)\n                    .program(\u0026ctx.ir.name)\n                    .instruction(\u0026ix.name)\n                    .account(\u0026acct.name)\n                    .hint(hint);\n                if let Some(h) = hint_index.get(\u0026acct.name) {\n                    b = h.location().stamp(b);\n                }\n                out.push(b.build());\n            }\n        }\n        Ok(out)\n    }\n}\n","traces":[{"line":36,"add u0026self) -\u003e \u0026'static str {\n        \"pda_misconfig\"\n    }\n    fn description(\u0026self) -\u003e \u0026'static str {\n        \"PDA seeds without an explicit, canonical bump\"\n    }\n    fn severity(\u0026self) -\u003e Severity {\n        Severity::High\n    }\n    fn layer(\u0026self) -\u003e Layer {\n        Layer::IdlAst\n    }\n\n    fn check(\u0026self, ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e {\n        let mut out = Vec::new();\n        let mut seen_fields = std::collections::HashSet::new();\n        let hint_index = field_hint_index(ctx);\n\n        for hint in \u0026ctx.ast_hints {\n            if let AstHintKind::AccountsField {\n                field_name,\n                constraints,\n                ..\n            } = \u0026hint.kind\n            {\n                let joined: String = constraints.join(\", \");\n\n                if joined.contains(\"seeds\") \u0026\u0026 !joined.contains(\"bump\") {\n                    seen_fields.insert(field_name.clone());\n                    let mut b = Finding::builder(\n                        self.id(),\n                        self.severity(),\n                        format!(\n                            \"Account `{}` declares `seeds = [...]` but does not pin the bump. Bump canonicalization is left to runtime guesswork, which can be exploited by passing non-canonical bumps.\",\n                            field_name\n                        ),\n                    )\n                    .program(\u0026ctx.ir.name)\n                    .account(field_name)\n                    .hint(\"Add `bump` to the constraint (e.g. `bump` or `bump = ctx.bumps.\u003cfield\u003e`).\");\n                    if let Some(h) = hint_index.get(field_name) {\n                        b = h.location().stamp(b);\n                    }\n                    out.push(b.build());\n                    continue;\n                }\n\n                if let Some(idx) = joined.find(\"bump\") {\n                    let after = \u0026joined[idx + \"bump\".len()..];\n                    if after.starts_with('s') {\n                        continue;\n                    }\n                    if let Some(eq_idx) = after.find('=') {\n                        let expr = after[eq_idx + 1..]\n                            .trim_start()\n                            .trim_end_matches(',')\n                            .trim();\n                        if !expr.is_empty()\n                            \u0026\u0026 expr != \"ctx.bumps\"\n                            \u0026\u0026 !expr.starts_with(\"ctx.bumps\")\n                            \u0026\u0026 is_plain_ident(expr)\n                        {\n                            seen_fields.insert(field_name.clone());\n                            let mut b = Finding::builder(\n                                self.id(),\n                                self.severity(),\n                                format!(\n                                    \"Account `{}` pins `bump = {}` — this binds the bump to a user-supplied value instead of the canonical bump. The classic Sealevel-Attacks bypass.\",\n                                    field_name, expr\n                                ),\n                            )\n                            .program(\u0026ctx.ir.name)\n                            .account(field_name)\n                            .hint(\"Replace with the bare `bump` identifier or `bump = ctx.bumps.\u003cfield\u003e` to use the canonical bump.\");\n                            if let Some(h) = hint_index.get(field_name) {\n                                b = h.location().stamp(b);\n                            }\n                            out.push(b.build());\n                        }\n                    }\n                }\n            }\n        }\n\n        for ix in \u0026ctx.ir.instructions {\n            for acct in \u0026ix.accounts {\n                if let Some(pda) = \u0026acct.pda {\n std::collections::HashMap;\n\nuse crate::engine::{AnalysisContext, AstHintKind, Finding, Layer, Rule, Severity};\n\npub struct UncheckedBalanceFlow;\n\nimpl Rule for UncheckedBalanceFlow {\n    fn id(\u0026self) -\u003e \u0026'static str {\n        \"unchecked_balance_flow\"\n    }\n    fn description(\u0026self) -\u003e \u0026'static str {\n        \"Potential lamports conservation violation — debits without matching credits\"\n    }\n    fn severity(\u0026self) -\u003e Severity {\n        Severity::Medium\n    }\n    fn layer(\u0026self) -\u003e Layer {\n        Layer::IdlAst\n    }\n\n    fn check(\u0026self, ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e {\n        let hint_count = ctx.ast_hints.len();\n        let mut credits: HashMap\u003cString, Vec\u003c(String, String, usize)\u003e\u003e =\n            HashMap::with_capacity(hint_count);\n        let mut debits: HashMap\u003cString, Vec\u003c(String, usize)\u003e\u003e = HashMap::with_capacity(hint_count);\n        let mut cpi_ops: HashMap\u003cString, Vec\u003cString\u003e\u003e = HashMap::with_capacity(hint_count);\n\n        let mut current_fn: Option\u003cString\u003e = None;\n        for hint in \u0026ctx.ast_hints {\n            if let AstHintKind::InstructionHandler { fn_name, .. } = \u0026hint.kind {\n                current_fn = Some(fn_name.clone());\n                continue;\n            }\n            let Some(ref fn_name) = current_fn else {\n                continue;\n            };\n\n            match \u0026hint.kind {\n                AstHintKind::LamportsCredit {\n                    account,\n                    amount_expr,\n                    seq,\n                } =\u003e {\n                    credits.entry(fn_name.clone()).or_default().push((\n                        account.clone(),\n                        amount_expr.clone(),\n                        *seq,\n                    ));\n                }\n                AstHintKind::LamportsDebit { account, seq, .. } =\u003e {\n                    debits\n                        .entry(fn_name.clone())\n                        .or_default()\n                        .push((account.clone(), *seq));\n                }\n                AstHintKind::CpiTransfer { target, seq } =\u003e {\n                    cpi_ops\n                        .entry(fn_name.clone())\n                        .or_default()\n                        .push(format!(\"{target}@{seq}\"));\n                }\n                _ =\u003e {}\n            }\n        }\n\n        let mut out = Vec::new();\n        for ix in \u0026ctx.ir.instructions {\n            let writable_non_signers: Vec\u003c_\u003e = ix\n                .accounts\n                .iter()\n                .filter(|a| a.is_mut \u0026\u0026 !a.is_signer \u0026\u0026 !is_system_account(\u0026a.name))\n                .collect();\n\n            if writable_non_signers.is_empty() {\n                continue;\n            }\n\n            let ix_credits = credits.get(\u0026ix.name).map(|v| v.len()).unwrap_or(0);\n            let ix_debits = debits.get(\u0026ix.name).map(|v| v.len()).unwrap_or(0);\n            let ix_cpi = cpi_ops.get(\u0026ix.name).map(|v| v.len()).unwrap_or(0);\n\n            if ix_debits \u003e 0 \u0026\u0026 ix_credits == 0 \u0026\u0026 ix_cpi == 0 {\n                let has_rent_check = ctx.ast_hints.iter().any(|h| {\n                    if let AstHintKind::BalanceCheck {\n                        check_type,\n                        account,\n                        ..\n                    } = \u0026h.kind\n                    {\n                        (check_type.contains(\"rent\") || check_type.contains(\"min\"))\n                            \u0026\u0026 writable_non_signers.iter().any(|a| a.name == *account)\n                    } else {\n                        false\n                    }\n                });\n\n                if !has_rent_check {\n                    let account_names: Vec\u003c\u0026str\u003e = writable_non_signers\n                        .iter()\n                        .map(|a| a.name.as_str())\n                        .collect();\n                    out.push(\n                        Finding::builder(\n                            self.id(),\n                            self.severity(),\n                            format!(\n                                \"Instruction `{}` debits lamports from {} but shows no corresponding \\\n                                 credit or CPI. This may violate lamports conservation or drop accounts below \\\n                                 the rent-exempt minimum.\",\n                                ix.name,\n                                account_names.join(\", \")\n                            ),\n                        )\n                        .program(\u0026ctx.ir.name)\n                        .instruction(\u0026ix.name)\n                        .hint(\n                            \"Verify that debited lamports are credited elsewhere, or add a \\\n                             rent-exempt minimum check: `require!(account.lamports() \u003e= rent_exempt_min, ErrorCode::RentViolation)`.\",\n                        )\n                        .build(),\n                    );\n                }\n            } else if ix_debits \u003e 0 \u0026\u0026 ix_credits == 0 \u0026\u0026 ix_cpi \u003e 0 {\n                let targets = cpi_ops\n                    .get(\u0026ix.name)\n                    .expect(\"CPI ops should exist when ix_cpi \u003e 0\");\n                let account_names: Vec\u003c\u0026str\u003e = writable_non_signers\n                    .iter()\n                    .map(|a| a.name.as_str())\n                    .collect();\n                out.push(\n                    Finding::builder(\n                        self.id(),\n                        Severity::Info,\n                        format!(\n                            \"Instruction `{}` debits from {} but relies on CPI to {} for \\\n es.join(\", \"),\n                                credit_list\n                            ),\n                        )\n                        .program(\u0026ctx.ir.name)\n                        .instruction(\u0026ix.name)\n                        .hint(\n                            \"Consider adding a rent-exempt check to prevent accidental \\\n                             account destruction: `require!(account.lamports() \u003e= rent_exempt, ...)`. \",\n                        )\n                        .build(),\n                    );\n                }\n            }\n        }\n\n        Ok(out)\n    }\n}\n\nfn is_system_account(name: \u0026str) -\u003e bool {\n    matches!(\n        name,\n        \"system_program\" | \"system\" | \"rent\" | \"clock\" | \"token_program\"\n    )\n}\n","traces":[{"line":23,"address":[],"length":0,"stats":{"Line":52}},{"line":24,"address":[],"length":0,"stats":{"Line":52}},{"line":26,"address":[],"length":0,"stats":{"Line":30}},{"line":27,"address":[],"length":0,"stats":{"Line":30}},{"line":29,"address":[],"length":0,"stats":{"Line":48}},{"line":30,"address":[],"length":0,"stats":{"Line":48}},{"line":32,"address":[],"length":0,"stats":{"Line":1}},{"line":33,"address":[],"length":0,"stats":{"Line":1}},{"line":36,"address":[],"length":0,"stats":{"Line":27}},{"line":37,"address":[],"length":0,"stats":{"Line":81}},{"line":38,"address":[],"length":0,"stats":{"Line":54}},{"line":39,"address":[],"length":0,"stats":{"Line":54}},{"line":40,"address":[],"length":0,"stats":{"Line":108}},{"line":41,"address":[],"length":0,"stats":{"Line":108}},{"line":43,"address":[],"length":0,"stats":{"Line":81}},{"line":44,"address":[],"length":0,"stats":{"Line":366}},{"line":45,"address":[],"length":0,"stats":{"Line":408}},{"line":46,"address":[],"length":0,"stats":{"Line":138}},{"line":47,"address":[],"length":0,"stats":{"Line":69}},{"line":49,"address":[],"length":0,"stats":{"Line":339}},{"line":50,"address":[],"length":0,"stats":{"Line":201}},{"l e]) -\u003e bool {\n    for a in attrs {\n        if !a.path().is_ident(\"derive\") {\n            continue;\n        }\n        let parsed = a.parse_args::\u003csyn::Ident\u003e();\n        if let Ok(ident) = parsed {\n            if ident == \"Accounts\" {\n                return true;\n            }\n        }\n        if let syn::Meta::List(list) = \u0026a.meta {\n            let tokens = list.tokens.to_string();\n            if tokens.split(',').any(|t| t.trim() == \"Accounts\") {\n                return true;\n            }\n        }\n    }\n    false\n}\n\nfn visit_accounts_struct(s: \u0026ItemStruct, hints: \u0026mut Vec\u003cRawHint\u003e) {\n    let struct_name = s.ident.to_string();\n    let named = match \u0026s.fields {\n        Fields::Named(n) =\u003e \u0026n.named,\n        _ =\u003e return,\n    };\n    for field in named {\n        let field_name = field\n            .ident\n            .as_ref()\n            .map(|i| i.to_string())\n            .unwrap_or_default();\n        let ty = quote::ToTokens::to_token_stream(\u0026field.ty)\n            .to_string()\n            .replace(char::is_whitespace, \"\");\n        let constraints = field\n            .attrs\n            .iter()\n            .filter(|a| a.path().is_ident(\"account\"))\n            .map(stringify_attr)\n            .collect::\u003cVec\u003c_\u003e\u003e();\n\n        hints.push(RawHint {\n            kind: AstHintKind::AccountsField {\n                struct_name: struct_name.clone(),\n                field_name,\n                ty,\n                constraints,\n            },\n            start: field.span().start(),\n        });\n    }\n}\n\nfn stringify_attr(a: \u0026Attribute) -\u003e String {\n    match \u0026a.meta {\n        syn::Meta::List(list) =\u003e list.tokens.to_string(),\n        _ =\u003e String::new(),\n    }\n}\n","traces":[{"line":38,"address":[],"length":0,"stats":{"Line":26}},{"line":44,"address":[],"length":0,"stats":{"Line":282}},{"line":45,"address":[],"l body doesn't read it.\n    #[allow(dead_code)]\n    pub file: \u0026'a str,\n    pub out: \u0026'a mut FileFns,\n}\n\nimpl\u003c'a\u003e InstructionFnVisitor\u003c'a\u003e {\n    pub fn new(file: \u0026'a str, out: \u0026'a mut FileFns) -\u003e Self {\n        Self { file, out }\n    }\n}\n\nimpl\u003c'ast, 'a\u003e Visit\u003c'ast\u003e for InstructionFnVisitor\u003c'a\u003e {\n    fn visit_item(\u0026mut self, i: \u0026'ast Item) {\n        if let Item::Mod(m) = i {\n            if has_program_attr(\u0026m.attrs) {\n                let mod_name = m.ident.to_string();\n                if let Some((_, items)) = \u0026m.content {\n                    for item in items {\n                        if let syn::Item::Fn(f) = item {\n                            visit_handler_fn(f, \u0026mod_name, \u0026mut self.out.hints);\n                        }\n                    }\n                }\n            }\n        }\n        if let Item::Impl(imp) = i {\n            if has_program_attr(\u0026imp.attrs) {\n                let struct_name = match \u0026*imp.self_ty {\n                    Type::Path(p) =\u003e last_path_segment(\u0026p.path).to_string(),\n                    _ =\u003e String::new(),\n                };\n                for item in \u0026imp.items {\n                    if let ImplItem::Fn(f) = item {\n                        visit_handler_fn_impl(f, \u0026struct_name, \u0026mut self.out.hints);\n                    }\n                }\n            }\n        }\n        visit::visit_item(self, i);\n    }\n}\n\nfn has_program_attr(attrs: \u0026[syn::Attribute]) -\u003e bool {\n    attrs.iter().any(|a| a.path().is_ident(\"program\"))\n}\n\nfn last_path_segment(path: \u0026syn::Path) -\u003e String {\n    path.segments\n        .last()\n        .map(|s| s.ident.to_string())\n        .unwrap_or_default()\n}\n\nfn visit_handler_fn(f: \u0026syn::ItemFn, mod_name: \u0026str, hints: \u0026mut Vec\u003cRawHint\u003e) {\n    let fn_name = f.sig.ident.to_string();\n    let start = f.sig.ident.span().start();\n    hints.push(RawHint {\n        kind: AstHintKind::InstructionHandler {\n            struct_name: mod_name.to_string(),\n            fn_name: fn_name.clone(),\n        },\n        start,\n    });\n\n    let mut visitor = BalanceVisitor::new(hints);\n    visitor.visit_block(\u0026f.block);\n}\n\nfn visit_handler_fn_impl(f: \u0026ImplItemFn, struct_name: \u0026str, hints: \u0026mut Vec\u003cRawHint\u003e) {\n    let fn_name = f.sig.ident.to_string();\n    let start = f.sig.ident.span().start();\n    hints.push(RawHint {\n        kind: AstHintKind::InstructionHandler {\n            struct_name: struct_name.to_string(),\n            fn_name,\n        },\n        start,\n    });\n\n    let mut visitor = BalanceVisitor::new(hints);\n    visitor.visit_block(\u0026f.block);\n}\n\nstruct BalanceVisitor\u003c'a\u003e {\n    hints: \u0026'a mut Vec\u003cRawHint\u003e,\n    seq_counter: usize,\n}\n\nimpl\u003c'a\u003e BalanceVisitor\u003c'a\u003e {\n    fn new(hints: \u0026'a mut Vec\u003cRawHint\u003e) -\u003e Self {\n        Self {\n            hints,\n            seq_counter: 0,\n        }\n    }\n\n    fn next_seq(\u0026mut self) -\u003e usize {\n        let s = self.seq_counter;\n        self.seq_counter += 1;\n        s\n    }\n}\n\nimpl\u003c'ast, 'a\u003e Visit\u003c'ast\u003e for BalanceVisitor\u003c'a\u003e {\n    fn visit_stmt(\u0026mut self, s: \u0026'ast syn::Stmt) {\n        if let syn::Stmt::Macro(sm) = s {\n            visit_stmt_macro(self, sm);\n        }\n        visit::visit_stmt(self, s);\n    }\n\n    fn visit_expr(\u0026mut self, e: \u0026'ast Expr) {\n        visit::visit_expr(self, e);\n    }\n\n    fn visit_expr_binary(\u0026mut self, e: \u0026'ast ExprBinary) {\n        if let Some(op) = match e.op {\n            BinOp::Add(_) =\u003e Some(\"+\"),\n            BinOp::Sub(_) =\u003e Some(\"-\"),\n            BinOp::Mul(_) =\u003e Some(\"*\"),\n            BinOp::Div(_) =\u003e Some(\"/\"),\n            BinOp:: nstructionFnVisitor::new(\u0026file, \u0026mut fns);\n\n    av.visit_file(\u0026ast);\n    fv.visit_file(\u0026ast);\n\n    // Each visitor stores its own private `RawHint` type, so we resolve\n    // spans to engine-level `AstHint` values per-visitor and then chain\n    // those. The `file` is the same for both, and `start.line`/`column`\n    // are 1-based because `proc_macro2` reports them that way.\n    let mut hints: Vec\u003cAstHint\u003e = Vec::new();\n    for raw in accounts.hints {\n        hints.push(AstHint {\n            kind: raw.kind,\n            file: file.clone(),\n            line: raw.start.line,\n            column: raw.start.column,\n        });\n    }\n    for raw in fns.hints {\n        hints.push(AstHint {\n            kind: raw.kind,\n            file: file.clone(),\n            line: raw.start.line,\n            column: raw.start.column,\n        });\n    }\n    Some(hints)\n}\n","traces":[{"line":18,"address":[],"length":0,"stats":{"Line":27}},{"line":19,"address":[],"length":0,"stats":{"Line":54}},{"line":20,"address":[],"length":0,"stats":{"Line":53}},{"line":21,"address":[],"length":0,"stats":{"Line":78}},{"line":22,"address":[],"length":0,"stats":{"Line":52}},{"line":25,"address":[],"length":0,"stats":{"Line":27}},{"line":28,"address":[],"length":0,"stats":{"Line":26}},{"line":29,"address":[],"length":0,"stats":{"Line":104}},{"line":30,"address":[],"length":0,"stats":{"Line":104}},{"line":31,"address":[],"length":0,"stats":{"Line":78}},{"line":33,"address":[],"length":0,"stats":{"Line":52}},{"line":34,"address":[],"length":0,"stats":{"Line":52}},{"line":35,"address":[],"length":0,"stats":{"Line":104}},{"line":36,"address":[],"length":0,"stats":{"Line":104}},{"line":38,"address":[],"length":0,"stats":{"Line":78}},{"line":39,"address":[],"length":0,"stats":{"Line":78}},{"line":45,"address":[],"length":0,"stats":{"Line":78}},{"line":46,"address":[],"length":0,"stats":{"Line":428}},{"line":47,"address":[],"length":0,"stats":{"Line":603}},{ s,\n\n    /// Print the sentinel version.\n    Version,\n\n    /// Explain a security rule in detail.\n    Explain {\n        /// The rule id to explain (e.g., missing_signer).\n        rule_id: String,\n    },\n}\n\n#[derive(Copy, Clone, Debug, Default, ValueEnum)]\npub enum OutputFormat {\n    #[default]\n    Text,\n    Json,\n    Sarif,\n}\n\n#[derive(Copy, Clone, Debug, ValueEnum)]\npub enum MinSeverity {\n    Info,\n    Low,\n    Medium,\n    High,\n    Critical,\n}\n\nimpl MinSeverity {\n    pub fn into_severity(self) -\u003e Severity {\n        match self {\n            MinSeverity::Info =\u003e Severity::Info,\n            MinSeverity::Low =\u003e Severity::Low,\n            MinSeverity::Medium =\u003e Severity::Medium,\n            MinSeverity::High =\u003e Severity::High,\n            MinSeverity::Critical =\u003e Severity::Critical,\n        }\n    }\n}\n","traces":[{"line":77,"address":[],"length":0,"stats":{"Line":0}},{"line":78,"address":[],"length":0,"stats":{"Line":0}},{"line":79,"address":[],"length":0,"stats":{"Line":0}},{"line":80,"address":[],"length":0,"stats":{"Line":0}},{"line":81,"address":[],"length":0,"stats":{"Line":0}},{"line":82,"address":[],"length":0,"stats":{"Line":0}},{"line":83,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":7},{"path":["/","Users","enjo","anchor-sentinel","src","config.rs"],"content":"//! Config file (`sentinel.toml`) support.\n//!\n//! Sentinel looks for `sentinel.toml` in two places:\n//!   1. The project root (the directory containing `Anchor.toml`)\n//!   2. The current working directory\n//!\n//! The project root takes precedence.\n//!\n//! Supported TOML format:\n//!\n//!   [exclude]\n//!   paths = [\"tests\", \"migrations\"]\n//!\n//!   [ignore]\n//!   rules = [\"missing_mut\"]\n//!\n//!   [severity]\n//!   min = \"high\"\n\nuse std::path::{Path, PathBuf};\n\n/// Sentinel configuration.\n#[derive(Debug, Default, serde::Deserialize)]\npub struct Config {\n    /// Nested exclude configuration.\n    #[serde(default)]\n    pub exclude: ExcludeConfig,\n    /// Nested ignore configuration.\n    #[serde(default)]\n    pub ignore: IgnoreConfig,\n    /// Nested severity configuration.\n    #[serde(default)]\n    pub severity: SeverityConfig,\n}\n\n/// Exclude configuration.\n#[derive(Debug, Default, serde::Deserialize)]\npub struct ExcludeConfig {\n    /// Paths to exclude from scanning.\n    #[serde(default)]\n    pub paths: Vec\u003cString\u003e,\n}\n\n/// Ignore configuration.\n#[derive(Debug, Default, serde::Deserialize)]\npub struct IgnoreConfig {\n    /// Rules to ignore.\n    #[serde(default)]\n    pub rules: Vec\u003cString\u003e,\n}\n\n/// Severity configuration.\n#[derive(Debug, Default, serde::Deserialize)]\npub struct SeverityConfig {\n    /// Minimum severity level.\n    #[serde(default)]\n    pub min: Option\u003cString\u003e,\n}\n\nimpl Config {\n    /// Load config from the project root, falling back to cwd.\n    pub fn load(project_root: \u0026Path) -\u003e Self {\n        if let Some(config) = Self::load_from(project_root) {\n            return config;\n        }\n\n        if let Ok(cwd) = std::env::current_dir() {\n            if cwd != project_root {\n                if let Some(config) = Self::load_from(\u0026cwd) {\n                    return config;\n                }\n            }\n        }\n\n        Self::default()\n    }\n\n    fn load_from(dir: \u0026Path) -\u003e Option\u003cSelf\u003e {\n        let config_path = dir.join(\"sentinel.toml\");\n        if !config_path.exists() {\n            return None;\n        }\n\n        let contents = std::fs::read_to_string(\u0026config_path).ok()?;\n        Self::parse(\u0026contents).ok()\n    }\n\n    fn parse(contents: \u0026str) -\u003e Result\u003cSelf, toml::de::Error\u003e {\n        toml::from_str(contents)\n    }\n\n    /// Returns the exclude paths.\n    pub fn exclude_paths(\u0026self) -\u003e \u0026[String] {\n        \u0026self.exclude.paths\n    }\n\n    /// Returns the ignore rules.\n    pub fn ignore_rules(\u0026self) -\u003e \u0026[String] {\n        \u0026self.ignore.rules\n    }\n\n    /// Returns the minimum severity.\n    pub fn min_severity(\u0026self) -\u003e Option\u003c\u0026str\u003e {\n        self.severity.min.as_deref()\n    }\n}\n\n/// Check if a path should be excluded based on patterns.\npub fn is_excluded(path: \u0026Path, patterns: \u0026[String]) -\u003e bool {\n    let path_str = path.to_string_lossy();\n\n    for pattern in patterns {\n        if pattern.contains('*') {\n            let glob_match = glob_match(pattern, \u0026path_str);\n            if glob_match {\n                return true;\n            }\n        } else {\n            let pattern_path = PathBuf::from(pattern);\n            if path == pattern_path || path.starts_with(\u0026pattern_path) {\n                return true;\n            }\n        }\n    }\n\n    false\n}\n\n/// Simple glob matching (handles `*` wildcards).\nfn glob_match(pattern: \u0026str, text: \u0026str) -\u003e bool {\n    let parts: Vec\u003c\u0026str\u003e = pattern.split('*').collect();\n\n    if parts.len() == 1 {\n        return pattern == text;\n    }\n\n    let mut pos = 0;\n    for (i, part) in parts.iter().enumerate() {\n        if part.is_empty() {\n            continue;\n        }\n\n        if let Some(found) = text[pos..].find(part) {\n            if i == 0 \u0026\u0026 found != 0 {\n                return false;\n            }\n            pos += found + part.len();\n        } else {\n            return false;\n        }\n    }\n\n    if pattern.ends_with('*') {\n        true\n    } else {\n        pos == text.len()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_exact_match() {\n        let path = PathBuf::from(\"programs/test/src/lib.rs\");\n        assert!(is_excluded(\u0026path, \u0026[\"programs/test\".to_string()]));\n        assert!(is_excluded(\n            \u0026path,\n            \u0026[\"programs/test/src/lib.rs\".to_string()]\n        ));\n        assert!(!is_excluded(\u0026path, \u0026[\"programs/other\".to_string()]));\n    }\n\n    #[test]\n    fn test_glob_match() {\n        let path = PathBuf::from(\"tests/fixtures/vault/src/lib.rs\");\n        assert!(is_excluded(\u0026path, \u0026[\"tests/*\".to_string()]));\n        assert!(!is_excluded(\u0026path, \u0026[\"programs/*\".to_string()]));\n    }\n\n    #[test]\n    fn test_config_parse_nested() {\n        let toml = r#\"\n            [exclude]\n            paths = [\"src/lib.rs\", \"tests/**/*.rs\"]\n\n            [ignore]\n            rules = [\"missing_mut\", \"unsafe_arithmetic\"]\n\n            [severity]\n            min = \"critical\"\n        \"#;\n        let config = Config::parse(toml).unwrap();\n        assert_eq!(config.exclude.paths, vec![\"src/lib.rs\", \"tests/**/*.rs\"]);\n        assert_eq!(\n            config.ignore.rules,\n            vec![\"missing_mut\", \"unsafe_arithmetic\"]\n        );\n        assert_eq!(config.severity.min, Some(\"critical\".to_string()));\n    }\n\n    #[test]\n    fn test_config_parse_empty() {\n        let toml = \"\";\n        let config = Config::parse(toml).unwrap();\n        assert!(config.exclude.paths.is_empty());\n        assert!(config.severity.min.is_none());\n        assert!(config.ignore.rules.is_empty());\n    }\n\n    #[test]\n    fn test_config_parse_comments_only() {\n        let toml = r#\"\n            # This is a comment\n            # [exclude]\n            # paths = [\"tests\"]\n        \"#;\n        let config = Config::parse(toml).unwrap();\n        assert!(config.exclude.paths.is_empty());\n    }\n\n    #[test]\n    fn test_config_parse_partial() {\n        let toml = r#\"\n            [exclude]\n            paths = [\"tests\", \"migrations\"]\n        \"#;\n        let config = Config::parse(toml).unwrap();\n        assert_eq!(config.exclude.paths, vec![\"tests\", \"migrations\"]);\n        assert!(config.ignore.rules.is_empty());\n    }\n}\n","tra
