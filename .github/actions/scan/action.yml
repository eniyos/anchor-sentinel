name: "Anchor Sentinel"
description: "Static security analysis for Solana Anchor programs"
author: "Eniyanyosuva"

branding:
  icon: "shield"
  color: "orange"

inputs:
  working-directory:
    description: "Path to the Anchor project root (directory containing Anchor.toml)"
    required: false
    default: "."
  fail-on-severity:
    description: "Minimum severity to fail the build (critical, high, medium, low)"
    required: false
    default: "high"
  ignore-rules:
    description: "Comma-separated list of rule IDs to skip"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install anchor-sentinel
      run: cargo install anchor-sentinel
      shell: bash

    - name: Run Sentinel scan
      id: scan
      run: |
        sentinel scan "${{ inputs.working-directory }}" \
          --format sarif \
          --min-severity "${{ inputs.fail-on-severity }}" \
          ${{ inputs.ignore-rules != '' && format('--ignore {0}', inputs.ignore-rules) || '' }} \
          > sentinel-results.sarif 2>&1 || true
        # Ensure the SARIF file exists even if sentinel failed (e.g. no IDL files)
        if [ ! -s sentinel-results.sarif ]; then
          echo '{"\$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json","version":"2.1.0","runs":[]}' > sentinel-results.sarif
        fi
      shell: bash

    - name: Upload SARIF to GitHub Code Scanning
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: sentinel-results.sarif
        wait-for-processing: false

    - name: Check scan result
      run: |
        # Re-run sentinel without SARIF to get the real exit code
        sentinel scan "${{ inputs.working-directory }}" \
          --min-severity "${{ inputs.fail-on-severity }}" \
          ${{ inputs.ignore-rules != '' && format('--ignore {0}', inputs.ignore-rules) || '' }}
      shell: bash
