name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Run all tests
        run: cargo test

  integration:
    name: integration
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Build sentinel binary
        run: cargo build --bin sentinel --release
      - name: Run integration tests
        run: |
          set +e
          FAIL=0
          for fixture in $(find tests/fixtures -mindepth 1 -maxdepth 1 -type d -exec test -d {}/programs \; -print | sort); do
            name="$(basename "$fixture")"
            echo "==> scanning $name"
            output=$(./target/release/sentinel scan --strict "$fixture" 2>&1)
            EXIT=$?
            if [ "$EXIT" -eq 0 ]; then
              echo "  clean fixture (exit 0)"
            elif [ "$EXIT" -eq 1 ]; then
              echo "  vulnerable fixture (exit 1)"
            else
              echo "  ERROR: unexpected exit code $EXIT"
              FAIL=1
            fi
            if ! echo "$output" | grep -qE 'no findings|Security Overview|Risk Score|● '; then
              echo "  ERROR: no recognizable output"
              FAIL=1
            fi
          done
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Integration tests failed"
            exit 1
          fi

  build-linux:
    name: build-linux
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --bin sentinel --release
      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/sentinel dist/
          tar -czf sentinel-linux-x64.tar.gz -C dist sentinel
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-linux-x64.tar.gz
          path: sentinel-linux-x64.tar.gz
          retention-days: 7

  build-macos:
    name: build-macos
    runs-on: macos-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --bin sentinel --release
      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/sentinel dist/
          tar -czf sentinel-macos-x64.tar.gz -C dist sentinel
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-macos-x64.tar.gz
          path: sentinel-macos-x64.tar.gz
          retention-days: 7

  build-windows:
    name: build-windows
    runs-on: windows-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --bin sentinel --release
      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/sentinel.exe dist/
          cd dist && powershell -Command "Compress-Archive sentinel.exe ../sentinel-windows-x64.zip"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-windows-x64.zip
          path: sentinel-windows-x64.zip
          retention-days: 7
