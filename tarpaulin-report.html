he single entry points used by `main.rs`.\n//!\n//! All color calls are gated on `tty::interactive()`, so the test\n//! suite (which pipes stdout) gets a clean plain-text stream and the\n//! snapshot/integration tests don't need to filter ANSI escape codes.\n//!\n//! Design tenets:\n//!   1. Information first — risk + critical findings + verdict visible in 3s.\n//!   2. Severity driven — Critical dominates; Medium never competes visually.\n//!   3. Progressive disclosure — overview → findings → details.\n//!   4. Spacing over boxes — at most three \"cards\" (hero, overview, verdict).\n//!   5. Cargo-style tables (no box drawing) for the `sentinel rules` listing.\n\nuse std::time::Duration;\n\nuse colored::*;\n\nuse crate::engine::{Finding, Severity};\nuse crate::report::tty;\n\n/// Per-stage durations measured by `main.rs` around the four scan\n/// phases, plus a wall-clock total. All fields are wall-clock from\n/// the start of the corresponding phase (or the whole scan, for\n/// `total`).\n#[derive(Debug, Clone, Copy)]\npub struct ScanTimings {\n    pub load: Duration,\n    pub parse_idls: Duration,\n    pub ast_hints: Duration,\n    pub run_rules: Duration,\n    pub total: Duration,\n}\n\n/// Everything `main.rs` knows about a finished scan, bundled for the\n/// sectioned printers. Borrow-only — the caller owns the underlying\n/// data and is responsible for outliving these printers.\npub struct ScanReport\u003c'a\u003e {\n    pub timings: ScanTimings,\n    pub programs: usize,\n    pub instructions: usize,\n    pub rules_executed: usize,\n    pub findings: \u0026'a [Finding],\n}\n\nmod risk {\n    /// Compute the 0..=100 risk score from severity counts.\n    pub fn score(c: usize, h: usize, m: usize, l: usize) -\u003e u32 {\n        let penalty = (c as u32) * 25 + (h as u32) * 8 + (m as u32) * 3 + l as u32;\n        100u32.saturating_sub(penalty)\n    }\n\n    /// Letter grade derived from the score. A=90-100, B=75-89, C=50-74,\n    /// D=25-49, F=0-24. Bounded on both ends — saturating_sub in\n    /// `score` keeps us in 0..=100 so the match is exhaustive over\n    /// the natural range.\n    pub fn grade(s: u32) -\u003e \u0026'static str {\n        match s {\n            90..=100 =\u003e \"A\",\n            75..=89 =\u003e \"B\",\n            50..=74 =\u003e \"C\",\n            25..=49 =\u003e \"D\",\n            _ =\u003e \"F\",\n        }\n    }\n\n    /// Authoritative deployment recommendation. Critical findings\n    /// always produce `Blocked`, regardless of score. Otherwise the\n    /// score decides: 90+ → Approved, 50-89 → ReviewRequired,\n    /// \u003c50 → Blocked.\n    #[derive(Debug, Clone, Copy, PartialEq, Eq)]\n    pub enum Verdict {\n        Approved,\n        ReviewRequired,\n        Blocked,\n    }\n\n    /// The `(verdict, label)` pair the verdict printer renders. The\n    /// `\u0026'static str` is the headline (e.g. `\"DEPLOYMENT BLOCKED\"`);\n    /// the follow-up sentence is generated separately.\n    pub fn verdict(c: usize, h: usize, m: usize, l: usize) -\u003e (Verdict, \u0026'static str) {\n        if c \u003e= 1 {\n            return (Verdict::Blocked, \"DEPLOYMENT BLOCKED\");\n        }\n        let s = score(c, h, m, l);\n        match s {\n            90..=100 =\u003e (Verdict::Approved, \"DEPLOYMENT APPROVED\"),\n            50..=89 =\u003e (Verdict::ReviewRequired, \"DEPLOYMENT REVIEW REQUIRED\"),\n            _ =\u003e (Verdict::Blocked, \"DEPLOYMENT BLOCKED\"),\n        }\n    }\n\n    /// One-sentence follow-up for the verdict. Used by the Security\n    /// Overview block and the final Verdict block. The sentences are\n    /// designed to read naturally at any count — `1 finding` is\n    /// pluralized to `1 finding`, larger counts are bare plurals.\n    pub fn follow_up(c: usize, h: usize, m: usize, l: usize) -\u003e String {\n        // Critical override: always this exact phrasing, regardless of\n        // the score. Matches the user's spec example verbatim.\n        if c \u003e= 1 {\n            return pluralize(c, \"Critical finding\", \"Critical findings\")\n                + \" must be resolved before deployment.\";\n        }\n        let s = score(c, h, m, l);\n        if s \u003e= 90 {\n            // Approved path. The plan says \"No critical findings\n            // detected\" is the approved-state subline. We generalize\n            // to \"No critical or high-severity findings detected\" when\n            // both are zero, and to a count summary otherwise.\n            if h == 0 \u0026\u0026 m == 0 \u0026\u0026 l == 0 {\n                return \"No findings detected. Codebase is clean.\".to_string();\n            }\n            return \"No critical findings detected.\".to_string();\n        }\n        if s \u003e= 50 {\n            // Review required — surface the highest present severity.\n            if h \u003e 0 {\n                return pluralize(\n                    h,\n                    \"high-severity finding requires\",\n                    \"high-severity findings require\",\n                ) + \" review before deployment.\";\n            }\n            if m \u003e 0 {\n                return pluralize(\n                    m,\n                    \"medium-severity finding requires\",\n                    \"medium-severity findings require\",\n                ) + \" review before deployment.\";\n            }\n            return pluralize(\n                l,\n                \"low-severity finding requires\",\n                \"low-severity findings require\",\n            ) + \" review before deployment.\";\n        }\n        // Score \u003c50 with no critical: high-count saturated the score.\n        // Surface the dominant severity in the follow-up.\n        if h \u003e 0 {\n            return pluralize(h, \"high-severity finding is\", \"high-severity findings are\")\n                + \" blocking deployment.\";\n        }\n        if m \u003e 0 {\n            return pluralize(\n                m,\n                \"medium-severity finding is\",\n                \"medium-severity findings are\",\n            ) + \" blocking deployment.\";\n        }\n        pluralize(l, \"low-severity finding is\", \"low-severity findings are\")\n            + \" blocking deployment.\"\n    }\n\n    fn pluralize(n: usize, singular: \u0026str, plural: \u0026str) -\u003e String {\n        let word = if n == 1 { singular } else { plural };\n        format!(\"{n} {word}\")\n    }\n}\n\n/// Print the scan opener: a brand line, a tagline, and the target\n/// path. Three lines plus a blank. No box, no animation.\npub fn print_hero(project: \u0026str, config: \u0026crate::config::Config) {\n    if tty::interactive() {\n        // The brand line: ⚓ glyph in bright_cyan+bold, \"Anchor Sentinel\"\n        // in white+bold, version in dim. Per the spec the human-readable\n        // name is \"Anchor Sentinel\" (two words, title case), not the\n        // kebab-case binary name.\n        println!(\n            \"{} {} {}\",\n            \"⚓\".bright_cyan().bold(),\n            \"Anchor Sentinel\".white().bold(),\n            format!(\"v{}\", env!(\"CARGO_PKG_VERSION\")).dimmed()\n        );\n        println!(\n            \"{}\",\n            \"Static Security Analysis for Solana Programs\".dimmed()\n        );\n        println!();\n        println!(\"{}  {}\", \"Target:\".dimmed(), project);\n\n        // Show config info if loaded\n        if !config.exclude.paths.is_empty() {\n            println!(\n                \"{}  {} patterns\",\n                \"Exclude:\".dimmed(),\n                config.exclude.paths.len()\n            );\n        }\n        if !config.ignore.rules.is_empty() {\n            println!(\n                \"{}  {} rules\",\n                \"Ignore:\".dimmed(),\n                config.ignore.rules.len()\n            );\n        }\n    } else {\n        println!(\"Anchor Sentinel v{}\", env!(\"CARGO_PKG_VERSION\"));\n        println!(\"Static Security Analysis for Solana Programs\");\n        println!();\n        println!(\"Target:  {}\", project);\n        if !config.exclude.paths.is_empty() {\n            println!(\"Exclude:  {} patterns\", config.exclude.paths.len());\n        }\n        if !config.ignore.rules.is_empty() {\n            println!(\"Ignore:   {} rules\", config.ignore.rules.len());\n        }\n    }\n}\n\n/// Print the 5-stage pipeline status with per-stage durations. The\n/// `✓` is green; labels are plain; durations are dim and right-aligned\n/// in a 6-char field. TTY vs non-TTY diverge only on color, not on\n/// content — the test suite sees a clean plain-text pipeline.\npub fn print_pipeline(timings: \u0026ScanTimings) {\n    let stages: [(\u0026str, Duration); 5] = [\n        (\"Loaded rules\", timings.load),\n        (\"Parsed IDL\", timings.parse_idls),\n        (\"Built AST\", timings.ast_hints),\n        (\"Indexed accounts\", timings.ast_hints),\n        (\"Executed security checks\", timings.run_rules),\n    ];\n    for (label, dur) in stages {\n        let ms = dur.as_secs_f64() * 1000.0;\n        // Print duration as `412ms` for sub-second and `1.23s` for \u003e= 1s.\n        let dur_str = if ms \u003c 1000.0 {\n            format!(\"{:.0}ms\", ms)\n        } else {\n            format!(\"{:.2}s\", ms / 1000.0)\n        };\n        if tty::interactive() {\n            println!(\n                \"{}  {:\u003c26}{}\",\n                \"✓\".green().bold(),\n                label,\n                format!(\"{dur_str:\u003e8}\").dimmed()\n            );\n        } else {\n            println!(\"✓  {label:\u003c26}{dur_str:\u003e8}\");\n        }\n    }\n    let total_ms = timings.total.as_secs_f64() * 1000.0;\n    let total_str = if total_ms \u003c 1000.0 {\n        format!(\"{:.0}ms\", total_ms)\n    } else {\n        format!(\"{:.2}s\", total_ms / 1000.0)\n    };\n    println!();\n    if tty::interactive() {\n        println!(\"{} {}\", \"Completed in\".dimmed(), total_str.white().bold());\n    } else {\n        println!(\"Completed in {total_str}\");\n    }\n    println!();\n}\n\n/// Print the security overview block: per-severity counts, the risk\n/// score (with grade), and the verdict. The label column is\n/// left-padded to 15 chars so the numbers align vertically.\npub fn print_security_overview(findings: \u0026[Finding]) {\n    let (c, h, m, l) = count_by_severity(findings);\n    let s = risk::score(c, h, m, l);\n    let g = risk::grade(s);\n    let (_, label) = risk::verdict(c, h, m, l);\n    let follow = risk::follow_up(c, h, m, l);\n\n    if tty::interactive() {\n        println!(\"{}\", \"Security Overview\".white().bold());\n        println!();\n        println!(\"{:\u003c15}{}\", \"Critical\", c.to_string().bright_red().bold());\n        println!(\"{:\u003c15}{}\", \"High\", h.to_string().yellow().bold());\n        println!(\"{:\u003c15}{}\", \"Medium\", m.to_string().blue().bold());\n        println!(\"{:\u003c15}{}\", \"Low\", l.to_string().dimmed());\n        println!();\n        println!(\"{:\u003c15}{}\", \"Risk Score\", format!(\"{s}/100\").white().bold());\n        println!(\"{:\u003c15}{}\", \"Grade\", g.white().bold());\n        println!(\"{:\u003c15}{}\", \"Verdict\", label_string_colored(label).bold());\n        println!();\n        println!(\"{}\", follow);\n    } else {\n        println!(\"Security Overview\");\n        println!();\n        println!(\"{:\u003c15}{c}\", \"Critical\");\n        println!(\"{:\u003c15}{h}\", \"High\");\n        println!(\"{:\u003c15}{m}\", \"Medium\");\n        println!(\"{:\u003c15}{l}\", \"Low\");\n        println!();\n        println!(\"{:\u003c15}{s}/100\", \"Risk Score\");\n        println!(\"{:\u003c15}{g}\", \"Grade\");\n        println!(\"{:\u003c15}{label}\", \"Verdict\");\n        println!();\n        println!(\"{follow}\");\n    }\n}\n\n/// Color a verdict string by its category. Used by the Security\n/// Overview block; the final Verdict block (Section 6) does the same\n/// coloring via `verdict_color()`.\nfn label_string_colored(label: \u0026str) -\u003e String {\n    if label.contains(\"APPROVED\") {\n        label.green().to_string()\n    } else if label.contains(\"REVIEW\") {\n        label.yellow().to_string()\n    } else {\n        label.red().to_string()\n    }\n}\n\n/// Print all findings, grouped by severity (Critical → Info) and\n/// sorted by location within each group. A separator line of `─` is\n/// drawn between findings within a group; a blank line separates\n/// groups. If there are no findings, prints `✔ no findings` and\n/// returns.\npub fn print_findings(findings: \u0026[Finding]) {\n    if findings.is_empty() {\n        if tty::interactive() {\n            println!(\"{}\", \"✔ no findings\".green().bold());\n        } else {\n            println!(\"✔ no findings\");\n        }\n        println!();\n        return;\n    }\n\n    let order = [\n        Severity::Critical,\n        Severity::High,\n        Severity::Medium,\n        Severity::Low,\n        Severity::Info,\n    ];\n    for sev in order {\n        let mut group: Vec\u003c\u0026Finding\u003e = findings.iter().filter(|f| f.severity == sev).collect();\n        if group.is_empty() {\n            continue;\n        }\n        group.sort_by(|a, b| {\n            a.file\n                .as_deref()\n                .unwrap_or(\"\")\n                .cmp(b.file.as_deref().unwrap_or(\"\"))\n                .then(a.line.unwrap_or(0).cmp(\u0026b.line.unwrap_or(0)))\n                .then(a.column.unwrap_or(0).cmp(\u0026b.column.unwrap_or(0)))\n        });\n\n        // Group header.\n        if tty::interactive() {\n            println!(\n                \"{}\",\n                sev.as_str()\n                    .to_uppercase()\n                    .bold()\n                    .color(severity_color(sev))\n            );\n        } else {\n            println!(\"{}\", sev.as_str().to_uppercase());\n        }\n        println!();\n\n        for (i, f) in group.iter().enumerate() {\n            print_finding(f);\n            if i + 1 \u003c group.len() {\n                println!(\"{}\", \"─\".repeat(60).dimmed());\n            }\n        }\n        println!();\n    }\n}\n\nfn print_finding(f: \u0026Finding) {\n    let sev_color = severity_color(f.severity);\n    let dim = |s: \u0026str| s.dimmed().to_string();\n    let bullet_colored = \"●\".color(sev_color).bold().to_string();\n\n    let header = if let Some(ix) = \u0026f.instruction {\n        format!(\n            \"{bullet_colored}  {}{}\",\n            f.rule.color(sev_color).bold(),\n            dim(\u0026format!(\"  ·  {ix}\"))\n        )\n    } else {\n        format!(\"{bullet_colored}  {}\", f.rule.color(sev_color).bold())\n    };\n    println!(\"{header}\");\n\n    if let Some(file) = \u0026f.file {\n        let loc = if let Some(line) = f.line {\n            let col = f.column.map(|c| format!(\":{c}\")).unwrap_or_default();\n            format!(\"{file}:{line}{col}\")\n        } else {\n            file.clone()\n        };\n        println!();\n        println!(\"{}\", dim(\"Location:\"));\n        println!(\"  {loc}\");\n    }\n\n    if let Some(acct) = \u0026f.account {\n        println!();\n        println!(\"{}\", dim(\"Account:\"));\n        println!(\"  {acct}\");\n    }\n\n    println!();\n    println!(\"{}\", dim(\"Problem:\"));\n    for line in wrap_text(\u0026f.message, 100) {\n        println!(\"  {line}\");\n    }\n\n    if let Some(hint) = \u0026f.hint {\n        println!();\n        println!(\"{}\", dim(\"Recommendation:\"));\n        for line in wrap_text(hint, 100) {\n            println!(\"  {line}\");\n        }\n    }\n    // Trailing newline is added by the caller (separator or blank line).\n}\n\n/// Print a compact 4-row statistics block. Labels are left-padded to\n/// 22 chars, numbers are right-aligned. No header, no border.\npub fn print_statistics(report: \u0026ScanReport) {\n    println!(\"{}\", \"Statistics\".white().bold());\n    println!();\n    let rows: [(\u0026str, String); 4] = [\n        (\"Files analyzed\", report.programs.to_string()),\n        (\"Instructions analyzed\", report.instructions.to_string()),\n        (\"Rules executed\", report.rules_executed.to_string()),\n        (\"Findings detected\", report.findings.len().to_string()),\n    ];\n    for (label, value) in rows {\n        if tty::interactive() {\n            println!(\"{:\u003c22}{}\", label, value.bold());\n        } else {\n            println!(\"{label:\u003c22}{value}\");\n        }\n    }\n    println!();\n}\n\n/// Print the final verdict as the visual climax: the headline in\n/// bold + severity color, a blank line, and a one-sentence follow-up.\npub fn print_verdict(findings: \u0026[Finding]) {\n    let (c, h, m, l) = count_by_severity(findings);\n    let (kind, label) = risk::verdict(c, h, m, l);\n    let follow = risk::follow_up(c, h, m, l);\n    let colored = match kind {\n        risk::Verdict::Approved =\u003e label.green().bold(),\n        risk::Verdict::ReviewRequired =\u003e label.yellow().bold(),\n        risk::Verdict::Blocked =\u003e label.red().bold(),\n    };\n    if tty::interactive() {\n        println!(\"{colored}\");\n        println!();\n        println!(\"{follow}\");\n    } else {\n        println!(\"{label}\");\n        println!();\n        println!(\"{follow}\");\n    }\n}\n\n/// Tally findings into (critical, high, medium, low) — info is\n/// excluded from the score (spec lists only those four). The\n/// returned tuple's element order matches the penalty weights in\n/// `risk::score` (c, h, m, l) so the call site reads naturally.\nfn count_by_severity(findings: \u0026[Finding]) -\u003e (usize, usize, usize, usize) {\n    let mut c = 0;\n    let mut h = 0;\n    let mut m = 0;\n    let mut l = 0;\n    for f in findings {\n        match f.severity {\n            Severity::Critical =\u003e c += 1,\n            Severity::High =\u003e h += 1,\n            Severity::Medium =\u003e m += 1,\n            Severity::Low | Severity::Info =\u003e l += 1,\n        }\n    }\n    (c, h, m, l)\n}\n\n/// Map a severity to its `colored::Color` value. Used by both the\n/// group header and the per-finding bullet. Centralized so the\n/// 4-color palette is consistent across the formatter.\nfn severity_color(sev: Severity) -\u003e colored::Color {\n    match sev {\n        Severity::Critical =\u003e colored::Color::BrightRed,\n        Severity::High =\u003e colored::Color::Yellow,\n        Severity::Medium =\u003e colored::Color::Blue,\n        Severity::Low | Severity::Info =\u003e colored::Color::BrightBlack, // dim gray\n    }\n}\n\n/// Word-wrap `text` so no line exceeds `max_width` visible chars.\n/// Lines are broken on whitespace; if a single word is longer than\n/// `max_width` it is truncated to `max_width - 1` chars with `…`\n/// appended. Returns a `Vec\u003cString\u003e` of wrapped lines.\n///\n/// Width spec per the user's plan: 100 chars (matches the new\n/// findings layout, which has 2 chars of indent plus content).\nfn wrap_text(text: \u0026str, max_width: usize) -\u003e Vec\u003cString\u003e {\n    if max_width == 0 {\n        return vec![text.to_string()];\n    }\n    let mut out: Vec\u003cString\u003e = Vec::new();\n    let normalized: String = text.split_whitespace().collect::\u003cVec\u003c_\u003e\u003e().join(\" \");\n    if normalized.is_empty() {\n        return vec![String::new()];\n    }\n    let mut current = String::new();\n    for word in normalized.split(' ') {\n        if word.is_empty() {\n            continue;\n        }\n        let word_len = word.chars().count();\n        if word_len \u003e max_width {\n            if !current.is_empty() {\n                out.push(std::mem::take(\u0026mut current));\n            }\n            let truncated: String = word.chars().take(max_width.saturating_sub(1)).collect();\n            out.push(format!(\"{truncated}…\"));\n            continue;\n        }\n        if current.is_empty() {\n            current.push_str(word);\n        } else if current.chars().count() + 1 + word_len \u003c= max_width {\n            current.push(' ');\n            current.push_str(word);\n        } else {\n            out.push(std::mem::take(\u0026mut current));\n            current.push_str(word);\n        }\n    }\n    if !current.is_empty() {\n        out.push(current);\n    }\n    out\n}\n\n/// Print the `sentinel rules` listing in cargo style: a header line\n/// with the brand + count, a blank line, and an aligned table of\n/// rows. No `┌─┬─┐` borders. The `Layer` field comes from the\n/// `Rule` trait (added in the previous commit) so this table reads\n/// the layer info from the source of truth, not a parallel string\n/// map.\npub fn print_rules_table() {\n    let rules = crate::engine::registry::all_rules();\n    let header = \"⚓ Anchor Sentinel\";\n    if tty::interactive() {\n        println!(\n            \"{} {} {}\",\n            header.bright_cyan().bold(),\n            \"—\".dimmed(),\n            format!(\"{} rules active\", rules.len()).dimmed()\n        );\n    } else {\n        println!(\"{header} — {} rules active\", rules.len());\n    }\n    println!();\n\n    // Cargo-style columns: `ID RULE SEVERITY LAYER`. No `│` separators.\n    const ID_W: usize = 3;\n    const NAME_W: usize = 38;\n    const SEV_W: usize = 10;\n    const LAYER_W: usize = 8;\n\n    println!(\n        \"{:\u003cID_W$}  {:\u003cNAME_W$}  {:\u003cSEV_W$}  {:\u003cLAYER_W$}\",\n        \"ID\", \"Rule\", \"Severity\", \"Layer\"\n    );\n\n    let mut sorted = rules;\n    sorted.sort_by(|a, b| {\n        let ord = |s: \u0026Severity| match s {\n            Severity::Critical =\u003e 5,\n            Severity::High =\u003e 4,\n            Severity::Medium =\u003e 3,\n            Severity::Low =\u003e 2,\n            Severity::Info =\u003e 1,\n        };\n        ord(\u0026b.severity())\n            .cmp(\u0026ord(\u0026a.severity()))\n            .then(a.id().cmp(b.id()))\n    });\n\n    for (i, rule) in sorted.iter().enumerate() {\n        let id = rule.id();\n        let sev = rule.severity();\n        let layer = rule.layer();\n        let sev_label = sev.as_str().to_uppercase();\n        let sev_str = if tty::interactive() {\n            sev_label.color(severity_color(sev)).bold().to_string()\n        } else {\n            sev_label\n        };\n        let layer_str = if tty::interactive() {\n            layer.to_string().dimmed().to_string()\n        } else {\n            layer.to_string()\n        };\n        let id_display: String = if id.chars().count() \u003e NAME_W {\n            let truncated: String = id.chars().take(NAME_W - 1).collect();\n            format!(\"{truncated}…\")\n        } else {\n            id.to_string()\n        };\n        println!(\n            \"{n:\u003cID_W$}  {id_display:\u003cNAME_W$}  {sev_str:\u003cSEV_W$}  {layer_str:\u003cLAYER_W$}\",\n            n = i + 1,\n        );\n    }\n    println!();\n}\n\n#[cfg(test)]\nmod tests {\n    use super::risk;\n\n    #[test]\n    fn score_zero_findings_is_100() {\n        assert_eq!(risk::score(0, 0, 0, 0), 100);\n    }\n\n    #[test]\n    fn score_one_critical_is_75() {\n        assert_eq!(risk::score(1, 0, 0, 0), 75);\n    }\n\n    #[test]\n    fn score_two_crit_three_high_two_medium_is_20() {\n        assert_eq!(risk::score(2, 3, 2, 0), 20);\n    }\n\n    #[test]\n    fn score_floors_at_zero() {\n        assert_eq!(risk::score(5, 10, 5, 0), 0);\n    }\n\n    #[test]\n    fn grade_boundaries() {\n        assert_eq!(risk::grade(100), \"A\");\n        assert_eq!(risk::grade(90), \"A\");\n        assert_eq!(risk::grade(89), \"B\");\n        assert_eq!(risk::grade(75), \"B\");\n        assert_eq!(risk::grade(74), \"C\");\n        assert_eq!(risk::grade(50), \"C\");\n        assert_eq!(risk::grade(49), \"D\");\n        assert_eq!(risk::grade(25), \"D\");\n        assert_eq!(risk::grade(24), \"F\");\n        assert_eq!(risk::grade(0), \"F\");\n    }\n\n    #[test]\n    fn critical_always_blocks_even_at_high_score() {\n        let (v, label) = risk::verdict(1, 0, 0, 0);\n        assert_eq!(v, risk::Verdict::Blocked);\n        assert_eq!(label, \"DEPLOYMENT BLOCKED\");\n    }\n\n    #[test]\n    fn critical_override_survives_zero_penalty_other() {\n        let (v, _) = risk::verdict(3, 0, 0, 0);\n        assert_eq!(v, risk::Verdict::Blocked);\n    }\n\n    #[test]\n    fn high_only_at_89_is_review_required() {\n        let (v, label) = risk::verdict(0, 6, 0, 0);\n        assert_eq!(v, risk::Verdict::ReviewRequired);\n        assert_eq!(label, \"DEPLOYMENT REVIEW REQUIRED\");\n    }\n\n    #[test]\n    fn no_critical_high_or_above_means_approved() {\n        let (v, label) = risk::verdict(0, 0, 1, 1);\n        assert_eq!(v, risk::Verdict::Approved);\n        assert_eq!(label, \"DEPLOYMENT APPROVED\");\n    }\n\n    #[test]\n    fn follow_up_critical_singular_vs_plural() {\n        assert_eq!(\n            risk::follow_up(1, 0, 0, 0),\n            \"1 Critical finding must be resolved before deployment.\"\n        );\n        assert_eq!(\n            risk::follow_up(3, 0, 0, 0),\n            \"3 Critical findings must be resolved before deployment.\"\n        );\n    }\n}\n","traces":[{"line":49,"address":[],"length":0,"stats":{"Line":25}},{"line":50,"address":[],"length":0,"stats":{"Line":50}},{"line":51,"address":[],"length":0,"stats":{"Line":50}},{"line":58,"address":[],"length":0,"stats":{"Line":25}},{"line":59,"address":[],"length":0,"stats":{"Line":25}},{"line":60,"address":[],"length":0,"stats":{"Line":12}},{"line":61,"address":[],"length":0,"stats":{"Line":10}},{"line":62,"address":[],"length":0,"stats":{"Line":8}},{"line":63,"address":[],"length":0,"stats":{"Line":8}},{"line":64,"address":[],"length":0,"stats":{"Line":6}},{"line":82,"address":[],"length":0,"stats":{"Line":18}},{"line":83,"address":[],"length":0,"stats":{"Line":18}},{"line":84,"address":[],"length":0,"stats":{"Line":10}},{"line":86,"address":[],"length":0,"stats":{"Line":48}},{"line":87,"address":[],"len Ordering::Relaxed);\n}\n\nfn compute() -\u003e bool {\n    // 1. NO_COLOR: any non-empty value disables color. We treat that\n    //    as a strong signal — also disable animation. The convention\n    //    is https://no-color.org.\n    if let Ok(v) = std::env::var(\"NO_COLOR\") {\n        if !v.is_empty() {\n            return false;\n        }\n    }\n    // 2. CI: most CI providers set CI=true. Also TERM=dumb for dumb\n    //    terminals. We allow color in plain CI (the SARIF-less\n    //    review workflow benefits from it) but skip animations that\n    //    would interfere with log scraping.\n    if std::env::var(\"CI\").ok().as_deref() == Some(\"true\")\n        || std::env::var(\"TERM\").ok().as_deref() == Some(\"dumb\")\n    {\n        return false;\n    }\n    // 3. Actually a terminal? When stdout is piped (the test suite\n    //    pipes it), this is false, and we get plain output.\n    std::io::stdout().is_terminal()\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn piping_stdout_disables_color() {\n        // The test suite always runs with stdout piped, so `interactive()`\n        // should return false here.\n        assert!(!interactive());\n    }\n}\n","traces":[{"line":27,"address":[],"length":0,"stats":{"Line":106}},{"line":28,"address":[],"length":0,"stats":{"Line":318}},{"line":29,"address":[],"length":0,"stats":{"Line":291}},{"line":31,"address":[],"length":0,"stats":{"Line":18}},{"line":32,"address":[],"length":0,"stats":{"Line":36}},{"line":33,"address":[],"length":0,"stats":{"Line":27}},{"line":34,"address":[],"length":0,"stats":{"Line":9}},{"line":40,"address":[],"length":0,"stats":{"Line":0}},{"line":41,"address":[],"length":0,"stats":{"Line":0}},{"line":42,"address":[],"length":0,"stats":{"Line":0}},{"line":45,"address":[],"length":0,"stats":{"Line":9}},{"line":49,"address":[],"length":0,"stats":{"Line":9}},{"line":50,"address":[],"length":0,"stats":{"Line":0}},{"line":51,"address":[],"length":0,"stats":{"Line":0 be verified at analysis time\"\n    }\n    fn severity(\u0026self) -\u003e Severity {\n        Severity::Critical\n    }\n    fn layer(\u0026self) -\u003e Layer {\n        Layer::Ast\n    }\n\n    fn check(\u0026self, ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e {\n        let mut out = Vec::new();\n\n        for hint in \u0026ctx.ast_hints {\n            if let AstHintKind::CpiInvokeSigned {\n                seeds,\n                seed_summary,\n                ..\n            } = \u0026hint.kind\n            {\n                if matches!(seeds, SignerSeedClass::Safe | SignerSeedClass::Absent) {\n                    continue;\n                }\n\n                let mut b = Finding::builder(\n                    self.id(),\n                    self.severity(),\n                    format!(\n                        \"invoke_signed uses dynamic signer seeds that cannot be verified at analysis time — ensure seeds are derived from canonical PDAs (ctx.bumps.\u003cname\u003e) not user input. Detected seeds: `{seed_summary}`.\"\n                    ),\n                )\n                .program(\u0026ctx.ir.name)\n                .hint(\n                    \"Replace dynamic seeds with: a `b\\\"literal\\\"` byte string, `ctx.bumps.\u003cfield\u003e` for the canonical bump, or `ctx.accounts.\u003caccount\u003e.key().as_ref()` for a known account's pubkey. Never pass function arguments or user-controlled data as signer seeds.\",\n                );\n                b = hint.location().stamp(b);\n                out.push(b.build());\n            }\n        }\n\n        Ok(out)\n    }\n}\n","traces":[{"line":33,"address":[],"length":0,"stats":{"Line":40}},{"line":34,"address":[],"length":0,"stats":{"Line":40}},{"line":36,"address":[],"length":0,"stats":{"Line":30}},{"line":37,"address":[],"length":0,"stats":{"Line":30}},{"line":39,"address":[],"length":0,"stats":{"Line":40}},{"line":40,"address":[],"length":0,"stats":{"Line":40}},{"line":42 {\n    field_hint_index, AnalysisContext, AstHintKind, Finding, Layer, Rule, Severity,\n};\n\npub struct DuplicateMutableAccounts;\n\nimpl Rule for DuplicateMutableAccounts {\n    fn id(\u0026self) -\u003e \u0026'static str {\n        \"duplicate_mutable_accounts\"\n    }\n    fn description(\u0026self) -\u003e \u0026'static str {\n        \"Multiple mutable `AccountInfo` args could reference the same pubkey\"\n    }\n    fn severity(\u0026self) -\u003e Severity {\n        Severity::High\n    }\n    fn layer(\u0026self) -\u003e Layer {\n        Layer::IdlAst\n    }\n\n    fn check(\u0026self, ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e {\n        let mut ast_safe: HashSet\u003cString\u003e = HashSet::new();\n        let mut ast_account_info: HashSet\u003cString\u003e = HashSet::new();\n        let hint_index = field_hint_index(ctx);\n        for hint in \u0026ctx.ast_hints {\n            if let AstHintKind::AccountsField { field_name, ty, .. } = \u0026hint.kind {\n                if ty.contains(\"Account\u003c\")\n                    || ty.contains(\"SystemAccount\")\n                    || ty.contains(\"Program\u003c\")\n                    || ty.contains(\"Signer\")\n                    || ty.contains(\"TokenAccount\")\n                    || ty.contains(\"TokenAccount2022\")\n                {\n                    ast_safe.insert(field_name.clone());\n                } else if ty.contains(\"AccountInfo\") {\n                    ast_account_info.insert(field_name.clone());\n                }\n            }\n        }\n\n        let mut out = Vec::new();\n        for ix in \u0026ctx.ir.instructions {\n            let writable_non_signers: Vec\u003c_\u003e = ix\n                .accounts\n                .iter()\n                .filter(|a| a.is_mut \u0026\u0026 !a.is_signer)\n                .collect();\n\n            if writable_non_signers.len() \u003c 2 {\n                continue;\n            }\n\n            let unsafe_accounts: Vec\u003c_\u003e = writable_non_signers\n                .iter()\n                .filter(|a| !ast_safe.contains(\u0026a.name))\n                .collect();\n\n            if unsafe_accounts.len() \u003e= 2 {\n                let names: Vec\u003c\u0026str\u003e = unsafe_accounts.iter().map(|a| a.name.as_str()).collect();\n                let mut b = Finding::builder(\n                    self.id(),\n                    self.severity(),\n                    format!(\n                        \"Instruction `{}` has ≥2 mutable `AccountInfo` accounts ({}) — \\\n                         an attacker can pass the same pubkey for both. Debiting one \\\n                         also debits the other because they reference the same account.\",\n                        ix.name,\n                        names.join(\", \")\n                    ),\n                )\n                .program(\u0026ctx.ir.name)\n                .instruction(\u0026ix.name)\n                .account(names.first().copied().unwrap_or(\"\"))\n                .hint(\n                    \"Type the fields as `Account\u003c'info, T\u003e` or use `#[account(mut)]` \\\n                     with `has_one` constraints to derive distinct addresses from seeds.\",\n                );\n                if let Some(first) = names.first() {\n                    if let Some(h) = hint_index.get(*first) {\n                        b = h.location().stamp(b);\n                    }\n                }\n                out.push(b.build());\n            }\n        }\n\n        Ok(out)\n    }\n}\n","traces":[{"line":27,"address":[],"length":0,"stats":{"Line":52}},{"line":28,"address":[],"length":0,"stats":{"Line":52}},{"line":30,"address":[],"length":0,"stats":{"Line":30}},{"line":31,"address":[],"length":0,"stats":{"Line":30}},{"line":33,"address":[],"length":0,"stats":{"Line":52}},{"line":34,"address":[],"length":0,"stats":{"Line":52}},{"line":36,"address":[],"length":0,"stats":{"Line":1}},{"line":37,"address":[],"length" ne":99,"address":[],"length":0,"stats":{"Line":48}},{"line":102,"address":[],"length":0,"stats":{"Line":48}},{"line":106,"address":[],"length":0,"stats":{"Line":27}}],"covered":46,"coverable":46},{"path":["/","Users","enjo","anchor-sentinel","src","rules","integer_cast_truncation.rs"],"content":"//! `integer_cast_truncation` — flags `expr as T` casts where the source\n//! integer type is wider than the destination, which silently truncates\n//! the high bits at runtime.\n//!\n//! In Solana Anchor programs this is a real bug class: account data is\n//! typically `u64` (lamports, token amounts) but downstream consumers\n//! (syscall arguments, account discriminants, packed byte buffers) often\n//! require narrower types. A naive `let n: u8 = amount as u8;` drops\n//! everything above `u8::MAX` without warning, and the on-chain error\n//! shows up far from the offending cast.\n//!\n//! Severity rationale: silent data loss, not directly exploitable, but\n//! it underwrites subtle fund-rounding and IDL-mismatch bugs that often\n//! become critical when stacked with other rules.\n\nuse std::collections::HashSet;\n\nuse anyhow::Result;\n\nuse crate::engine::{AnalysisContext, AstHintKind, Finding, Layer, Rule, Severity};\n\npub struct IntegerCastTruncation;\n\nimpl Rule for IntegerCastTruncation {\n    fn id(\u0026self) -\u003e \u0026'static str {\n        \"integer_cast_truncation\"\n    }\n    fn description(\u0026self) -\u003e \u0026'static str {\n        \"Detects `as` casts that may silently truncate a wider integer into a narrower one (e.g. u64 → u8).\"\n    }\n    fn severity(\u0026self) -\u003e Severity {\n        Severity::Medium\n    }\n    fn layer(\u0026self) -\u003e Layer {\n        Layer::Ast\n    }\n\n    fn check(\u0026self, ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e {\n        let mut out = Vec::new();\n        let mut seen: HashSet\u003c(String, usize, String, String)\u003e = HashSet::new();\n\n        for hint in \u0026ctx.ast_hints {\n            if let AstHintKind::IntegerCast { from_ty, to_ty } = \u0026hint.kind {\n                let from_w = source_width(from_ty);\n                let to_w = int_width(to_ty);\n                let Some(to_w) = to_w else {\n                    continue;\n                };\n                if from_w \u003c= to_w {\n                    continue;\n                }\n\n                let key = (hint.file.clone(), hint.line, from_ty.clone(), to_ty.clone());\n                if !seen.insert(key) {\n                    continue;\n                }\n\n                let display_from = if from_ty == \"inferred\" {\n                    \"an integer\".to_string()\n                } else {\n                    from_ty.clone()\n                };\n                let mut b = Finding::builder(\n                    self.id(),\n                    self.severity(),\n                    format!(\n                        \"`{display_from}` cast to `{to_ty}` ({to_w}-bit) silently truncates the high bits at runtime. Use `try_into()` (and handle the `TryFromIntError`) or `from_le_bytes` / `to_le_bytes` to make the conversion explicit.\"\n                    ),\n                )\n                .program(\u0026ctx.ir.name)\n                .hint(format!(\n                    \"Replace `{display_from} as {to_ty}` with `let n: {to_ty} = value.try_into().map_err(|_| ErrorCode::Overflow)?;` or split the value with `to_le_bytes`.\"\n                ));\n                b = hint.location().stamp(b);\n                out.push(b.build());\n            }\n        }\n        Ok(out)\n    }\n}\n\n/// Width in bits for the integer types `is_int_type` recognizes. Returns\n/// `None` for unknown types (e.g. user newtypes) — the rule skips those\n/// to avoid false positives.\nfn int_width(ty: \u0026str) -\u003e Option\u003cusize\u003e {\n    match ty {\n        \"u8\" | \"i8\" =\u003e Some(8),\n        \"u16\" | \"i16\" =\u003e Some(16),\n        \"u32\" | \"i32\" =\u003e Some(32),\n        \"u64\" | \"i64\" =\u003e Some(64),\n        \"u128\" | \"i128\" =\u003e Some(128),\n        \"usize\" | \"isize\" =\u003e None,\n        _ =\u003e None,\n    }\n}\n\n/// Width assumption for the source side of a cast. We have a real type\n/// for literals and explicitly-typed paths; for plain identifier paths\n/// (e.g. an `amount` parameter) the AST layer doesn't track types, so\n/// we fall back to a conservative 64-bit estimate. That estimate is the\n/// source of false positives only when the variable is *actually*\n/// narrower than the destination — which is exactly the case we want to\n/// flag, so the heuristic is sound.\nfn source_width(ty: \u0026str) -\u003e usize {\n    if let Some(w) = int_width(ty) {\n        return w;\n    }\n    if looks_like_int(ty) {\n        return 64;\n    }\n    128\n}\n\nfn looks_like_int(s: \u0026str) -\u003e bool {\n    if s.is_empty() {\n        return false;\n    }\n    let lname = s.to_ascii_lowercase();\n    matches!(\n        lname.as_str(),\n        \"amount\" | \"value\" | \"total\" | \"lamports\" | \"balance\" | \"delta\" | \"n\" | \"i\" | \"x\" | \"y\"\n    ) || lname.ends_with(\"_amount\")\n        || lname.ends_with(\"_total\")\n        || lname.ends_with(\"_value\")\n}\n","traces":[{"line":25,"address":[],"length":0,"stats":{"Line":42}},{"line":26,"address":[],"length":0,"stats":{"Line":42}},{"line":28,"address":[],"length":0,"stats":{"Line":30}},{"line":29,"address":[],"length":0,"stats":{"Line":30}},{"line":31,"address":[],"length":0,"stats":{"Line":42}},{"line":32,"address":[],"length":0,"stats":{"Line":42}},{"line":34,"address":[],"length":0,"stats":{"Line":1}},{"line":35,"address":[],"length":0,"stats":{"Line":1}},{"line":38,"address":[],"length":0,"stats":{"Line":27}},{"line":39,"address":[],"length":0,"stats":{"Line":54}},{"line":40,"address":[],"length":0,"stats":{"Line":81}},{"line":42,"address":[],"length":0,"stats":{"Line":366}},{"line":43,"address":[],"length":0,"stats":{"Line":345}},{"lin e {\n        type ZeroEntry\u003c'a\u003e = (String, usize, \u0026'a AstHint);\n        let hint_count = ctx.ast_hints.len();\n        let mut zeros: HashMap\u003cFnKey, Vec\u003cZeroEntry\u003c'_\u003e\u003e\u003e = HashMap::with_capacity(hint_count);\n        let mut auth_checks: HashMap\u003cFnKey, Vec\u003cusize\u003e\u003e = HashMap::with_capacity(hint_count);\n\n        let mut current_fn: Option\u003cFnKey\u003e = None;\n        for hint in \u0026ctx.ast_hints {\n            if let AstHintKind::InstructionHandler { fn_name, .. } = \u0026hint.kind {\n                current_fn = Some((hint.file.clone(), fn_name.clone()));\n                continue;\n            }\n            let Some((ref file, ref fn_name)) = current_fn else {\n                continue;\n            };\n            let key = (file.clone(), fn_name.clone());\n\n            match \u0026hint.kind {\n                AstHintKind::LamportsZero { account, seq } =\u003e {\n                    zeros\n                        .entry(key)\n                        .or_default()\n                        .push((account.clone(), *seq, hint));\n                }\n                AstHintKind::BalanceCheck {\n                    check_type, seq, ..\n                } if is_auth_check(check_type) =\u003e {\n                    auth_checks.entry(key).or_default().push(*seq);\n                }\n                _ =\u003e {}\n            }\n        }\n\n        let mut out = Vec::new();\n        for ((file, fn_name), entries) in \u0026zeros {\n            let auth_seqs = auth_checks\n                .get(\u0026(file.clone(), fn_name.clone()))\n                .map(|v| v.as_slice())\n                .unwrap_or(\u0026[]);\n\n            // Also check IDL: does this instruction have any signer?\n            let has_idl_signer = ctx\n                .ir\n                .instructions\n                .iter()\n                .any(|ix| ix.name == *fn_name \u0026\u0026 ix.accounts.iter().any(|a| a.is_signer));\n\n            for (account, zero_seq, zero_hint) in entries {\n                let has_auth = auth_seqs.iter().any(|s| *s \u003c *zero_seq);\n                if !has_auth \u0026\u0026 !has_idl_signer {\n                    let mut b = Finding::builder(\n                        self.id(),\n                        self.severity(),\n                        format!(\n                            \"Account `{account}` is zeroed in `{fn_name}` without any authorization \\\n                             check. Any caller can destroy this account and its rent-exempt deposit.\"\n                        ),\n                    )\n                    .program(\u0026ctx.ir.name)\n                    .instruction(fn_name)\n                    .account(account)\n                    .hint(format!(\n                        \"Add a signer/authority check before zeroing lamports: \\\n                         `require_keys_eq!({account}.key(), expected_authority, ErrorCode::Unauthorized)`.\"\n                    ));\n                    b = zero_hint.location().stamp(b);\n                    out.push(b.build());\n                }\n            }\n        }\n\n        out.sort_by(|a, b| {\n            (\u0026a.instruction, \u0026a.account, a.line).cmp(\u0026(\u0026b.instruction, \u0026b.account, b.line))\n        });\n\n        Ok(out)\n    }\n}\n\nfn is_auth_check(check_type: \u0026str) -\u003e bool {\n    matches!(\n        check_type,\n        \"require_keys_eq\"\n            | \"require_keys_neq\"\n            | \"require\"\n            | \"require_gte\"\n            | \"require_eq\"\n            | \"require_gt\"\n    )\n}\n","traces":[{"line":24,"address":[],"length":0,"stats":{"Line":45}},{"line":25,"address":[],"length":0,"stats":{"Line":45}},{"line":27,"address":[],"length":0,"stats":{"Line":30}},{"line":28,"address":[],"length":0,"stats":{"Line":30}},{"line":30,"address":[],"length":0,"stats":{"Line":45}},{"line":31,"address":[],"length":0,"stats":{"Line":45}},{"line":33,"address":[],"l ind, Finding, Layer, Rule, Severity};\n\n/// `(file, fn_name)` key for grouping hints per handler function.\ntype FnKey = (String, String);\n\npub struct MissingBalanceCheck;\n\nimpl Rule for MissingBalanceCheck {\n    fn id(\u0026self) -\u003e \u0026'static str {\n        \"missing_balance_check\"\n    }\n    fn description(\u0026self) -\u003e \u0026'static str {\n        \"Lamports debited without a preceding balance check\"\n    }\n    fn severity(\u0026self) -\u003e Severity {\n        Severity::Critical\n    }\n    fn layer(\u0026self) -\u003e Layer {\n        Layer::Ast\n    }\n\n    fn check(\u0026self, ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e {\n        type DebitEntry\u003c'a\u003e = (String, String, usize, \u0026'a AstHint);\n        let mut debits: HashMap\u003cFnKey, Vec\u003cDebitEntry\u003c'_\u003e\u003e\u003e = HashMap::new();\n        let mut checks: HashMap\u003cFnKey, Vec\u003c(String, usize)\u003e\u003e = HashMap::new();\n\n        let mut current_fn: Option\u003cFnKey\u003e = None;\n        for hint in \u0026ctx.ast_hints {\n            if let AstHintKind::InstructionHandler { fn_name, .. } = \u0026hint.kind {\n                current_fn = Some((hint.file.clone(), fn_name.clone()));\n                continue;\n            }\n            let Some((ref file, ref fn_name)) = current_fn else {\n                continue;\n            };\n            let key = (file.clone(), fn_name.clone());\n\n            match \u0026hint.kind {\n                AstHintKind::LamportsDebit {\n                    account,\n                    amount_expr,\n                    seq,\n                } =\u003e {\n                    debits.entry(key).or_default().push((\n                        account.clone(),\n                        amount_expr.clone(),\n                        *seq,\n                        hint,\n                    ));\n                }\n                AstHintKind::BalanceCheck {\n                    account,\n                    check_type: _,\n                    seq,\n                } =\u003e {\n                    checks.entry(key).or_default().push((account.clone(), *seq));\n                }\n                _ =\u003e {}\n            }\n        }\n\n        let mut out = Vec::new();\n        for ((file, fn_name), entries) in \u0026debits {\n            let fn_checks = checks\n                .get(\u0026(file.clone(), fn_name.clone()))\n                .map(|v| v.as_slice())\n                .unwrap_or(\u0026[]);\n\n            for (account, amount, debit_seq, debit_hint) in entries {\n                let has_guard = fn_checks.iter().any(|(check_acct, check_seq)| {\n                    *check_seq \u003c *debit_seq \u0026\u0026 (check_acct == account || check_acct.is_empty())\n                });\n\n                if !has_guard {\n                    let mut b = Finding::builder(\n                        self.id(),\n                        self.severity(),\n                        format!(\n                            \"Account `{account}` has lamports debited by `{amount}` in `{fn_name}` \\\n                             without a preceding balance check. An attacker can drain the account \\\n                             by calling with `amount \u003e account.lamports()`.\"\n                        ),\n                    )\n                    .program(\u0026ctx.ir.name)\n                    .instruction(fn_name)\n                    .account(account)\n                    .hint(format!(\n                        \"Add a guard before the debit: \\\n                         `require!({account}.lamports() \u003e= {amount}, ErrorCode::InsufficientFunds)` \\\n                         or use `checked_sub`.\"\n                    ));\n                    b = debit_hint.location().stamp(b);\n                    out.push(b.build());\n                }\n            }\n        }\n\n        out.sort_by(|a, b| {\n            (\u0026a.instruction, \u0026a.account, a.line).cmp(\u00 ine":51}},{"line":78,"address":[],"length":0,"stats":{"Line":54}},{"line":79,"address":[],"length":0,"stats":{"Line":63}},{"line":80,"address":[],"length":0,"stats":{"Line":24}},{"line":81,"address":[],"length":0,"stats":{"Line":48}},{"line":82,"address":[],"length":0,"stats":{"Line":16}},{"line":83,"address":[],"length":0,"stats":{"Line":24}},{"line":85,"address":[],"length":0,"stats":{"Line":60}},{"line":86,"address":[],"length":0,"stats":{"Line":38}},{"line":87,"address":[],"length":0,"stats":{"Line":4}},{"line":90,"address":[],"length":0,"stats":{"Line":22}},{"line":92,"address":[],"length":0,"stats":{"Line":20}},{"line":93,"address":[],"length":0,"stats":{"Line":30}},{"line":94,"address":[],"length":0,"stats":{"Line":20}},{"line":95,"address":[],"length":0,"stats":{"Line":10}},{"line":96,"address":[],"length":0,"stats":{"Line":10}},{"line":97,"address":[],"length":0,"stats":{"Line":10}},{"line":100,"address":[],"length":0,"stats":{"Line":30}},{"line":101,"address":[],"length":0,"stats":{"Line":30}},{"line":102,"address":[],"length":0,"stats":{"Line":30}},{"line":103,"address":[],"length":0,"stats":{"Line":30}},{"line":104,"address":[],"length":0,"stats":{"Line":10}},{"line":105,"address":[],"length":0,"stats":{"Line":10}},{"line":106,"address":[],"length":0,"stats":{"Line":10}},{"line":108,"address":[],"length":0,"stats":{"Line":60}},{"line":109,"address":[],"length":0,"stats":{"Line":30}},{"line":114,"address":[],"length":0,"stats":{"Line":54}},{"line":115,"address":[],"length":0,"stats":{"Line":0}},{"line":118,"address":[],"length":0,"stats":{"Line":27}}],"covered":61,"coverable":62},{"path":["/","Users","enjo","anchor-sentinel","src","rules","missing_bump_seed_canonicalization.rs"],"content":"//! `missing_bump_seed_canonicalization` — flags PDA accounts whose `bump`\n//! constraint is set to a non-canonical value.\n//!\n//! In Anchor, the secure way to pin a PDA bump is one of:\n//!   1. `#[account(seeds = [...], bump)]` — implicit canonical bump\n//!   2. `#[account(seeds = [...], bump = ctx.bumps.field)]` — explicit canonical\n//!   3. `bump = \u003cfield\u003e` where `\u003cfield\u003e` is a `u8` argument — ANCHOR DERIVES\n//!      the canonical bump from seeds at runtime and stores it in the field.\n//!\n//! The dangerous pattern is:\n//!   - `bump = some_variable` where the variable is NOT a bumps-field AND\n//!     NOT derived from the seeds. This binds the bump to a user-controlled\n//!     value, enabling the classic PDA canonicalization bypass.\n//!\n//! Unlike `pda_misconfig` which focuses on missing `bump` constraints and\n//! the specific `bump = bump` (plain-ident) trap, this rule catches the\n//! broader class: any non-canonical bump expression.\n\nuse anyhow::Result;\nuse std::collections::HashSet;\n\nuse crate::engine::{\n    field_hint_index, AnalysisContext, AstHintKind, Finding, Layer, Rule, Severity,\n};\n\npub struct MissingBumpSeedCanonicalization;\n\nimpl Rule for MissingBumpSeedCanonicalization {\n    fn id(\u0026self) -\u003e \u0026'static str {\n        \"missing_bump_seed_canonicalization\"\n    }\n    fn description(\u0026self) -\u003e \u0026'static str {\n        \"PDA bump constraint uses a non-canonical value instead of `ctx.bumps`\"\n    }\n    fn severity(\u0026self) -\u003e Severity {\n        Severity::High\n    }\n    fn layer(\u0026self) -\u003e Layer {\n        Layer::Ast\n    }\n\n    fn check(\u0026self, ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e {\n        let mut out = Vec::new();\n        let hint_index = field_hint_index(ctx);\n        let mut seen: HashSet\u003cString\u003e = HashSet::new();\n\n        for hint in \u0026ctx.ast_hints {\n            if let AstHintKind::AccountsField {\n                field_name,\n                constraints,\n                ..\n            } = \u0026hint.kind\n            {\n                for constraint in constraints {\n                    if let Some(bump_expr) = extract_bump_expression(constraint) {\n                        if is_non_canonical_bump(bump_expr) \u0026\u0026 !seen.contains(field_name) {\n                            seen.insert(field_name.clone());\n                            let mut b = Finding::builder(\n                                self.id(),\n                                self.severity(),\n                                format!(\n                                    \"Account `{field_name}` pins `bump = {bump_expr}` — this \\\n                                     binds the PDA derivation to a non-canonical value. An attacker \\\n                                     can pass a different bump and access a separate PDA account.\"\n                                ),\n                            )\n                            .program(\u0026ctx.ir.name)\n                            .account(field_name)\n                            .hint(\n                                \"Use the bare `bump` identifier (which derives the canonical bump \\\n                                 from seeds), or `bump = ctx.bumps.{field_name}` to use the \\\n                                 framework-managed canonical bump.\",\n                            );\n                            if let Some(h) = hint_index.get(field_name) {\n                                b = h.location().stamp(b);\n                            }\n                            out.push(b.build());\n                        }\n                    }\n                }\n            }\n        }\n\n        Ok(out)\n    }\n}\n\n/// Extract the RHS expression from a `bump = \u003cexpr\u003e` constraint.\n/// Returns `None` for bare `bump` or `bumps` (canonical forms).\nfn extract_bump_expression(constraint: \u0026str) -\u003e Option\u003c\u0026str\u003e {\n    let idx = constraint.find(\"bump\")?;\n    let after = \u0026constraint[idx + \"bump\".len()..];\n    if after.starts_with(|c: char| c.is_alphanumeric() || c == '_') {\n        return None;\n    }\n    if after.starts_with(',') || after.trim().is_e /!      (data-level authority check), or\n//!   3. Mentioned in a `constraint = …\u003ctarget\u003e…` expression on the same\n//!      struct (manual authorization).\n//!\n//! When none of those hold, emit a finding pointing at the field that\n//! uses `close = \u003cident\u003e`. We don't flag the target field itself — the\n//! `close = …` line is the actionable site.\n\nuse anyhow::Result;\nuse std::collections::{HashMap, HashSet};\n\nuse crate::engine::{\n    field_hint_index, AnalysisContext, AstHintKind, Finding, Layer, Rule, Severity,\n};\n\npub struct MissingCloseAuthority;\n\nimpl Rule for MissingCloseAuthority {\n    fn id(\u0026self) -\u003e \u0026'static str {\n        \"missing_close_authority\"\n    }\n    fn description(\u0026self) -\u003e \u0026'static str {\n        \"Detects `close = \u003ctarget\u003e` constraints where the target is not enforced as a signer or authority\"\n    }\n    fn severity(\u0026self) -\u003e Severity {\n        Severity::High\n    }\n    fn layer(\u0026self) -\u003e Layer {\n        Layer::Ast\n    }\n\n    fn check(\u0026self, ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e {\n        let mut out = Vec::new();\n\n        let by_struct = group_by_struct(\u0026ctx.ast_hints);\n        let hint_index = field_hint_index(ctx);\n        let mut seen: HashSet\u003c(String, String, String)\u003e = HashSet::new();\n\n        for (struct_name, fields) in \u0026by_struct {\n            // First pass: collect the set of close targets referenced in\n            // this struct, so we can search the rest of the struct for\n            // their authority bindings.\n            let close_pairs: Vec\u003c(String, String)\u003e = fields\n                .iter()\n                .filter_map(|f| {\n                    let close_target = extract_close_target(\u0026f.constraints);\n                    close_target.map(|t| (f.field_name.clone(), t))\n                })\n                .collect();\n\n            if close_pairs.is_empty() {\n                continue;\n            }\n\n            for (field_name, target) in \u0026close_pairs {\n                let target_is_signer = fields\n                    .iter()\n                    .any(|f| f.field_name == *target \u0026\u0026 is_signer_type(\u0026f.ty));\n\n                let target_has_one = fields.iter().any(|f| {\n                    f.constraints\n                        .iter()\n                        .any(|c| extract_named_ident(c, \"has_one\") == Some(target.as_str()))\n                });\n\n                let target_in_constraint = fields.iter().any(|f| {\n                    f.constraints.iter().any(|c| {\n                        if let Some(expr) = extract_constraint_expr(c) {\n                            contains_ident(expr, target)\n                        } else {\n                            false\n                        }\n                    })\n                });\n\n                if target_is_signer || target_has_one || target_in_constraint {\n                    continue;\n                }\n\n                let key = (struct_name.clone(), field_name.clone(), target.clone());\n                if !seen.insert(key) {\n                    continue;\n                }\n\n                let mut b = Finding::builder(\n                    self.id(),\n                    self.severity(),\n                    format!(\n                        \"close target `{target}` is not enforced as a signer or authority — anyone can close this account and claim rent. Type the field as `Signer\u003c'info\u003e`, add a `has_one = {target}` constraint, or use a `constraint = …{target}…` expression.\"\n                    ),\n                )\n                .program(\u0026ctx.ir.name)\n                .instruction(struct_name)\n                .account(field_name)\n                .hint(format!(\n                    \"Bind `{target}` to a `Signer\u003c'info\u003e` (e.g. `pub {target}: Signer\u003c'info\u003e`) or add a constraint like `has_one = {target}` / `constraint = vault.authority == {target}.key()`.\"\n                ));\n                if let Some(h) = hint_index.get(field_name) {\n                    b = h.location().stamp(b);\n                }\n                out.push(b.build());\n            }\n        }\n\n        Ok(out)\n    }\n}\n\n/// A flattened view of an `AccountsField` hint, kept local to this rule.\nstruct FieldView {\n    field_name: String,\n    ty: String,\n    constraints: Vec\u003cString\u003e,\n}\n\nfn group_by_struct(hints: \u0026[crate::engine::AstHint]) -\u003e HashMap\u003cString, Vec\u003cFieldView\u003e\u003e {\n    let mut out: HashMap\u003cString, Vec\u003cFieldView\u003e\u003e = HashMap::new();\n    for hint in hints {\n        if let AstHintKind::AccountsField {\n            struct_name,\n            field_name,\n            ty,\n            constraints,\n        } = \u0026hint.kind\n        {\n            out.entry(struct_name.clone()).or_default().push(FieldView {\n                field_name: field_name.clone(),\n                ty: ty.clone(),\n                constraints: constraints.clone(),\n            });\n        }\n    }\n    out\n}\n\n/// Extract the RHS identifier from a `close = \u003cident\u003e` constraint.\n/// Returns `None` for `mut`, `realloc`, `bump`, etc.\nfn extract_close_target(constraints: \u0026[String]) -\u003e Option\u003cString\u003e {\n    for c in constraints {\n        if let Some(target) = extract_named_ident(c, \"close\") {\n            return Some(target.to_string());\n        }\n    }\n    None\n}\n\nfn extract_named_ident\u003c'a\u003e(constraint: \u0026'a str, name: \u0026str) -\u003e Option\u003c\u0026'a str\u003e {\n    let idx = constraint.find(name)?;\n    let after = \u0026constraint[idx + name.len()..];\n    if after.starts_with(|c: char| c.is_alphanumeric() || c == '_') {\n        return None;\n    }\n    let after = after.trim_start();\n    let after = after.strip_prefix('=')?.trim_start();\n    \"output\",\n    \"out_vault\",\n    \"out\",\n];\n\npub struct MissingMut;\n\nimpl Rule for MissingMut {\n    fn id(\u0026self) -\u003e \u0026'static str {\n        \"missing_mut\"\n    }\n    fn description(\u0026self) -\u003e \u0026'static str {\n        \"Account appears to be a write target but is not marked mutable\"\n    }\n    fn severity(\u0026self) -\u003e Severity {\n        Severity::Medium\n    }\n    fn layer(\u0026self) -\u003e Layer {\n        Layer::IdlAst\n    }\n\n    fn check(\u0026self, ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e {\n        let mut ast_mut: HashSet\u003cString\u003e = HashSet::new();\n        let hint_index = field_hint_index(ctx);\n        for hint in \u0026ctx.ast_hints {\n            if let AstHintKind::AccountsField {\n                field_name,\n                constraints,\n                ..\n            } = \u0026hint.kind\n            {\n                if constraints.iter().any(|c| c.contains(\"mut\")) {\n                    ast_mut.insert(field_name.clone());\n                }\n            }\n        }\n\n        let mut out = Vec::new();\n        for ix in \u0026ctx.ir.instructions {\n            for acct in \u0026ix.accounts {\n                if acct.is_mut {\n                    continue;\n                }\n                if ast_mut.contains(\u0026acct.name) {\n                    continue;\n                }\n                let lname = acct.name.to_ascii_lowercase();\n                if !DEST_NAMES.iter().any(|n| lname == *n) {\n                    continue;\n                }\n                let mut b = Finding::builder(\n                    self.id(),\n                    self.severity(),\n                    format!(\n                        \"Account `{}` on instruction `{}` is not declared mutable but its name implies a write target.\",\n                        acct.name, ix.name\n                    ),\n                )\n                .program(\u0026ctx.ir.name)\ ing\u003e\u003e {\n        let mut ast_properly_typed: HashSet\u003cString\u003e = HashSet::new();\n        let hint_index = field_hint_index(ctx);\n        for hint in \u0026ctx.ast_hints {\n            if let AstHintKind::AccountsField { field_name, ty, .. } = \u0026hint.kind {\n                if ty.contains(\"Account\u003c\")\n                    || ty.contains(\"Program\u003c\")\n                    || ty.contains(\"SystemAccount\")\n                {\n                    ast_properly_typed.insert(field_name.clone());\n                }\n            }\n        }\n\n        let mut out = Vec::new();\n        for ix in \u0026ctx.ir.instructions {\n            for acct in \u0026ix.accounts {\n                if !acct.is_mut || acct.is_signer {\n                    continue;\n                }\n                if ast_properly_typed.contains(\u0026acct.name) {\n                    continue;\n                }\n                let lname = acct.name.to_ascii_lowercase();\n                if !(lname.contains(\"vault\") || lname.contains(\"pool\") || lname.contains(\"state\")) {\n                    continue;\n                }\n                let mut b = Finding::builder(\n                    self.id(),\n                    self.severity(),\n                    format!(\n                        \"Account `{}` on instruction `{}` is mutable but typed as `AccountInfo` and lacks an `#[account(owner = …)]` constraint. Runtime code can deserialize arbitrary data into it.\",\n                        acct.name, ix.name\n                    ),\n                )\n                .program(\u0026ctx.ir.name)\n                .instruction(\u0026ix.name)\n                .account(\u0026acct.name)\n                .hint(\"Either type the field as `Account\u003c'info, T\u003e` for compile-time ownership, or add `#[account(owner = \u003cexpected_program_id\u003e)]`.\");\n                if let Some(h) = hint_index.get(\u0026acct.name) {\n                    b = h.location().stamp(b);\n                }\n                out.push(b.build());\n            }\n        }\n        Ok(out)\n    }\n}\n","traces":[{"line":23,"address":[],"length":0,"stats":{"Line":59}},{"line":24,"address":[],"length":0,"stats":{"Line":59}},{"line":26,"address":[],"length":0,"stats":{"Line":30}},{"line":27,"address":[],"length":0,"stats":{"Line":30}},{"line":29,"address":[],"length":0,"stats":{"Line":59}},{"line":30,"address":[],"length":0,"stats":{"Line":59}},{"line":32,"address":[],"length":0,"stats":{"Line":1}},{"line":33,"address":[],"length":0,"stats":{"Line":1}},{"line":36,"address":[],"length":0,"stats":{"Line":27}},{"line":37,"address":[],"length":0,"stats":{"Line":81}},{"line":38,"address":[],"length":0,"stats":{"Line":81}},{"line":39,"address":[],"length":0,"stats":{"Line":366}},{"line":40,"address":[],"length":0,"stats":{"Line":741}},{"line":41,"address":[],"length":0,"stats":{"Line":201}},{"line":42,"address":[],"length":0,"stats":{"Line":144}},{"line":43,"address":[],"length":0,"stats":{"Line":120}},{"line":45,"address":[],"length":0,"stats":{"Line":243}},{"line":50,"address":[],"length":0,"stats":{"Line":54}},{"line":51,"address":[],"length":0,"stats":{"Line":97}},{"line":52,"address":[],"length":0,"stats":{"Line":264}},{"line":53,"address":[],"length":0,"stats":{"Line":310}},{"line":54,"address":[],"length":0,"stats":{"Line":99}},{"line":56,"address":[],"length":0,"stats":{"Line":285}},{"line":57,"address":[],"length":0,"stats":{"Line":55}},{"line":59,"address":[],"length":0,"stats":{"Line":80}},{"line":60,"address":[],"length":0,"stats":{"Line":80}},{"line":61,"address":[],"length":0,"stats":{"Line":20}},{"line":64,"address":[],"length":0,"stats":{"Line":20}},{"line":65,"address":[],"length":0,"stats":{"Line":40}},{"line":66,"address":[],"length":0,"stats":{"Line":20}},{"line":71,"address":[],"length":0,"stats":{"Line":40}},{"line":72,"address":[],"length":0,"stats":{"Line":40}},{"line":73,"address":[],"length":0,"stats":{"Line":40}},{"line":75,"address" ayer, Rule, Severity};\n\npub struct MissingReinitGuard;\n\nimpl Rule for MissingReinitGuard {\n    fn id(\u0026self) -\u003e \u0026'static str {\n        \"missing_reinit_guard\"\n    }\n    fn description(\u0026self) -\u003e \u0026'static str {\n        \"Detects init_if_needed accounts without a reinitialization guard\"\n    }\n    fn severity(\u0026self) -\u003e Severity {\n        Severity::High\n    }\n    fn layer(\u0026self) -\u003e Layer {\n        Layer::Ast\n    }\n\n    fn check(\u0026self, ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e {\n        let mut out = Vec::new();\n        let mut seen: HashSet\u003c(String, String)\u003e = HashSet::new();\n\n        for hint in \u0026ctx.ast_hints {\n            if let AstHintKind::AccountsField {\n                struct_name,\n                field_name,\n                constraints,\n                ..\n            } = \u0026hint.kind\n            {\n                if !has_init_if_needed(constraints) {\n                    continue;\n                }\n                let key = (struct_name.clone(), field_name.clone());\n                if !seen.insert(key) {\n                    continue;\n                }\n\n                if has_reinit_guard(constraints, \u0026ctx.ast_hints, struct_name) {\n                    continue;\n                }\n\n                let mut b = Finding::builder(\n                    self.id(),\n                    self.severity(),\n                    format!(\n                        \"Account `{field_name}` uses init_if_needed without a reinitialization guard — an attacker can reinitialize this account and overwrite its state.\"\n                    ),\n                )\n                .program(\u0026ctx.ir.name)\n                .account(field_name)\n                .hint(\n                    \"Add `constraint = \u003caccount\u003e.\u003cauthority_field\u003e == \u003csigner\u003e.key() @ ErrorCode::AlreadyInitialized` (or `has_one = \u003cauthority\u003e` where `\u003cauthority\u003e` is a Signer) to prevent reinitialization by a different caller.\",\n                );\n                b = hint.location().stamp(b);\n                out.push(b.build());\n            }\n        }\n\n        Ok(out)\n    }\n}\n\n/// True if the field's `#[account(...)]` attrs include `init_if_needed`.\n///\n/// We substring-search the joined constraints rather than parsing\n/// each one — `init_if_needed` is always a bare identifier token\n/// (no `= value`), so a word-boundary match is sufficient. An\n/// account is *only* reinitializable if it actually carries the\n/// `init_if_needed` keyword; bare `init` does NOT trigger.\nfn has_init_if_needed(constraints: \u0026[String]) -\u003e bool {\n    for c in constraints {\n        // The stringified form is something like\n        // \"init_if_needed, payer=user, space=8+32\". We tokenize by\n        // comma/space and look for an exact match.\n        for tok in c.split(|ch: char| ch == ',' || ch.is_whitespace()) {\n            if tok == \"init_if_needed\" {\n                return true;\n            }\n        }\n    }\n    false\n}\n\n/// True if the field's `#[account(...)]` attrs include either:\n///   - `has_one = \u003cauthority\u003e` on the **same field**, where `\u003cauthority\u003e`\n///     resolves to a `Signer` type in the same struct, OR\n///   - `constraint = \u003cexpr\u003e` (must have '=') — bare `constraint` without\n///     '=' is a no-op in Anchor and does NOT guard against reinit.\n///\n/// `realloc` alone is NOT a guard — it only controls whether data is zeroed\n/// on reallocation. It must be paired with a `constraint = ...` expression\n/// that verifies the caller's authority.\nfn has_reinit_guard(constraints: \u0026[String], ast_hints: \u0026[AstHint], struct_name: \u0026str) -\u003e bool {\n    for c in constraints {\n        let tokens: Vec\u003c\u0026str\u003e = c\n            .split(|ch: char| ch == ',' || ch.is_whitespace())\n            .collect();\n\n        if let Some(has_one_idx) = tokens.iter().position(|tok| *tok == \"has_one\") {\n            if let Some(next) = tokens.get(has_one_idx + 1) {\n                if *next == \"=\" {\n                    if let Some(target) = tokens.get(has_one_idx + 2) {\n                        if is_signer_field(ast_hints, struct_name, target) {\n                            return true;\n                        }\n                    }\n                }\n            }\n        }\n\n        if let Some(constraint_idx) = tokens.iter().position(|tok| *tok == \"constraint\") {\n            if let Some(next) = tokens.get(constraint_idx + 1) {\n                if *next == \"=\" {\n                    return true;\n                }\n            }\n        }\n    }\n    false\n}\n\n/// Returns true if `field_name` is declared as a `Signer\u003c'info\u003e` type\n/// in the given struct. Used to verify that a `has_one` guard actually\n/// references a signer (Bug 5 fix).\nfn is_signer_field(ast_hints: \u0026[AstHint], struct_name: \u0026str, field_name: \u0026str) -\u003e bool {\n    for hint in ast_hints {\n        if let AstHintKind::AccountsField {\n            struct_name: sn,\n            field_name: fn_,\n            ty,\n            ..\n        } = \u0026hint.kind\n        {\n            if sn == struct_name \u0026\u0026 fn_ == field_name {\n                // Match common Signer type patterns.\n                let ty_lower = ty.to_lowercase();\n                return ty_lower.contains(\"signer\")\n                    || ty_lower.contains(\"signer\u003c'info\u003e\")\n                    || ty_lower.contains(\"account\u003csigner\")\n                    || ty_lower == \"signer\";\n            }\n        }\n    }\n    false\n}\n","traces":[{"line":37,"address":[],"length":0,"stats":{"Line":47}},{"line":38,"address":[],"length":0,"stats":{"Line":47}},{"line":40,"address":[],"length":0,"stats":{"Line":30}},{"line":41,"address":[],"length":0,"stats":{"Line":30}},{"line rdless of the account name.\n//!   - The struct doesn't have an `#[account(signer)]` constraint → flag.\n//!\n//! When AST hints are absent (no `programs/**/src/lib.rs` shipped, or the\n//! file failed to parse), we fall back to the original name-based heuristic.\n\nuse std::collections::HashSet;\n\nuse anyhow::Result;\n\nuse crate::engine::{\n    field_hint_index, AnalysisContext, AstHintKind, Finding, Layer, Rule, Severity,\n};\n\nconst SUSPECT_NAMES: \u0026[\u0026str] = \u0026[\n    \"authority\",\n    \"admin\",\n    \"owner\",\n    \"payer\",\n    \"user\",\n    \"signer\",\n    \"creator\",\n    \"operator\",\n];\n\npub struct MissingSigner;\n\nimpl Rule for MissingSigner {\n    fn id(\u0026self) -\u003e \u0026'static str {\n        \"missing_signer\"\n    }\n    fn description(\u0026self) -\u003e \u0026'static str {\n        \"Account appears to require authorization but lacks a signer check\"\n    }\n    fn severity(\u0026self) -\u003e Severity {\n        Severity::Critical\n    }\n    fn layer(\u0026self) -\u003e Layer {\n        Layer::IdlAst\n    }\n\n    fn check(\u0026self, ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e {\n        let mut ast_signed: HashSet\u003cString\u003e = HashSet::new();\n        let mut ast_account_info: HashSet\u003cString\u003e = HashSet::new();\n        let hint_index = field_hint_index(ctx);\n        for hint in \u0026ctx.ast_hints {\n            if let AstHintKind::AccountsField {\n                field_name,\n                ty,\n                constraints,\n                ..\n            } = \u0026hint.kind\n            {\n                if ty.contains(\"Signer\") || constraints.iter().any(|c| c.contains(\"signer\")) {\n                    ast_signed.insert(field_name.clone());\n                } else if ty.contains(\"AccountInfo\") {\n                    ast_account_info.insert(field_name.clone());\n                }\n            }\n        }\n\n        let mut out = Vec::new();\n        f u003e \u0026'static str {\n        \"pda_misconfig\"\n    }\n    fn description(\u0026self) -\u003e \u0026'static str {\n        \"PDA seeds without an explicit, canonical bump\"\n    }\n    fn severity(\u0026self) -\u003e Severity {\n        Severity::High\n    }\n    fn layer(\u0026self) -\u003e Layer {\n        Layer::IdlAst\n    }\n\n    fn check(\u0026self, ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e {\n        let mut out = Vec::new();\n        let mut seen_fields = std::collections::HashSet::new();\n        let hint_index = field_hint_index(ctx);\n\n        for hint in \u0026ctx.ast_hints {\n            if let AstHintKind::AccountsField {\n                field_name,\n                constraints,\n                ..\n            } = \u0026hint.kind\n            {\n                let joined: String = constraints.join(\", \");\n\n                if joined.contains(\"seeds\") \u0026\u0026 !joined.contains(\"bump\") {\n                    seen_fields.insert(field_name.clone());\n                    let mut b = Finding::builder(\n                        self.id(),\n                        self.severity(),\n                        format!(\n                            \"Account `{}` declares `seeds = [...]` but does not pin the bump. Bump canonicalization is left to runtime guesswork, which can be exploited by passing non-canonical bumps.\",\n                            field_name\n                        ),\n                    )\n                    .program(\u0026ctx.ir.name)\n                    .account(field_name)\n                    .hint(\"Add `bump` to the constraint (e.g. `bump` or `bump = ctx.bumps.\u003cfield\u003e`).\");\n                    if let Some(h) = hint_index.get(field_name) {\n                        b = h.location().stamp(b);\n                    }\n                    out.push(b.build());\n                    continue;\n                }\n\n                if let Some(idx) = joined.find(\"bump\") {\n                    let after = \u0026joined[idx + \"bump\".len()..];\n                    if after.starts_with('s') {\n                        continue;\n                    }\n                    if let Some(eq_idx) = after.find('=') {\n                        let expr = after[eq_idx + 1..]\n                            .trim_start()\n                            .trim_end_matches(',')\n                            .trim();\n                        if !expr.is_empty()\n                            \u0026\u0026 expr != \"ctx.bumps\"\n                            \u0026\u0026 !expr.starts_with(\"ctx.bumps\")\n                            \u0026\u0026 is_plain_ident(expr)\n                        {\n                            seen_fields.insert(field_name.clone());\n                            let mut b = Finding::builder(\n                                self.id(),\n                                self.severity(),\n                                format!(\n                                    \"Account `{}` pins `bump = {}` — this binds the bump to a user-supplied value instead of the canonical bump. The classic Sealevel-Attacks bypass.\",\n                                    field_name, expr\n                                ),\n                            )\n                            .program(\u0026ctx.ir.name)\n                            .account(field_name)\n                            .hint(\"Replace with the bare `bump` identifier or `bump = ctx.bumps.\u003cfield\u003e` to use the canonical bump.\");\n                            if let Some(h) = hint_index.get(field_name) {\n                                b = h.location().stamp(b);\n                            }\n                            out.push(b.build());\n                        }\n                    }\n                }\n            }\n        }\n\n        for ix in \u0026ctx.ir.instructions {\n            for acct in \u0026ix.accounts {\n                if let Some(pda) = \u0026acct.pda {\n ons::HashMap;\n\nuse crate::engine::{AnalysisContext, AstHintKind, Finding, Layer, Rule, Severity};\n\npub struct UncheckedBalanceFlow;\n\nimpl Rule for UncheckedBalanceFlow {\n    fn id(\u0026self) -\u003e \u0026'static str {\n        \"unchecked_balance_flow\"\n    }\n    fn description(\u0026self) -\u003e \u0026'static str {\n        \"Potential lamports conservation violation — debits without matching credits\"\n    }\n    fn severity(\u0026self) -\u003e Severity {\n        Severity::Medium\n    }\n    fn layer(\u0026self) -\u003e Layer {\n        Layer::IdlAst\n    }\n\n    fn check(\u0026self, ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e {\n        let hint_count = ctx.ast_hints.len();\n        let mut credits: HashMap\u003cString, Vec\u003c(String, String, usize)\u003e\u003e =\n            HashMap::with_capacity(hint_count);\n        let mut debits: HashMap\u003cString, Vec\u003c(String, usize)\u003e\u003e = HashMap::with_capacity(hint_count);\n        let mut cpi_ops: HashMap\u003cString, Vec\u003cString\u003e\u003e = HashMap::with_capacity(hint_count);\n\n        let mut current_fn: Option\u003cString\u003e = None;\n        for hint in \u0026ctx.ast_hints {\n            if let AstHintKind::InstructionHandler { fn_name, .. } = \u0026hint.kind {\n                current_fn = Some(fn_name.clone());\n                continue;\n            }\n            let Some(ref fn_name) = current_fn else {\n                continue;\n            };\n\n            match \u0026hint.kind {\n                AstHintKind::LamportsCredit {\n                    account,\n                    amount_expr,\n                    seq,\n                } =\u003e {\n                    credits.entry(fn_name.clone()).or_default().push((\n                        account.clone(),\n                        amount_expr.clone(),\n                        *seq,\n                    ));\n                }\n                AstHintKind::LamportsDebit { account, seq, ..
