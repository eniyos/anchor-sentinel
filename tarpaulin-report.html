MinSeverity`\n    /// directly.\n    #[allow(dead_code)]\n    pub fn parse(s: \u0026str) -\u003e Option\u003cSelf\u003e {\n        match s.to_ascii_lowercase().as_str() {\n            \"info\" =\u003e Some(Severity::Info),\n            \"low\" =\u003e Some(Severity::Low),\n            \"medium\" | \"med\" =\u003e Some(Severity::Medium),\n            \"high\" =\u003e Some(Severity::High),\n            \"critical\" | \"crit\" =\u003e Some(Severity::Critical),\n            _ =\u003e None,\n        }\n    }\n}\n\nimpl std::fmt::Display for Severity {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        f.write_str(self.as_str())\n    }\n}\n\n/// A single finding produced by a rule.\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct Finding {\n    pub rule: String,\n    pub severity: Severity,\n    pub program: String,\n    pub instruction: Option\u003cString\u003e,\n    pub account: Option\u003cString\u003e,\n    pub file: Option\u003cString\u003e,\n    pub line: Option\u003cusize\u003e,\n    pub column: Option\u003cusize\u003e,\n    pub message: String,\n    pub hint: Option\u003cString\u003e,\n}\n\nimpl Finding {\n    pub fn builder(rule: \u0026str, severity: Severity, message: impl Into\u003cString\u003e) -\u003e FindingBuilder {\n        FindingBuilder {\n            rule: rule.to_string(),\n            severity,\n            message: message.into(),\n            program: None,\n            instruction: None,\n            account: None,\n            file: None,\n            line: None,\n            column: None,\n            hint: None,\n        }\n    }\n}\n\npub struct FindingBuilder {\n    rule: String,\n    severity: Severity,\n    message: String,\n    program: Option\u003cString\u003e,\n    instruction: Option\u003cString\u003e,\n    account: Option\u003cString\u003e,\n    file: Option\u003cString\u003e,\n    line: Option\u003cusize\u003e,\n    column: Option\u003cusize\u003e,\n    hint: Option\u003cString\u003e,\n}\n\nimpl FindingBuilder {\n    pub fn program(mut self, p: impl Into\u003cString\u003e) -\u003e Self {\n        self.program = Some(p.into());\n        self\n    }\n    pub fn instruction(mut self, i: impl Into\u003cString\u003e) -\u003e Self {\n        self.instruction = Some(i.into());\n        self\n    }\n    pub fn account(mut self, a: impl Into\u003cString\u003e) -\u003e Self {\n        self.account = Some(a.into());\n        self\n    }\n    pub fn file(mut self, f: impl Into\u003cString\u003e) -\u003e Self {\n        self.file = Some(f.into());\n        self\n    }\n    pub fn line(mut self, l: usize) -\u003e Self {\n        self.line = Some(l);\n        self\n    }\n    pub fn column(mut self, c: usize) -\u003e Self {\n        self.column = Some(c);\n        self\n    }\n    pub fn hint(mut self, h: impl Into\u003cString\u003e) -\u003e Self {\n        self.hint = Some(h.into());\n        self\n    }\n    pub fn build(self) -\u003e Finding {\n        Finding {\n            rule: self.rule,\n            severity: self.severity,\n            program: self.program.unwrap_or_default(),\n            instruction: self.instruction,\n            account: self.account,\n            file: self.file,\n            line: self.line,\n            column: self.column,\n            message: self.message,\n            hint: self.hint,\n        }\n    }\n}\n\n/// What a rule sees at check-time. The AST layer populates `ast_hints` later\n/// in the build-out; for now it's an empty `Vec` and rules ignore it.\n#[derive(Debug, Clone)]\npub struct AnalysisContext {\n    pub ir: ProgramIr,\n    /// Optional AST-derived hints. Populated in Week 2.\n    pub ast_hints: Vec\u003cAstHint\u003e,\n}\n\nimpl Default for AnalysisContext {\n    fn default() -\u003e Self {\n        // Real callers always populate `ir` explicitly; this exists only so\n        // the struct can be constructed in tests without a parsed program.\n        Self {\n            ir: ProgramIr {\n                version: crate::idl::ir::IdlVersion::V30Plus,\n                name: String::new(),\n                instructions: Vec::new(),\n                accounts: Vec::new(),\n                types: Vec::new(),\n                events: Vec::new(),\n                errors: Vec::new(),\n                source_path: String::new(),\n            },\n            ast_hints: Vec::new(),\n        }\n    }\n}\n\n/// A free-form hint derived from the Rust source.\n#[derive(Debug, Clone)]\npub struct AstHint {\n    pub kind: AstHintKind,\n    pub file: String,\n    /// Resolved (1-based) line, set by the AST layer using the source text\n    /// + `proc_macro2::LineColumn`.\n    pub line: usize,\n    /// Resolved (1-based) column.\n    pub column: usize,\n}\n\nimpl AstHint {\n    /// Borrow the hint's source location as a `SourceLocation`. This is the\n    /// form rules want when stamping a `Finding` so that the report can\n    /// include `file:line:column` (currently the rule layer leaves these\n    /// fields as `null` for non-`unsafe_arithmetic` rules — task #1 fixes\n    /// that by routing every `AccountsField` hint through this helper).\n    pub fn location(\u0026self) -\u003e SourceLocation {\n        SourceLocation {\n            file: self.file.clone(),\n            line: self.line,\n            column: self.column,\n        }\n    }\n}\n\n/// Resolved source location, ready to be stamped onto a `Finding`.\n#[derive(Debug, Clone)]\npub struct SourceLocation {\n    pub file: String,\n    pub line: usize,\n    pub column: usize,\n}\n\nimpl SourceLocation {\n    pub fn stamp(self, b: FindingBuilder) -\u003e FindingBuilder {\n        b.file(self.file).line(self.line).column(self.column)\n    }\n}\n\n/// Safety classification for the signer-seeds argument of an\n/// `invoke_signed` call. The `cpi_signer_seed_validation` rule uses this\n/// to decide whether to fire a Critical finding.\n#[derive(Debug, Clone, PartialEq, Eq)]\npub enum SignerSeedClass {\n    /// All seed slices are composed of canonical sources:\n    /// `b\"...\"` literals, `ctx.bumps.\u003cident\u003e`, or `.key().as_ref()` on\n    /// a known account field. The seeds can be trusted to identify a\n    /// real PDA.\n    Safe,\n    /// At least one seed slice contains a function arg, an unresolvable\n    /// expression, or anything else the AST layer can't verify. The\n    /// seeds may identify an attacker-controlled address.\n    Dynamic,\n    /// The third argument was present but empty — equivalent to `invoke`\n    /// (no signers). Most often a programmer mistake; not strictly\n    /// exploitable, so the rule currently does not fire on it.\n    Absent,\n}\n\n#[derive(Debug, Clone)]\npub enum AstHintKind {\n    /// A field of an `#[derive(Accounts)]` struct.\n    AccountsField {\n        /// Owning struct name. Reserved for cross-struct linking\n        /// (a future task will key the field hint index by\n        /// `(instruction_name, struct_name, field_name)` instead of\n        /// `field_name` alone).\n        #[allow(dead_code)]\n        struct_name: String,\n        field_name: String,\n        /// \"Signer\", \"Account\u003c'info, T\u003e\", \"AccountInfo\", \"SystemAccount\", etc.\n        ty: String,\n        /// Constraint attributes like `mut`, `seeds`, `bump`, `has_one`.\n        constraints: Vec\u003cString\u003e,\n    },\n    /// A `pub fn` in an `#[program]` impl block.\n    InstructionHandler {\n        /// Owning struct name. Reserved for the Week-4+ cross-link\n        /// between IDL instructions and AST handlers.\n        #[allow(dead_code)]\n        struct_name: String,\n        /// Handler fn name. Reserved for the same cross-link.\n        #[allow(dead_code)]\n        fn_name: String,\n    },\n    /// An unchecked arithmetic op (`+`, `-`, `*`, `/`, `%`).\n    UnsafeArithmetic {\n        op: String,\n        lhs_ty: String,\n        rhs_ty: String,\n    },\n    /// A lamports subtraction (debit) on an account.\n    LamportsDebit {\n        account: String,\n        amount_expr: String,\n        seq: usize,\n    },\n    /// A lamports addition (credit) on an account.\n    LamportsCredit {\n        account: String,\n        amount_expr: String,\n        seq: usize,\n    },\n    /// A guard/comparison involving lamports/balance (if, require!, \u003e=, etc.).\n    BalanceCheck {\n        account: String,\n        check_type: String,\n        seq: usize,\n    },\n    /// Lamports explicitly zeroed (`lamports = 0`, `set_lamports(0)`).\n    LamportsZero { account: String, seq: usize },\n    /// CPI that may transfer lamports (`invoke` / `invoke_signed`).\n    CpiTransfer { target: String, seq: usize },\n    /// `invoke_signed` call with the signer-seeds safety classification.\n    /// The `cpi_signer_seed_validation` rule fires Critical findings for\n    /// `Seeds::Dynamic` — i.e. seeds that contain function args or any\n    /// expression the AST layer can't verify as canonical. `Seeds::Safe`\n    /// means every seed slice was either a `b\"...\"` literal, a\n    /// `ctx.bumps.\u003cident\u003e` canonical bump, or a `.key().as_ref()` on a\n    /// known account. `Seeds::Absent` is the rare case where the third\n    /// argument was empty (no signers, equivalent to plain `invoke`).\n    CpiInvokeSigned {\n        /// The CPI target. Currently unused by the rule but kept for\n        /// future cross-referencing and to maintain symmetry with\n        /// `CpiTransfer`.\n        #[allow(dead_code)]\n        target: String,\n        /// Monotonic sequence number for ordering. Currently unused.\n        #[allow(dead_code)]\n        seq: usize,\n        seeds: SignerSeedClass,\n        /// Short human description of the seeds for the rule's finding\n        /// message — e.g. `\"b\\\"vault\\\", ctx.bumps.vault\"` or\n        /// `\"args.bump (function arg)\"`.\n        seed_summary: String,\n    },\n    /// An `as` cast between two integer-typed expressions. The rule\n    /// `integer_cast_truncation` only fires when the source is wider than\n    /// the destination (e.g. `u64` → `u8`); widening casts are emitted too\n    /// so future rules (overflow on downcast, lossy float→int) can reuse\n    /// the hint.\n    IntegerCast { from_ty: String, to_ty: String },\n}\n\n/// Which analysis layer(s) a rule consults. Surfaced as a column in\n/// the `sentinel rules` table so users can tell at a glance whether a\n/// rule needs only the IDL or also the Rust source.\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub enum Layer {\n    /// IDL-only — needs nothing beyond the parsed `target/idl/*.json`.\n    /// Reserved for future IDL-only rules; no current rule uses it.\n    #[allow(dead_code)]\n    Idl,\n    /// AST-only — needs the Rust source via the proc-macro AST hints.\n    Ast,\n    /// Both — combines signals from IDL and AST (e.g. matches by\n    /// account name from the IDL, then cross-checks with `#[account]`\n    /// constraints parsed from the source).\n    IdlAst,\n}\n\nimpl Layer {\n    pub fn as_str(\u0026self) -\u003e \u0026'static str {\n        match self {\n            Layer::Idl =\u003e \"IDL\",\n            Layer::Ast =\u003e \"AST\",\n            Layer::IdlAst =\u003e \"IDL+AST\",\n        }\n    }\n}\n\nimpl std::fmt::Display for Layer {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        f.write_str(self.as_str())\n    }\n}\n\n/// The interface every rule implements.\npub trait Rule: Send + Sync {\n    /// Stable identifier used in `--ignore` flags and JSON output.\n    fn id(\u0026self) -\u003e \u0026'static str;\n    /// Short human description, used by `sentinel rules`.\n    fn description(\u0026self) -\u003e \u0026'static str;\n    /// Default severity for findings from this rule.\n    fn severity(\u0026self) -\u003e Severity;\n    /// Which analysis layer(s) this rule consults. Surfaced as the\n    /// `Layer` column in `sentinel rules`. Defaults to `IdlAst` so\n    /// newly added rules (or out-of-tree implementors) don't have to\n    /// override it immediately — they can pick the most permissive\n    /// value and refine later.\n    fn layer(\u0026self) -\u003e Layer {\n        Layer::IdlAst\n    }\n    /// Inspect the context and return any findings.\n    fn check(\u0026self, ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e;\n}\n\n/// Run every registered rule over `ctx`, returning all findings.\npub fn run_all_rules(ctx: \u0026AnalysisContext) -\u003e Result\u003cVec\u003cFinding\u003e\u003e {\n    let mut out = Vec::new();\n    for rule in registry::all_rules() {\n        out.extend(rule.check(ctx)?);\n    }\n    Ok(out)\n}\n\n/// Build a quick lookup from field_name → the AST hint that first declared\n/// it. Rules use this to stamp source locations onto findings, since IDL\n/// alone carries no `file:line:column` for individual accounts.\n///\n/// In the rare case where the same field name appears on multiple structs\n/// (e.g. `authority` on both `Deposit` and `Withdraw`) the first hint wins.\n/// That's acceptable for a static analysis tool — the message says\n/// \"Account `authority` on instruction `withdraw`\" and the line points at\n/// one of the declarations; the user can fix the right one from the\n/// instruction name alone.\npub fn field_hint_index(ctx: \u0026AnalysisContext) -\u003e std::collections::HashMap\u003cString, AstHint\u003e {\n    let mut index = std::collections::HashMap::with_capacity(ctx.ast_hints.len());\n    for hint in \u0026ctx.ast_hints {\n        if let AstHintKind::AccountsField { field_name, .. } = \u0026hint.kind {\n            index.entry(field_name.clone()).or_insert(hint.clone());\n        }\n    }\n    index\n}\n","traces":[{"line":25,"address":[],"length":0,"stats":{"Line":21}},{"line":26,"address":[],"length":0,"stats":{"Line":21}},{"line":27,"address":[],"length":0,"stats":{"Line":0}},{"line":28,"address":[],"length":0,"stats":{"Line":0}},{"line":29,"address":[],"length":0,"s ount\u003e,\n    pub args: Vec\u003cInstructionArg\u003e,\n    /// `discriminator` for 0.30+ IDLs (8-byte sighash).\n    #[serde(default)]\n    pub discriminator: Option\u003cVec\u003cu8\u003e\u003e,\n}\n\n/// An account referenced by an instruction.\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct InstructionAccount {\n    pub name: String,\n    pub is_mut: bool,\n    pub is_signer: bool,\n    /// Optional PDA-derivation info (0.30+).\n    #[serde(default)]\n    pub pda: Option\u003cPdaDerivation\u003e,\n    /// Optional address constraint (0.30+).\n    #[serde(default)]\n    pub address: Option\u003cString\u003e,\n}\n\n/// An argument to an instruction.\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct InstructionArg {\n    pub name: String,\n    pub ty: String,\n}\n\n/// Account state struct (top-level `accounts:` in the IDL).\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct AccountDef {\n    pub name: String,\n    #[serde(default)]\n    pub discriminator: Option\u003cVec\u003cu8\u003e\u003e,\n}\n\n/// User-defined type (struct or enum).\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct TypeDef {\n    pub name: String,\n    /// `\"struct\"` or `\"enum\"`.\n    pub kind: String,\n    #[serde(default)]\n    pub fields: Vec\u003cTypeField\u003e,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct TypeField {\n    pub name: String,\n    pub ty: String,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct EventDef {\n    pub name: String,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct ErrorDef {\n    pub code: u32,\n    pub name: String,\n    #[serde(default)]\n    pub msg: Option\u003cString\u003e,\n}\n\n/// PDA derivation metadata, present on 0.30+ instruction accounts.\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct PdaDerivation {\n    pub seeds: Vec\u003cPdaSeed\u003e,\n    /// Optional `program` field for cross-program PDAs.\n    #[serde(default)]\n    pub program: Option\u003cString\u003e,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct PdaSeed {\n    pub kind: String,\n    #[serde(default)]\n    pub value: Option\u003cString\u003e,\n    /// Path into another account's field, for `Account::data` seeds.\n    #[serde(default)]\n    pub path: Option\u003cString\u003e,\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","enjo","anchor-sentinel","src","idl","mod.rs"],"content":"//! IDL loader: detect Anchor IDL version and produce a unified `ProgramIr`.\n//!\n//! Auto-detect heuristic:\n//!   - Top-level `\"version\"` string starting with `\"0.30\"` or later → 0.30+.\n//!   - Otherwise (e.g. `\"0.0.0\"`, `\"0.29.0\"`, missing) → legacy 0.29.\n//!   - When uncertain we fall through to legacy first, then modern, and accept\n//!     whichever succeeds.\n\npub mod ir;\npub mod v29;\npub mod v30;\npub mod v31;\n\nuse anyhow::{anyhow, Context, Result};\nuse std::path::Path;\n\nuse ir::{\n    AccountDef, ErrorDef, EventDef, IdlVersion, Instruction, InstructionAccount, InstructionArg,\n    PdaDerivation, PdaSeed, ProgramIr, TypeDef, TypeField,\n};\n\n/// Load a single IDL file from disk and convert to the unified IR.\npub fn load_idl(path: \u0026Path) -\u003e Result\u003cProgramIr\u003e {\n    let raw = std::fs::read_to_string(path)\n        .with_context(|| format!(\"reading IDL file {}\", path.display()))?;\n    let json: serde_json::Value = serde_json::from_str(\u0026raw)\n        .with_context(|| format!(\"parsing IDL file {} as JSON\", path.display()))?;\n    from_value(json, \u0026path.display().to_string())\n}\n\n/// Build a `ProgramIr` from a raw `serde_json::Value`, auto-detecting the\n/// IDL dialect.\npub fn from_value(json: serde_json::Value, source_path: \u0026str) -\u003e Result\u003cProgramIr\u003e {\n    if json.get(\"metadata\").is_some() \u0026\u0026 json.get(\"version\").is_none() {\n        let parsed: v31::IdlFile = serde_json::from_value(json)\n            .with_context(|| format!(\"deserializing IDL (v31) from {source_path}\"))?;\n        return Ok(convert_v31(parsed, source_path));\n    }\n\n    let version_str = json\n        .get(\"version\")\n        .and_then(|v| v.as_str())\n        .unwrap_or(\"0.0.0\")\n        .to_string();\n\n    let detected = detect_version(\u0026version_str);\n    match detected {\n        IdlVersion::V30Plus =\u003e {\n            let parsed: v30::IdlFile = serde_json::from_value(json)\n                .with_context(|| format!(\"deserializing IDL (v30) from {source_path}\"))?;\n            Ok(convert_v30(parsed, source_path))\n        }\n        IdlVersion::V29 =\u003e {\n            let parsed: v29::IdlFile = serde_json::from_value(json)\n                .with_context(|| format!(\"deserializing IDL (v29) from {source_path}\"))?;\n            Ok(convert_v29(parsed, source_path))\n        }\n    }\n}\n\nfn detect_version(version_str: \u0026str) -\u003e IdlVersion {\n    let minor = version_str\n        .strip_prefix(\"0.\")\n        .and_then(|s| s.split('.').next())\n        .and_then(|s| s.parse::\u003cu32\u003e().ok())\n        .unwrap_or(0);\n    if minor \u003e= 30 {\n        IdlVersion::V30Plus\n    } else {\n        IdlVersion::V29\n    }\n}\n\nfn convert_v31(idl: v31::IdlFile, source_path: \u0026str) -\u003e ProgramIr {\n    let instructions = idl\n        .instructions\n        .into_iter()\n        .map(|ix| Instruction {\n            name: ix.name,\n            accounts: ix\n                .accounts\n                .into_iter()\n                .map(|a| {\n                    let is_signer = a.signer || a.relations.iter().any(|r| r == \"project\");\n                    InstructionAccount {\n                        name: a.name,\n                        is_mut: a.writable,\n                        is_signer,\n                        pda: a.pda.map(|p| PdaDerivation {\n                            seeds: p\n                                .seeds\n                                .into_iter()\n                                .map(|s| {\n                                    let value = s.value.and_then(|v| match v {\n                                        serde_json::Value::Array(arr) =\u003e {\n                                            let bytes: Vec\u003cu8\u003e = arr\n                                                .iter()\n                                                .filter_map(|x| x.as_u64().map(|n| n as u8))\n                                                .collect();\n                                            String::from_utf8(bytes).ok()\n                                        }\n                                        serde_json::Value::String(s) =\u003e Some(s.clone()),\n                                        _ =\u003e None,\n                                    });\n                                    PdaSeed {\n                                        kind: s.kind,\n                                        value,\n                                        path: s.path.or(s.account),\n                                    }\n                                })\n                                .collect(),\n                            program: p.program,\n                        }),\n                        address: a.address,\n                    }\n                })\n                .collect(),\n            args: ix\n                .args\n                .into_iter()\n                .map(|a| {\n                    let ty_str = a.ty.as_ref().map(|v| v.to_string()).unwrap_or_default();\n                    InstructionArg {\n                        name: a.name,\n                        ty: ty_str,\n                    }\n                })\n                .collect(),\n            discriminator: ix.discriminator,\n        })\n        .collect();\n\n    let accounts = idl\n        .accounts\n        .into_iter()\n        .map(|a| AccountDef {\n            name: a.name,\n            discriminator: a.discriminator,\n        })\n        .collect();\n\n    let types = idl\n        .types\n        .into_iter()\n        .filter_map(|t| {\n            let name = t.name.clone();\n            let body = t.body()?;\n            let fields = body\n                .fields\n                .iter()\n                .map(|f| TypeField {\n                    name: f.name.clone(),\n                    ty: serde_json::to_string(\u0026f.ty).unwrap_or_else(|_| \"string\".to_string()),\n                })\n                .collect();\n            Some(TypeDef {\n                name,\n                kind: body.kind.clone(),\n                fields,\n            })\n        })\n        .collect();\n\n    let events = idl\n        .events\n        .into_iter()\n        .map(|e| EventDef { name: e.name })\n        .collect();\n\n    let errors = idl\n        .errors\n        .into_iter()\n        .map(|e| ErrorDef {\n            code: e.code,\n            name: e.name,\n            msg: e.msg,\n        })\n        .collect();\n\n    ProgramIr {\n        version: IdlVersion::V30Plus,\n        name: idl.metadata.name,\n        instructions,\n        accounts,\n        types,\n        events,\n        errors,\n        source_path: source_path.to_string(),\n    }\n}\n\nfn convert_v30(idl: v30::IdlFile, source_path: \u0026str) -\u003e ProgramIr {\n    let instructions = idl\n        .instructions\n        .into_iter()\n        .map(|ix| Instruction {\n            name: ix.name,\n            accounts: ix\n                .accounts\n                .into_iter()\n                .map(|a| {\n                    let (is_mut, is_signer) = match (a.is_mut, a.is_signer) {\n                        (Some(m), Some(s)) =\u003e (m, s),\n                        _ =\u003e (a.writable, a.signer),\n                    };\n                    InstructionAccount {\n                        name: a.name,\n                        is_mut,\n                        is_signer,\n                        pda: a.pda.map(|p| PdaDerivation {\n                            seeds: p\n                                .seeds\n                                .into_iter()\n                                .map(|s| PdaSeed {\n                                    kind: s.kind,\n                                    value: s.value,\n                                    path: s.path,\n                                })\n                                .collect(),\n                            program: p.program,\n                        }),\n                        address: a.address,\n                    }\n                })\n                .collect(),\n            args: ix\n                .args\n                .into_iter()\n                .map(|a| InstructionArg {\n                    name: a.name,\n                    ty: a.ty,\n                })\n                .collect(),\n            discriminator: ix.discriminator,\n        })\n        .collect();\n\n    let accounts = idl\n        .accounts\n        .into_iter()\n        .map(|a| AccountDef {\n            name: a.name,\n            discriminator: a.discriminator,\n        })\n        .collect();\n\n    let types = idl\n        .types\n        .into_iter()\n        .map(|t| {\n            let fields =\n                t.ty.as_ref()\n                    .map(|b| {\n                        b.fields\n                            .iter()\n                            .map(|f| TypeField {\n                                name: f.name.clone(),\n                                ty: f.ty.clone(),\n                            })\n                            .collect()\n                    })\n                    .unwrap_or_default();\n            TypeDef {\n                name: t.name,\n                kind: t.kind,\n                fields,\n            }\n        })\n        .collect();\n\n    let events = idl\n        .events\n        .into_iter()\n        .map(|e| EventDef { name: e.name })\n        .collect();\n\n    let errors = idl\n        .errors\n        .into_iter()\n        .map(|e| ErrorDef {\n            code: e.code,\n            name: e.name,\n            msg: e.msg,\n        })\n        .collect();\n\n    ProgramIr {\n        version: IdlVersion::V30Plus,\n        name: idl.name,\n        instructions,\n        accounts,\n        types,\n        events,\n        errors,\n        source_path: source_path.to_string(),\n    }\n}\n\nfn convert_v29(idl: v29::IdlFile, source_path: \u0026str) -\u003e ProgramIr {\n    let instructions = idl\n        .instructions\n        .into_iter()\n        .map(|ix| Instruction {\n            name: ix.name,\n            accounts: ix\n                .accounts\n                .into_iter()\n                .map(|a| InstructionAccount {\n                    name: a.name,\n                    is_mut: a.is_mut,\n                    is_signer: a.is_signer,\n                    pda: None,\n                    address: None,\n                })\n                .collect(),\n            args: ix\n                .args\n                .into_iter()\n                .map(|a| InstructionArg {\n                    name: a.name,\n                    ty: a.ty,\n                })\n                .collect(),\n            discriminator: None,\n        })\n        .collect();\n\n    let accounts = idl\n        .accounts\n        .into_iter()\n        .map(|a| AccountDef {\n            name: a.name,\n            discriminator: None,\n        })\n        .collect();\n\n    let types = idl\n        .types\n        .into_iter()\n        .map(|t| TypeDef {\n            name: t.name,\n            kind: t.kind.unwrap_or_else(|| t.ty.kind.clone()),\n            fields: t\n                .ty\n                .fields\n                .into_iter()\n                .map(|f| TypeField {\n                    name: f.name,\n                    ty: f.ty,\n                })\n                .collect(),\n        })\n        .collect();\n\n    let events = idl\n        .events\n        .into_iter()\n        .map(|e| EventDef { name: e.name })\n        .collect();\n\n    let errors = idl\n        .errors\n        .into_iter()\n        .map(|e| ErrorDef {\n            code: e.code,\n            name: e.name,\n            msg: e.msg,\n        })\n        .collect();\n\n    ProgramIr {\n        version: IdlVersion::V29,\n        name: idl.name,\n        instructions,\n        accounts,\n        types,\n        events,\n        errors,\n        source_path: source_path.to_string(),\n    }\n}\n\n/// Find every `*.json` IDL file in a project. Anchor places them at\n/// `target/idl/\u003cprogram_name\u003e.json` after `anchor build`.\npub fn discover_idl_files(project: \u0026Path) -\u003e Result\u003cVec\u003cstd::path::PathBuf\u003e\u003e {\n    use walkdir::WalkDir;\n\n    let target_dir = project.join(\"target\").join(\"idl\");\n    let mut found = Vec::new();\n\n    if target_dir.is_dir() {\n        for entry in WalkDir::new(\u0026target_dir)\n            .max_depth(2)\n            .into_iter()\n            .filter_map(|e| e.ok())\n        {\n            let p = entry.path();\n            if p.extension().and_then(|s| s.to_str()) == Some(\"json\") {\n                found.push(p.to_path_buf());\n            }\n        }\n    }\n\n    if found.is_empty() {\n        return Err(anyhow!(\n            \"no IDL files found under {}. Run `anchor build` first to generate target/idl/.\",\n            target_dir.display()\n        ));\n    }\n\n    found.sort();\n    Ok(found)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use serde_json::json;\n\n    #[test]\n    fn detects_v30_idl() {\n        let v = json!({\n            \"version\": \"0.30.0\",\n            \"name\": \"demo\",\n            \"instructions\": [{\n                \"name\": \"initialize\",\n                \"accounts\": [{ \"name\": \"user\", \"writable\": true, \"signer\": true }],\n                \"args\": [],\n                \"discriminator\": [1,2,3,4,5,6,7,8]\n            }],\n            \"types\": [],\n            \"events\": [],\n \u003e,\n}\n\nimpl LoadedProject {\n    pub fn new(root: PathBuf) -\u003e Self {\n        Self {\n            root,\n            idl_files: Vec::new(),\n            programs: Vec::new(),\n        }\n    }\n}\n\n/// Discover IDL files and program `lib.rs` paths under `project`,\n/// excluding any paths matching `exclude_patterns`.\npub fn load(project: \u0026Path, exclude_patterns: \u0026[String]) -\u003e Result\u003cLoadedProject\u003e {\n    use walkdir::WalkDir;\n\n    let mut loaded = LoadedProject::new(project.to_path_buf());\n\n    if let Ok(idls) = idl::discover_idl_files(project) {\n        loaded.idl_files = idls\n            .into_iter()\n            .filter(|p| !config::is_excluded(p, exclude_patterns))\n            .collect();\n    }\n\n    let programs_dir = project.join(\"programs\");\n    if programs_dir.is_dir() {\n        for entry in WalkDir::new(\u0026programs_dir)\n            .max_depth(4)\n            .into_iter()\n            .filter_map(|e| e.ok())\n        {\n            let p = entry.path();\n            if p.file_name().and_then(|s| s.to_str()) == Some(\"lib.rs\")\n                \u0026\u0026 !config::is_excluded(p, exclude_patterns)\n            {\n                loaded.programs.push(p.to_path_buf());\n            }\n        }\n    }\n\n    Ok(loaded)\n}\n\n/// Parse every IDL file under the project into a unified `ProgramIr`.\npub fn parse_idls(loaded: \u0026LoadedProject) -\u003e Result\u003cVec\u003cProgramIr\u003e\u003e {\n    let mut out = Vec::new();\n    for idl in \u0026loaded.idl_files {\n        out.push(idl::load_idl(idl)?);\n    }\n    Ok(out)\n}\n","traces":[{"line":21,"address":[],"length":0,"stats":{"Line":28}},{"line":24,"address":[],"length":0,"stats":{"Line":28}},{"line":25,"address":[],"length":0,"stats":{"Line":28}},{"line":32,"address":[],"length":0,"stats":{"Line":28}},{"line":35,"address":[],"length":0,"stats":{"Line":112}},{"line":37,"address":[],"length":0,"stats":{"Line":55}},{"line":38,"address":[],"length":0," ) =\u003e {\n            eprintln!(\"error: {e:#}\");\n            ExitCode::from(2)\n        }\n    }\n}\n\nfn run(cli: Cli) -\u003e Result\u003cExitCode\u003e {\n    match cli.command {\n        Command::Scan {\n            path,\n            format,\n            strict,\n            ignore,\n            min_severity,\n            verbose,\n        } =\u003e cmd_scan(\u0026path, format, strict, \u0026ignore, min_severity, verbose),\n        Command::Rules =\u003e {\n            cmd_rules();\n            Ok(ExitCode::SUCCESS)\n        }\n        Command::Version =\u003e {\n            println!(\"sentinel {}\", env!(\"CARGO_PKG_VERSION\"));\n            Ok(ExitCode::SUCCESS)\n        }\n        Command::Explain { rule_id } =\u003e {\n            cmd_explain(\u0026rule_id);\n            Ok(ExitCode::SUCCESS)\n        }\n    }\n}\n\nfn cmd_scan(\n    path: \u0026str,\n    format: cli::OutputFormat,\n    strict: bool,\n    ignore: \u0026[String],\n    min_severity: Option\u003ccli::MinSeverity\u003e,\n    verbose: bool,\n) -\u003e Result\u003cExitCode\u003e {\n    let project = std::path::Path::new(path);\n    if !project.exists() {\n        anyhow::bail!(\"project path does not exist: {}\", project.display());\n    }\n\n    let cfg = config::Config::load(project);\n\n    let mut all_ignore: Vec\u003cString\u003e = cfg.ignore_rules().to_vec();\n    for i in ignore {\n        if !all_ignore.contains(i) {\n            all_ignore.push(i.clone());\n        }\n    }\n\n    let effective_min_severity = min_severity.or_else(|| {\n        cfg.min_severity()\n            .and_then(|s| match s.to_lowercase().as_str() {\n                \"info\" =\u003e Some(cli::MinSeverity::Info),\n                \"low\" =\u003e Some(cli::MinSeverity::Low),\n                \"medium\" =\u003e Some(cli::MinSeverity::Medium),\n                \"high\" =\u003e Some(cli::MinSeverity::High),\n                \"critical\" =\u003e Some(cli::MinSeverity::Critical),\n                _ =\u003e None,\n            })\n    });\n\n    if matches!(format, cli::OutputFormat::Text) {\n        text::print_hero(\u0026project.display().to_string(), \u0026cfg);\n    }\n\n    let t_total_start = Instant::now();\n\n    let t_load_start = Instant::now();\n    if verbose {\n        eprintln!(\"[*] Loading project...\");\n    }\n    let loaded = loader::load(project, cfg.exclude_paths()).context(\"loading project\")?;\n    if loaded.idl_files.is_empty() {\n        anyhow::bail!(\n            \"no IDL files found. Run `anchor build` inside the project first \\\n             so that target/idl/*.json is populated.\"\n        );\n    }\n    let t_load = t_load_start.elapsed();\n    if verbose {\n        eprintln!(\n            \"[+] Loaded {} IDL file(s), {} program(s) in {:?}\",\n            loaded.idl_files.len(),\n            loaded.programs.len(),\n            t_load\n        );\n    }\n\n    let t_parse_start = Instant::now();\n    if verbose {\n        eprintln!(\"[*] Parsing IDLs...\");\n    }\n    let programs = loader::parse_idls(\u0026loaded).context(\"parsing IDLs\")?;\n    let t_parse = t_parse_start.elapsed();\n    if verbose {\n        let total_instrs: usize = programs.iter().map(|p| p.instructions.len()).sum();\n        eprintln!(\n            \"[+] Parsed {} program(s) with {} instruction(s) in {:?}\",\n            programs.len(),\n            total_instrs,\n            t_parse\n        );\n    }\n\n    let t_ast_start = Instant::now();\n    if verbose {\n        eprintln!(\"[*] Analyzing source code...\");\n    }\n    let ast_hints = ast::collect_hints(\u0026loaded.programs);\n    let t_ast = t_ast_start.elapsed();\n    if verbose {\n        eprintln!(\"[+] AST analysis complete in {:?}\", t_ast);\n    }\n\n    let t_rules_start = Instant::now();\n    if verbose {\n        eprintln!(\"[*] Running security rules...\");\n    }\n    let mut all_findings = Vec::new();\n    let rule_count = engine::registry::list_rule_ids().len();\n    for (i, ir) in programs.iter().enumerate() {\n        if verbose {\n            eprintln!(\"[*] Checking program {} of {}...\", i + 1, programs.len());\n        }\n        let ctx = AnalysisContext {\n            ir: ir.clone(),\n            ast_hints: ast_hints.clone(),\n        };\n        all_findings.extend(engine::run_all_rules(\u0026ctx)?);\n    }\n    let t_rules = t_rules_start.elapsed();\n    let t_total = t_total_start.elapsed();\n    if verbose {\n        eprintln!(\n            \"[+] Executed {} rule(s) in {:?} (total: {:?})\",\n            rule_count, t_rules, t_total\n        );\n    }\n\n    let timings = ScanTimings {\n        load: t_load,\n        parse_idls: t_parse,\n        ast_hints: t_ast,\n        run_rules: t_rules,\n        total: t_total,\n    };\n\n    if !all_ignore.is_empty() {\n        all_findings.retain(|f| !all_ignore.iter().any(|i| i == \u0026f.rule));\n    }\n\n    let min = effective_min_severity.map(|m| m.into_severity());\n    if let Some(min) = min {\n        all_findings.retain(|f| f.severity \u003e= min);\n    }\n\n    let programs_count = loaded.programs.len();\n    let instructions_count: usize = programs.iter().map(|p| p.instructions.len()).sum();\n\n    match format {\n        cli::OutputFormat::Sarif =\u003e {\n            println!(\"{}\", report::sarif::render(\u0026all_findings));\n        }\n        cli::OutputFormat::Json =\u003e {\n            println!(\"{}\", report::json::render(\u0026all_findings));\n        }\n        cli::OutputFormat::Text =\u003e {\n            let scan_report = text::ScanReport {\n                timings: text::ScanTimings {\n                    load: timings.load,\n                    parse_idls: timings.parse_idls,\n                    ast_hints: timings.ast_hints,\n                    run_rules: timings.run_rules,\n                    total: timings.total,\n                },\n                programs: programs_count,\n                instructions: instructions_count,\n                rules_executed: rule_count,\n                findings: \u0026all_findings,\n            };\n            text::print_pipeline(\u0026scan_report.timings);\n            text::print_security_overview(\u0026all_findings);\n            text::print_findings(\u0026all_findings);\n            text::print_statistics(\u0026scan_report);\n            text::print_verdict(\u0026all_findings);\n        }\n    }\n\n    let has_blocking = if let Some(min) = min {\n        all_findings.iter().any(|f| f.severity \u003e= min)\n    } else {\n        strict \u0026\u0026 all_findings.iter().any(|f| f.severity \u003e Severity::Info)\n    };\n\n    if has_blocking {\n        Ok(ExitCode::from(1))\n    } else {\n        Ok(ExitCode::SUCCESS)\n    }\n}\n\nfn cmd_rules() {\n    text::print_rules_table();\n}\n\nfn cmd_explain(rule_id: \u0026str) {\n    if let Some(explain) = report::explain::get_explanation(rule_id) {\n        println!();\n        println!(\"{}\", \"=\".repeat(70));\n        println!(\"⚓ {}\", explain.title);\n        println!(\"{}\", \"=\".repeat(70));\n        println!();\n        println!(\"ID:        {}\", explain.id);\n        println!(\"Severity:  {}\", explain.severity);\n        println!();\n        println!(\"{}\", \"-\".repeat(70));\n        println!(\"WHAT\");\n        println!(\"{}\", \"-\".repeat(70));\n        println!(\"{}\", explain.what);\n        println!();\n        println!(\"{}\", \"-\".repeat(70));\n        println!(\"WHY THIS IS DANGEROUS\");\n        println!(\"{}\", \"-\".repeat(70));\n        println!(\"{}\", explain.why);\n        println!();\n        println!(\"{}\", \"-\".repeat(70));\n        println!(\"VULNERABLE EXAMPLE\");\n        println!(\"{}\", \"-\".repeat(70));\n        for line in explain.vulnerable_example.lines() {\n            println!(\"{}\", line);\n        }\n        println!();\n        println!(\"{}\", \"-\".repeat(70));\n        println!(\"SAFE EXAMPLE\");\n        println!(\"{}\", \"-\".repeat(70));\n        for line in explain.safe_example.lines() {\n            println!(\"{}\", line);\n        }\n        println!();\n        if let Some(ref_url) = explain.exploit_ref {\n            println!(\"{}\", \"-\".repeat(70));\n            println!(\"EXPLOIT REFERENCE\");\n            println!(\"{}\", \"-\".repeat(70));\n            println!(\"{}\", ref_url);\n        }\n        if let Some(pat) = explain.detection_pattern {\n            println!(\"{}\", \"-\".repeat(70));\n            println!(\"DETECTION PATTERN\");\n            println!(\"{}\", \"-\".repeat(70));\n            for line in pat.lines() {\n                println!(\"{}\", line);\n            }\n        }\n        if let Some(see_also) = explain.see_also {\n            println!();\n            println!(\"{}\", \"-\".repeat(70));\n            println!(\"SEE ALSO\");\n            println!(\"{}\", \"-\".repeat(70));\n            for rule in see_also {\n                println!(\"  • `sentinel explain {}`\", rule);\n            }\n        }\n        println!();\n        println!(\"{}\", \"=\".repeat(70));\n        println!();\n        println!(\"Learn more: Run `sentinel scan .` to detect this pattern in your code.\");\n        println!(\"See also: `sentinel rules` for all security rules.\");\n    } else {\n        eprintln!(\"error: unknown rule '{}'\", rule_id);\n        eprintln!(\"Run `sentinel rules` to see all available rules.\");\n    }\n}\n","traces":[{"line":30,"address":[],"length":0,"stats":{"Line":29}},{"line":31,"address":[],"length":0,"stats":{"Line":29}},{"line":32,"address":[],"length":0,"stats":{"Line":0}},{"line":33,"address":[],"length":0,"stats":{"Line":0}},{"line":34,"address":[],"length":0,"stats":{"Line":0}},{"line":37,"address":[],"length":0,"stats":{"Line":58}},{"line":39,"address":[],"length":0,"stats":{"Line":29}},{"line":40,"address":[],"length":0,"stats":{"Line":56}},{"line":41,"address":[],"length":0,"stats":{"Line":1}},{"line":42,"address":[],"length":0,"stats":{"Line":1}},{"line":43,"address":[],"length":0,"stats":{"Line":1}},{"line":48,"ad ess":[],"length":0,"stats":{"Line":0}},{"line":285,"address":[],"length":0,"stats":{"Line":0}},{"line":286,"address":[],"length":0,"stats":{"Line":0}},{"line":287,"address":[],"length":0,"stats":{"Line":0}},{"line":288,"address":[],"length":0,"stats":{"Line":0}},{"line":289,"address":[],"length":0,"stats":{"Line":0}},{"line":291,"address":[],"length":0,"stats":{"Line":0}},{"line":292,"address":[],"length":0,"stats":{"Line":0}},{"line":293,"address":[],"length":0,"stats":{"Line":0}},{"line":294,"address":[],"length":0,"stats":{"Line":0}},{"line":295,"address":[],"length":0,"stats":{"Line":0}},{"line":296,"address":[],"length":0,"stats":{"Line":0}},{"line":299,"address":[],"length":0,"stats":{"Line":0}},{"line":300,"address":[],"length":0,"stats":{"Line":0}},{"line":301,"address":[],"length":0,"stats":{"Line":0}},{"line":302,"address":[],"length":0,"stats":{"Line":0}},{"line":303,"address":[],"length":0,"stats":{"Line":0}},{"line":304,"address":[],"length":0,"stats":{"Line":0}},{"line":305,"address":[],"length":0,"stats":{"Line":0}},{"line":308,"address":[],"length":0,"stats":{"Line":0}},{"line":309,"address":[],"length":0,"stats":{"Line":0}},{"line":310,"address":[],"length":0,"stats":{"Line":0}},{"line":311,"address":[],"length":0,"stats":{"Line":0}},{"line":312,"address":[],"length":0,"stats":{"Line":0}},{"line":314,"address":[],"length":0,"stats":{"Line":0}},{"line":315,"address":[],"length":0,"stats":{"Line":0}}],"covered":85,"coverable":179},{"path":["/","Users","enjo","anchor-sentinel","src","report","explain.rs"],"content":"//! Detailed explanations for each security rule.\n//!\n//! These are used by `sentinel explain \u003crule\u003e` to teach developers\n//! why a pattern is dangerous, with vulnerable/safe examples and\n//! real-world exploit references.\n\nuse crate::engine::Severity;\n\npub struct Explain {\n    pub id: \u0026'static str,\n    pub title: \u0026'static str,\n    pub severity: Severity,\n    pub what: \u0026'static str,\n    pub why: \u0026'static str,\n    pub vulnerable_example: \u0026'static str,\n    pub safe_example: \u0026'static str,\n    pub exploit_ref: Option\u003c\u0026'static str\u003e,\n    pub see_also: Option\u003c\u0026'static [\u0026'static str]\u003e,\n    pub detection_pattern: Option\u003c\u0026'static str\u003e,\n}\n\npub fn get_explanation(rule_id: \u0026str) -\u003e Option\u003cExplain\u003e {\n    match rule_id {\n        \"cpi_signer_seed_validation\" =\u003e Some(Explain {\n            id: \"cpi_signer_seed_validation\",\n            title: \"Dynamic CPI Signer Seeds\",\n            severity: Severity::Critical,\n            what: \"An `invoke_signed` call uses signer seeds that cannot be verified at analysis time.\",\n            why: r#\"PDA derivation uses `ctx.bumps` or `b\"literal\"` — safe. But if seeds contain function arguments or unresolvable expressions, an attacker can compute their own valid PDA and have the program sign for it.\n\nThis is the \"fake PDA\" exploit: the attacker calls the program with attacker-controlled seeds, and `invoke_signed` produces a signature for an address only the attacker knows.\"#,\n            vulnerable_example: r#\"// VULNERABLE: seeds include user-controlled `args.nonce`\ninvoke_signed(\n    \u0026ctx.accounts.target,\n    \u0026ctx.accounts.system_program,\n    args.nonce,  // attacker controls this!\n    \u0026[\n        b\"account\",\n        ctx.accounts.user.to_account_info().key.as_ref(),\n        args.nonce.to_le_bytes().as_ref(),\n    ],\n)\"#,\n            safe_example: r#\"// SAFE: use canonical bump from ctx.bumps\ninvoke_signed(\n    \u0026ctx.accounts.target,\n    \u0026ctx.accounts.system_program,\n    \u0026[],\n    \u0026[\n        b\"account\",\n        ctx.accounts.user.to_account_info().key.as_ref(),\n        \u0026[ctx.bumps.target],\n    ],\n)\"#,\n            exploit_ref: Some(\"https://github.com/coral-xyz/sealevel-attacks#arbitrary-cpi\"),\n            see_also: Some(\u0026[\"missing_signer\", \"pda_misconfig\"]),\n            detection_pattern: Some(r#\"invoke_signed(..., seeds: [..., user_arg, ...])\n// or\ninvoke_signed(..., seeds: [..., args.nonce, ...])\"#),\n        }),\n        \"missing_balance_check\" =\u003e Some(Explain {\n            id: \"missing_balance_check\",\n            title: \"Missing Balance Check\",\n            severity: Severity::Critical,\n            what: \"Lamports are debited from an account without a preceding balance check.\",\n            why: r#\"If you subtract `amount` from an account without checking `account.lamports() \u003e= amount`, two things can happen:\n\n1. **Underflow panic** — The transaction fails, giving the attacker a DoS vector\n2. **Wraparound drain** — If SOL prices fluctuate, the account wraps to max u64 and the attacker gets a windfall\n\nThis pattern has drained real vaults on mainnet.\"#,\n            vulnerable_example: r#\"// VULNERABLE: no balance check\npub fn withdraw(ctx: \u0026Context\u003cWithdraw\u003e, amount: u64) -\u003e Result\u003c()\u003e {\n    let user = \u0026mut ctx.accounts.user;\n    user.lamports -= amount;  // can underflow!\n    ctx.accounts.vault.lamports += amount;\n    Ok(())\n}\"#,\n            safe_example: r#\"// SAFE: check balance before debit\npub fn withdraw(ctx: \u0026Context\u003cWithdraw\u003e, amount: u64) -\u003e Result\u003c()\u003e {\n    let user = \u0026mut ctx.accounts.user;\n    require!(user.lamports() \u003e= amount, MyError::InsufficientFunds);\n    user.lamports -= amount;\n    ctx.accounts.vault.lamports += amount;\n    Ok(())\n}\"#,\n            exploit_ref: Some(\"https://github.com/coral-xyz/sealevel-attacks#signer-authorization\"),\n            see_also: Some(\u0026[\"missing_balance_check\", \"missing_ownership\"]),\n            detection_pattern: Some(r#\"user.lamports -= amount;\n// No preceding: require!(user.lamports() \u003e= amount, ...)\"#),\n        }),\n        \"missing_signer\" =\u003e Some(Explain {\n            id: \"missing_signer\",\n            title: \"Missing Signer Check\",\n            severity: Severity::Critical,\n            what: \"An account is typed as `AccountInfo` but not marked as a signer in the IDL.\",\n            why: r#\"`AccountInfo` is the unsafe escape hatch — there's no runtime signer check unless you opt in. If the field name suggests authority (user, authority, admin, owner), it should be a `Signer` type.\n\nAttackers can pass any pubkey for this field and bypass authorization.\"#,\n            vulnerable_example: r#\"// IDL: signer: false (or missing)\n// Rust: AccountInfo instead of Signer\n#[derive(Accounts)]\npub struct WithdrawArgs\u003c'info\u003e {\n    pub user: AccountInfo\u003c'info\u003e,  // not marked as signer!\n    pub vault: Account\u003c'info, Vault\u003e,\n}\n\n// In handler:\npub fn withdraw(ctx: \u0026Context\u003cWithdrawArgs\u003e, amount: u64) -\u003e Result\u003c()\u003e {\n    ctx.accounts.vault.amount -= amount;\n    // No signer check! Anyone can withdraw.\n}\"#,\n            safe_example: r#\"// SAFE: use Signer type\n#[derive(Accounts)]\npub struct WithdrawArgs\u003c'info\u003e {\n    #[account(mut)]\n    pub user: Signer\u003c'info\u003e,  // runtime enforces signer\n    #[account(mut, has_one = user)]\n    pub vault: Account\u003c'info, Vault\u003e,\n}\"#,\n            exploit_ref: Some(\"https://github.com/coral-xyz/sealevel-attacks#signer-authorization\"),\n            see_also: Some(\u0026[\"missing_balance_check\", \"missing_ownership\", \"pda_misconfig\"]),\n            detection_pattern: Some(r#\"pub user: AccountInfo\u003c'info\u003e  // not Signer\u003c'info\u003e\n// IDL: signer: false or absent\"#),\n        }),\n        \"missing_bump_seed_canonicalization\" =\u003e Some(Explain {\n            id: \"missing_bump_seed_canonicalization\",\n            title: \"Non-Canonical PDA Bump\",\n            severity: Severity::High,\n            what: \"A PDA account uses a non-canonical bump (hardcoded or from error).\",\n            why: r#\"PDAs are derived from `find_program_address(seeds, program_id)`. The bump is the value that makes the derivation succeed. There's exactly ONE canonical bump — the highest one found.\n\nIf you hardcode `bump = authority` or `bump = first_8_bytes` instead of using `ctx.bumps.target`, an attacker can:\n1. Find the canonical bump\n2. Derive a different PDA with the same seeds but the canonical bump\n3. Access both accounts independently\n\nThis breaks account uniqueness guarantees.\"#,\n            vulnerable_example: r#\"// VULNERABLE: non-canonical bump\n#[derive(Accounts)]\npub struct InitializeArgs\u003c'info\u003e {\n    #[account(\n        init,\n        payer = user,\n        space = Vault::SIZE,\n        seeds = [b\"vault\", user.key().as_ref()],\n        bump = authority,  // can be anything that works!\n    )]\n    pub vault: Account\u003c'info, Vault\u003e,\n    pub user: Signer\u003c'info\u003e,\n}\"#,\n            safe_example: r#\"// SAFE: use canonical bump\n#[derive(Accounts)]\npub struct InitializeArgs\u003c'info\u003e {\n    #[account(\n        init,\n        payer = user,\n        space = Vault::SIZE,\n        seeds = [b\"vault\", user.key().as_ref()],\n        bump,  // uses ctx.bumps.vault (canonical)\n    )]\n    pub vault: Account\u003c'info, Vault\u003e,\n    pub user: Signer\u003c'info\u003e,\n}\"#,\n            exploit_ref: Some(\"https://github.com/coral-xyz/sealevel-attacks#bump-seed-canonicalization\"),\n            see_also: Some(\u0026[\"pda_misconfig\", \"missing_signer\"]),\n            detection_pattern: Some(r#\"seeds = [...], bump = user_bump\n// or\nseeds = [...], bump = args.nonce\"#),\n        }),\n        \"duplicate_mutable_accounts\" =\u003e Some(Explain {\n            id: \"duplicate_mutable_accounts\",\n            title: \"Duplicate Mutable Accounts\",\n            severity: Severity::High,\n            what: \"Two or more mutable `AccountInfo` accounts could reference the same pubkey.\",\n            why: r#\"If an instruction accepts `account_a` and `account_b` both as `AccountInfo` (mutable), an attacker can pass the same pubkey for both. Operations on \"different\" accounts actually modify the same account.\n\nExample: debit from `account_a`, credit to `account_b` — if they're the same, the attacker drains the account twice.\"#,\n            vulnerable_example: r#\"// VULNERABLE: both are AccountInfo\n#[derive(Accounts)]\npub struct TransferArgs\u003c'info\u003e {\n    pub from: AccountInfo\u003c'info\u003e,   // attacker can set = to\n    pub to: AccountInfo\u003c'info\u003e,     // and pass same pubkey\n    pub authority: Signer\u003c'info\u003e,\n}\n\npub fn transfer(ctx: \u0026Context\u003cTransferArgs\u003e, amount: u64) -\u003e Result\u003c()\u003e {\n    let from = \u0026mut ctx.accounts.from;\n    let to = \u0026mut ctx.accounts.to;\n    from.lamports -= amount;  // subtracts from same account\n    to.lamports += amount;   // adds to same account\n    // Net effect: no change, but account debited!\n}\"#,\n            safe_example: r#\"// SAFE: use typed accounts with anchor constraint\n#[derive(Accounts)]\npub struct TransferArgs\u003c'info\u003e {\n    #[account(mut)]\n    pub from: Account\u003c'info, TokenAccount\u003e,\n    #[account(mut, constraint = from.owner == authority.key())]\n    pub to: Account\u003c'info, TokenAccount\u003e,\n    pub authority: Signer\u003c'info\u003e,\n}\n// Anchor's Account\u003c'info, T\u003e type-checks uniqueness\n// for both accounts. Can't pass the same pubkey.\"#,\n            exploit_ref: Some(\"https://github.com/coral-xyz/sealevel-attacks#duplicate-mutable-accounts\"),\n            see_also: Some(\u0026[\"missing_signer\", \"missing_mut\"]),\n            detection_pattern: Some(r#\"pub a: AccountInfo\u003c'info\u003e,  // two or more\npub b: AccountInfo\u003c'info\u003e,  // of these\"#),\n        }),\n        \"missing_ownership\" =\u003e Some(Explain {\n            id: \"missing_ownership\",\n            title: \"Missing Ownership Check\",\n            severity: Severity::High,\n            what: \"A mutable account lacks an owner constraint, allowing arbitrary data deserialization.\",\n            why: r#\"When an account is typed as `AccountInfo` (not `Account\u003c'info, T\u003e`), the runtime doesn't enforce type safety. An attacker can pass a malicious program as the account, deserialize their own data, and bypass security checks.\n\nWithout `owner = my_program_id`, any account (even a TOKEN_PROGRAM account) can be passed and deserialized as your type.\"#,\n            vulnerable_example: r#\"// VULNERABLE: no owner constraint\n#[derive(Accounts)]\npub struct DepositArgs\u003c'info\u003e {\n    pub vault: AccountInfo\u003c'info\u003e,  // no owner check!\n    pub user: Signer\u003c'info\u003e,\n    pub system_program: AccountInfo\u003c'info\u003e,\n}\n\n// In handler:\npub fn deposit(ctx: \u0026Context\u003cDepositArgs\u003e, amount: u64) -\u003e Result\u003c()\u003e {\n    let vault = Vault::try_from(\u0026ctx.accounts.vault)?;\n    // Can deserialize attacker-controlled account as Vault!\n}\"#,\n            safe_example: r#\"// SAFE: enforce owner\n#[derive(Accounts)]\npub struct DepositArgs\u003c'info\u003e {\n    #[account(mut, owner = system_program::ID)]\n    pub vault: SystemAccount\u003c'info\u003e,\n    #[account(mut)]\n    pub user: Signer\u003c'info\u003e,\n    pub system_program: Program\u003c'info, System\u003e,\n}\n// Only SystemAccount (owned by system_program) accepted\n// Attacker can't pass a fake account.\"#,\n            exploit_ref: Some(\"https://github.com/coral-xyz/sealevel-attacks#account-data-matching\"),\n            see_also: Some(\u0026[\"missing_signer\", \"pda_misconfig\"]),\n            detection_pattern: Some(r#\"pub vault: AccountInfo\u003c'info\u003e\n// No: owner = Program::ID or System\"#),\n        }),\n        \"missing_reinit_guard\" =\u003e Some(Explain {\n            id: \"missing_reinit_guard\",\n            title: \"Reinitialization Risk\",\n            severity: Severity::High,\n            what: \"`init_if_needed` without a reinit discriminator guard allows account reinitialization.\",\n            why: r#\"`init_if_needed` skips initialization if the account already exists. But an attacker can:\n1. Initialize an account with their data\n2. Call your instruction with `init_if_needed`\n3. Since the account exists, initialization is skipped... but only sometimes!\n\nThis creates unpredictable state. Some deployments reinit (if account is zeroed), others don't.\"#,\n            vulnerable_example: r#\"// VULNERABLE: init_if_needed without reinit guard\n#[derive(Accounts)]\npub struct InitTokenArgs\u003c'info\u003e {\n    #[account(init_if_needed, payer = user, space = Token::SIZE)]\n    pub token: Account\u003c'info, Token\u003e,\n    pub user: Signer\u003c'info\u003e,\n    pub system_program: Program\u003c'info, System\u003e,\n}\n// If attacker zeroes the account, reinitializes with their data\n// If account has existing data, initialization skipped\n// Inconsistent behavior!\"#,\n            safe_example: r#\"// SAFE: add discriminator check\n#[derive(Accounts)]\npub struct InitTokenArgs\u003c'info\u003e {\n    #[account(mut, payer = user)]\n    pub token: Account\u003c'info, Token\u003e,\n    pub user: Signer\u003c'info\u003e,\n}\n\npub fn init_token(ctx: \u0026Context\u003cInitTokenArgs\u003e) -\u003e Result\u003c()\u003e {\n    // Check discriminator instead of relying on init_if_needed\n    require!(\n        ctx.accounts.token.discriminator == 0,\n        TokenError::AlreadyInitialized\n    );\n    ctx.accounts.token.set_inner(Token::new());\n    Ok(())\n}\"#,\n            exploit_ref: Some(\"https://github.com/coral-xyz/sealevel-attacks#reinitialization\"),\n            see_also: Some(\u0026[\"missing_close_authority\", \"missing_signer\"]),\n            detection_pattern: Some(r#\"#[account(init_if_needed, ...)]\npub state: Account\u003c'info, State\u003e\n// No: has_one = authority or constraint = ...\"#),\n        }),\n        \"lamports_drain\" =\u003e Some(Explain {\n            id: \"lamports_drain\",\n            title: \"Unauthorized Lamports Drain\",\n            severity: Severity::High,\n            what: \"Lamports are zeroed from an account without verifying caller authorization.\",\n            why: r#\"Setting an account's lamports to 0 (via `set_lamports(0)` or `**account.try_borrow_mut_lamports()? = 0`) transfers the rent-exempt deposit to... nowhere.\n\nIf this is done without verifying the caller is authorized (e.g., a `close` function), anyone can drain the account's SOL.\"#,\n            vulnerable_example: r#\"// VULNERABLE: no authority check\npub fn close_token(ctx: \u0026Context\u003cCloseToken\u003e) -\u003e Result\u003c()\u003e {\n    let dest = ctx.accounts.destination.to_account_info();\n    let source = ctx.accounts.token.to_account_info();\n\n    // Transfers lamports to destination\n    **dest.lamports.borrow_mut() += source.lamports();\n    **source.lamports.borrow_mut() = 0;\n    // No authority check! Anyone can close.\n}\"#,\n            safe_example: r#\"// SAFE: check authority before closing\n#[derive(Accounts)]\npub struct CloseToken\u003c'info\u003e {\n    #[account(mut, close = authority)]\n    pub token: Account\u003c'info, Token\u003e,\n    pub authority: Signer\u003c'info\u003e,  // must be signer\n}\n\n// In handler:\npub fn close_token(ctx: \u0026Context\u003cCloseToken\u003e) -\u003e Result\u003c()\u003e {\n    // Anchor verified authority signed this tx\n    ctx.accounts.token.close(ctx.accounts.authority.to_account_info());\n    Ok(())\n}\"#,\n            exploit_ref: Some(\"https://github.com/coral-xyz/sealevel-attacks#closing-accounts\"),\n            see_also: Some(\u0026[\"missing_close_authority\"]),\n            detection_pattern: Some(r#\"**dest.lamports.borrow_mut() += source.lamports();\n**source.lamports.borrow_mut() = 0;\n// No authority verification before drain\"#),\n        }),\n        \"missing_close_authority\" =\u003e Some(Explain {\n            id: \"missing_close_authority\",\n            title: \"Missing Close Authority\",\n            severity: Severity::High,\n            what: \"Account close constraint lacks authorization check.\",\n            why: r#\"`close = target` sends the rent-exempt lamports to `target` when the account closes. If `close` is set to a plain `AccountInfo` (not a `Signer`), anyone can provide that pubkey and claim the lamports.\n\nThis is a griefing/draining vector for accounts with significant SOL deposits.\"#,\n            vulnerable_example: r#\"// VULNERABLE: close to non-signer\n#[derive(Accounts)]\npub struct CreateDataArgs\u003c'info\u003e {\n    #[account(init, payer = user, space = 100)]\n    pub data: Account\u003c'info, Data\u003e,\n    pub user: Signer\u003c'info\u003e,\n    #[account(close = attacker)]  // attacker controls this!\n    pub data2: Account\u003c'info, Data\u003e,\n    pub attacker: AccountInfo\u003c'info\u003e,  // not a signer!\n    pub system_program: Program\u003c'info, System\u003e,\n}\"#,\n            safe_example: r#\"// SAFE: close to authority (who must sign)\n#[derive(Accounts)]\npub struct CreateDataArgs\u003c'info\u003e {\n    #[account(init, payer = user, space = 100)]\n    pub data: Account\u003c'info, Data\u003e,\n    pub user: Signer\u003c'info\u003e,\n    pub authority: Signer\u003c'info\u003e,\n}\n\n#[derive(Accounts)]\npub struct CloseDataArgs\u003c'info\u003e {\n    #[account(mut, close = authority)]\n    pub data: Account\u003c'info, Data\u003e,\n    pub authority: Signer\u003c'info\u003e,  // must sign\n}\"#,\n            exploit_ref: Some(\"https://github.com/coral-xyz/sealevel-attacks#closing-accounts\"),\n            see_also: Some(\u0026[\"lamports_drain\", \"missing_signer\"]),\n            detection_pattern: Some(r#\"#[account(close = target)]\npub data: Account\u003c'info, Data\u003e\n// target is AccountInfo, not Signer\"#),\n        }),\n        \"pda_misconfig\" =\u003e Some(Explain {\n            id: \"pda_misconfig\",\n            title: \"PDA Misconfiguration\",\n            severity: Severity::High,\n            what: \"PDA seeds are missing or use a non-canonical bump.\",\n            why: r#\"A PDA without seeds or with a hardcoded bump can be derived by anyone. Combined with missing `mut` or `signer` constraints, this allows attackers to manipulate account state.\n\nWithout proper seeds, the program can't verify the account was created through the correct derivation path.\"#,\n            vulnerable_example: r#\"// VULNERABLE: missing bump constraint\n#[derive(Accounts)]\npub struct CreateVaultArgs\u003c'info\u003e {\n    #[account(init, payer = user, space = Vault::SIZE)]\n    pub vault: Account\u003c'info, Vault\u003e,\n    // Missing: seeds = [...], bump = ...\n    pub user: Signer\u003c'info\u003e,\n    pub system_program: Program\u003c'info, System\u003e,\n}\"#,\n            safe_example: r#\"// SAFE: proper seeds and bump\n#[derive(Accounts)]\npub struct CreateVaultArgs\u003c'info\u003e {\n    #[account(\n        init,\n        payer = user,\n        space = Vault::SIZE,\n        seeds = [b\"vault\", user.key().as_ref()],\n        bump\n    )]\n    pub vault: Account\u003c'info, Vault\u003e,\n    pub user: Signer\u003c'info\u003e,\n    pub system_program: Program\u003c'info, System\u003e,\n}\"#,\n            exploit_ref: Some(\"https://github.com/coral-xyz/sealevel-attacks#bump-seed-canonicalization\"),\n            see_also: Some(\u0026[\"missing_bump_seed_canonicalization\", \"missing_signer\"]),\n            detection_pattern: Some(r#\"PDA account without seeds = [...]\n// or with init but missing bump\"#),\n        }),\n        \"unsafe_arithmetic\" =\u003e Some(Explain {\n            id: \"unsafe_arithmetic\",\n            title: \"Unsafe Arithmetic\",\n            severity: Severity::Medium,\n            what: \"Integer arithmetic without overflow checking in a program instruction.\",\n            why: r#\"On-chain, arithmetic overflow/underflow PANICS in release builds. This creates:\n- **Denial of Service**: transactions fail, blocking the program\n- **Logic bugs**: wraparound can bypass checks\n\nWhile panics prevent silent data corruption, they enable DoS attacks.\"#,\n            vulnerable_example: r#\"// VULNERABLE: unchecked arithmetic\npub fn transfer(ctx: \u0026Context\u003cTransfer\u003e, amount: u64) -\u003e Result\u003c()\u003e {\n    let from = \u0026mut ctx.accounts.from;\n    let to = \u0026mut ctx.accounts.to;\n\n    from.amount -= amount;  // PANIC if underflow!\n    to.amount += amount;   // PANIC if overflow!\n\n    Ok(())\n}\"#,\n            safe_example: r#\"// SAFE: checked arithmetic\npub fn transfer(ctx: \u0026Context\u003cTransfer\u003e, amount: u64) -\u003e Result\u003c()\u003e {\n    let from = \u0026mut ctx.accounts.from;\n    let to = \u0026mut ctx.accounts.to;\n\n    from.amount = from.amount.checked_sub(amount)\n        .ok_or(MyError::InsufficientFunds)?;\n    to.amount = to.amount.checked_add(amount)\n        .ok_or(MyError::Overflow)?;\n\n    Ok(())\n}\"#,\n            exploit_ref: None,\n            see_also: Some(\u0026[\"missing_ownership\"]),\n            detection_pattern: Some(r#\"from.amount -= amount;  // unchecked -, +, *, /\nto.amount += amount;     // no .checked_*()\"#),\n        }),\n        \"missing_mut\" =\u003e Some(Explain {\n            id: \"missing_mut\",\n            title: \"Missing Mut Constraint\",\n            severity: Severity::Medium,\n            what: \"An account that should be mutable is not declared with `#[account(mut)]`.\",\n            why: r#\"Without `#[account(mut)]`, the runtime rejects transactions that modify the account. The error is confusing (`transaction failed`) rather than a clear security signal, making debugging harder.\n\nIt's also a code smell — if the handler modifies an account but the IDL doesn't show it as mutable, there's a mismatch.\"#,\n            vulnerable_example: r#\"// IDL says: writable: false\n// But handler tries to modify:\npub fn update(ctx: \u0026Context\u003cUpdate\u003e, new_value: u64) -\u003e Result\u003c()\u003e {\n    ctx.accounts.data.value = new_value;\n    // Runtime REJECTS this tx!\n    // Error: \"transaction failed\" (confusing)\n}\"#,\n            safe_example: r#\"// SAFE: declare mut in IDL\n// IDL: accounts: [{ name: \"data\", writable: true }]\n#[derive(Accounts)]\npub struct Update\u003c'info\u003e {\n    #[account(mut)]  // explicitly declare mutation\n    pub data: Account\u003c'info, MyData\u003e,\n}\n\npub fn update(ctx: \u0026Context\u003cUpdate\u003e, new_value: u64) -\u003e Result\u003c()\u003e {\n    ctx.accounts.data.value = new_value;\n    Ok(())\n}\"#,\n            exploit_ref: None,\n            see_also: Some(\u0026[\"missing_balance_check\", \"lamports_drain\"]),\n            detection_pattern: Some(r#\"#[account(mut)]  // in IDL but missing\n// or IDL: writable: false but modified\"#),\n        }),\n        \"unchecked_balance_flow\" =\u003e Some(Explain {\n            id: \"unchecked_balance_flow\",\n            title: \"Unchecked Balance Flow\",\n            severity: Severity::Medium,\n            what: \"An account is debited without a matching credit or CPI call.\",\n            why: r#\"Lamports conservation: if an account loses lamports in an instruction, something else should gain them (or the account should be rent-exempt closing).\n\nUnchecked debits often indicate a logic bug: you're removing funds but not accounting for where they go.\"#,\n            vulnerable_example: r#\"// Debits user but never credits anyone else\npub fn withdraw_all(ctx: \u0026Context\u003cWithdraw\u003e) -\u003e Result\u003c()\u003e {\n    let user = \u0026mut ctx.accounts.user;\n\n    user.lamports -= user.lamports();  // all lamports removed\n    // Where did they go? Bug!\n\n    Ok(())\n}\"#,\n            safe_example: r#\"// Credit the destination explicitly\npub fn withdraw_all(ctx: \u0026Context\u003cWithdr med by GitHub Code Scanning, VS Code\n//! Problems panel, and security dashboards. This module maps our internal\n//! `Finding` struct to the SARIF schema so that Sentinel can be plugged\n//! directly into CI pipelines.\n\nuse serde::Serialize;\n\nuse crate::engine::{Finding, Severity};\nuse crate::rules;\n\n/// Top-level SARIF log.\n#[derive(Debug, Serialize)]\npub struct SarifLog {\n    #[serde(rename = \"$schema\")]\n    schema: \u0026'static str,\n    version: \u0026'static str,\n    runs: Vec\u003cRun\u003e,\n}\n\n#[derive(Debug, Serialize)]\nstruct Run {\n    tool: Tool,\n    results: Vec\u003cResult\u003e,\n}\n\n#[derive(Debug, Serialize)]\nstruct Tool {\n    driver: Driver,\n}\n\n#[derive(Debug, Serialize)]\n#[serde(rename_all = \"camelCase\")]\nstruct Driver {\n    name: \u0026'static str,\n    version: \u0026'static str,\n    #[serde(rename = \"informationUri\")]\n    information_uri: \u0026'static str,\n    rules: Vec\u003cSarifRule\u003e,\n}\n\n#[derive(Debug, Serialize)]\n#[serde(rename_all = \"camelCase\")]\nstruct SarifRule {\n    id: String,\n    name: String,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    short_description: Option\u003cMessage\u003e,\n    #[serde(rename = \"helpUri\", skip_serializing_if = \"Option::is_none\")]\n    help_uri: Option\u003cString\u003e,\n    properties: RuleProperties,\n}\n\n#[derive(Debug, Serialize)]\n#[serde(rename_all = \"camelCase\")]\nstruct RuleProperties {\n    #[serde(rename = \"security-severity\")]\n    security_severity: f64,\n}\n\n#[derive(Debug, Serialize)]\n#[serde(rename_all = \"camelCase\")]\nstruct Result {\n    rule_id: String,\n    level: \u0026'static str,\n    message: Message,\n    locations: Vec\u003cLocation\u003e,\n}\n\n#[derive(Debug, Serialize)]\n#[serde(rename_all = \"camelCase\")]\nstruct Location {\n    physical_location: PhysicalLocation,\n}\n\n#[derive(Debug, Serialize)]\n#[serde(rename_all = \"camelCase\")]\nstruct PhysicalLocation {\n    artifact_location: ArtifactLocation,\n    region: Region,\n}\n\n#[derive(Debug, Serialize)]\n#[serde(rename_all = \"camelCase\")]\nstruct ArtifactLocation {\n    uri: String,\n}\n\n#[derive(Debug, Serialize)]\n#[serde(rename_all = \"camelCase\")]\nstruct Region {\n    start_line: usize,\n    start_column: usize,\n}\n\n#[derive(Debug, Serialize)]\nstruct Message {\n    text: String,\n}\n\nimpl Message {\n    fn new(s: impl Into\u003cString\u003e) -\u003e Self {\n        Self { text: s.into() }\n    }\n}\n\n/// Map severity to SARIF level + numeric security-severity.\nfn severity_map(sev: Severity) -\u003e (\u0026'static str, f64) {\n    match sev {\n        Severity::Critical =\u003e (\"error\", 9.5),\n        Severity::High =\u003e (\"error\", 8.0),\n        Severity::Medium =\u003e (\"warning\", 5.5),\n        Severity::Low =\u003e (\"note\", 3.0),\n        Severity::Info =\u003e (\"note\", 1.0),\n    }\n}\n\n/// Build the list of rule definitions from the registry.\nfn driver_rules() -\u003e Vec\u003cSarifRule\u003e {\n    let mut rules = rules::registered_rules();\n    rules.sort_by_key(|\u0026(id, _, _)| id);\n    rules\n        .into_iter()\n        .map(|(id, sev, desc)| {\n            let (_level, security_severity) = severity_map(sev);\n            SarifRule {\n                id: id.to_string(),\n                name: id.to_string(),\n                short_description: Some(Message::new(desc)),\n                help_uri: None,\n                properties: RuleProperties { security_severity },\n            }\n        })\n        .collect()\n}\n\n/// Render a `Finding` to a SARIF `Result`.\nfn finding_to_result(f: \u0026Finding) -\u003e Result {\n    let (level, _) = severity_map(f.severity);\n    let uri = f.file.clone().unwrap_or_default();\n    let start_line = f.line.unwrap_or(1);\n    let start_column = f.column.unwrap_or(1);\n\n    Result {\n        rule_id: f.rule.clone(),\n        level,\n        message: Message::new(\u0026f.message),\n        locations: vec![Location {\n            physical_location: PhysicalLocation {\n                artifact_location: ArtifactLocation { uri },\n                region: Region {\n                    start_line,\n                    start_column,\n                },\n            },\n        }],\n    }\n}\n\n/// Build a full SARIF log from a list of findings.\npub fn render(findings: \u0026[Finding]) -\u003e String {\n    let mut sorted = findings.to_vec();\n    sorted.sort_by(|a, b| {\n        (\u0026a.rule, \u0026a.instruction, \u0026a.account, a.line, a.column).cmp(\u0026(\n            \u0026b.rule,\n            \u0026b.instruction,\n            \u0026b.account,\n            b.line,\n            b.column,\n        ))\n    });\n    let log = SarifLog {\n        schema: \"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json\",\n        version: \"2.1.0\",\n        runs: vec![Run {\n            tool: Tool {\n                driver: Driver {\n                    name: \"anchor-sentinel\",\n                    version: env!(\"CARGO_PKG_VERSION\"),\n                    information_uri: \"https://github.com/eniyanyosuva/anchor-sentinel\",\n                    rules: driver_rules(),\n                },\n            },\n            results: sorted.iter().map(finding_to_result).collect(),\n        }],\n    };\n    serde_json::to_string_pretty(\u0026log).expect(\"SARIF JSON always serializes\")\n}\n","traces":[{"line":103,"address":[],"length":0,"stats":{"Line":84}},{"line":104,"address":[],"length":0,"stats":{"Line":84}},{"line":109,"address":[],"length":0,"stats":{"Line":84}},{"line":110,"address":[],"length":0,"stats":{"Line":84}},{"line":111,"address":[],"length":0,"stats":{"Line":30}},{"line":112,"address":[],"length":0,"stats":{"Line":30}},{"line":113,"address":[],"length":0,"stats":{"Line":24}},{"line":114,"address":[],"length":0,"stats":{"Line":0}},{"line":115,"address":[],"length":0,"stats":{"Line":0}},{"line":120,"address":[],"length":0,"stats":{"Line":3}},{"line":
