name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run all tests
        run: cargo test

  integration:
    name: integration
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Cache sentinel binary
        id: cache-sentinel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/sentinel
            target/release/sentinel
          key: sentinel-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build sentinel binary
        if: steps.cache-sentinel.outputs.cache-hit != 'true'
        run: cargo build --bin sentinel --release

      - name: Get sentinel binary path
        id: sentinel
        run: |
          if [ -f target/release/sentinel ]; then
            echo "path=target/release/sentinel" >> $GITHUB_OUTPUT
          elif [ -f ~/.cargo/bin/sentinel ]; then
            echo "path=~/.cargo/bin/sentinel" >> $GITHUB_OUTPUT
          else
            echo "path=cargo run --bin sentinel --release --" >> $GITHUB_OUTPUT
          fi

      - name: End-to-end scan against all fixtures
        run: |
          set +e
          SENTINEL="${SENTINEL:-$(cargo run --bin sentinel --release --quiet --)}"
          FAIL=0
          for fixture in $(find tests/fixtures -mindepth 1 -maxdepth 1 -type d -exec test -d {}/programs \; -print | sort); do
            name="$(basename "$fixture")"
            echo "==> scanning $name (strict mode)"
            output=$($SENTINEL scan --strict "$fixture" 2>&1)
            EXIT=$?
            if [ "$EXIT" -eq 0 ]; then
              echo "  clean fixture -- no findings (exit 0)"
            elif [ "$EXIT" -eq 1 ]; then
              echo "  vulnerable fixture -- findings detected (exit 1)"
            else
              echo "  ERROR: unexpected exit code $EXIT for $name"
              FAIL=1
            fi
            if echo "$output" | grep -qE 'no findings|Security Overview|Risk Score|● '; then
              echo "  output: OK"
            else
              echo "  ERROR: scanner produced no recognizable output"
              FAIL=1
            fi
          done
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::One or more fixtures produced unexpected results"
            exit 1
          fi

  binary:
    name: binary
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        target:
          - os: ubuntu-latest
            artifact: sentinel-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-latest
            artifact: sentinel-x86_64-apple-darwin.tar.gz
          - os: windows-latest
            artifact: sentinel-x86_64-pc-windows-msvc.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --bin sentinel --release

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" == "Windows" ]; then
            cp target/release/sentinel.exe dist/sentinel.exe
            cd dist && powershell -Command "Compress-Archive sentinel.exe ../${{ matrix.artifact }}"
          else
            cp target/release/sentinel dist/sentinel
            if [ "${{ runner.os }}" == "macOS" ]; then
              tar -czf ../${{ matrix.artifact }} -C dist sentinel
            else
              tar -czf ../${{ matrix.artifact }} -C dist sentinel
            fi
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 30

      - name: Create or update Release
        if: github.event_name == 'push' && github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
