name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run all tests
        run: cargo test

  integration:
    name: integration
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build sentinel binary
        run: cargo build --bin sentinel --release

      - name: End-to-end scan against all fixtures
        run: |
          SENTINEL=./target/release/sentinel
          FAIL=0
          for fixture in tests/fixtures/*/; do
            name="$(basename "$fixture")"
            echo "==> scanning $name (strict mode)"
            output=$($SENTINEL scan --strict "$fixture" 2>&1)
            EXIT=$?
            if [ "$EXIT" -eq 0 ]; then
              echo "  clean fixture -- no findings (exit 0)"
            elif [ "$EXIT" -eq 1 ]; then
              echo "  vulnerable fixture -- findings detected (exit 1)"
            else
              echo "  ERROR: unexpected exit code $EXIT for $name"
              FAIL=1
            fi
            # Verify scanner produced recognizable output (not a crash).
            if echo "$output" | grep -q "finding\|no findings\|error"; then
              echo "  output: OK"
            else
              echo "  ERROR: scanner produced no recognizable output"
              FAIL=1
            fi
          done
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::One or more fixtures produced unexpected results"
            exit 1
          fi
