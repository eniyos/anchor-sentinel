name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run all tests
        run: cargo test

  integration:
    name: integration
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build sentinel binary
        run: cargo build --bin sentinel --release

      - name: End-to-end scan against all fixtures
        run: |
          # Disable errexit: sentinel intentionally exits non-zero on vulnerable
          # fixtures, and the loop below inspects $? explicitly. With `set -e`
          # the script aborts on the first non-zero exit before the if/elif/else
          # branches can run.
          set +e
          SENTINEL=./target/release/sentinel
          FAIL=0
          # Only consider fixtures that contain a `programs/` subdirectory.
          # This excludes grouping directories (e.g. `public/`) and stub
          # directories that have no Anchor program to scan.
          for fixture in $(find tests/fixtures -mindepth 1 -maxdepth 1 -type d -exec test -d {}/programs \; -print | sort); do
            name="$(basename "$fixture")"
            echo "==> scanning $name (strict mode)"
            output=$($SENTINEL scan --strict "$fixture" 2>&1)
            EXIT=$?
            if [ "$EXIT" -eq 0 ]; then
              echo "  clean fixture -- no findings (exit 0)"
            elif [ "$EXIT" -eq 1 ]; then
              echo "  vulnerable fixture -- findings detected (exit 1)"
            else
              echo "  ERROR: unexpected exit code $EXIT for $name"
              FAIL=1
            fi
            # Verify scanner produced recognizable output (not a crash).
            # The redesigned CLI prints: the "Security Overview" header
            # + a "Risk Score" line on every scan; either a "✔ no
            # findings" line on clean fixtures, or a "●" bullet per
            # finding on vulnerable ones. Match on any of these.
            if echo "$output" | grep -qE 'no findings|Security Overview|Risk Score|● '; then
              echo "  output: OK"
            else
              echo "  ERROR: scanner produced no recognizable output"
              FAIL=1
            fi
          done
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::One or more fixtures produced unexpected results"
            exit 1
          fi

  wasm:
    name: wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install wasm-pack
        # Install via cargo (slow but reliable — the curl|sh installer
        # hits a dash-vs-bash issue on the GitHub-hosted runners).
        run: cargo install wasm-pack --locked

      - name: Build WASM module
        run: wasm-pack build --target web --out-dir playground/pkg

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-wasm
          path: playground/pkg
          retention-days: 14
